# Contains queries executed against model.
type Query {
    # Find device types by unique id.
    deviceTypesById(ids: [ID!]!): [DeviceType!]!
    # Find device types by unique token.
    deviceTypesByToken(tokens: [String!]!): [DeviceType!]!
    # List device types that meet criteria.
    deviceTypes(criteria: DeviceTypeSearchCriteria!): DeviceTypeSearchResults!
    # Find metric definitions by unique id.
    metricDefinitionsById(ids: [ID!]!): [MetricDefinition!]!
    # Find metric definitions by unique token.
    metricDefinitionsByToken(tokens: [String!]!): [MetricDefinition!]!
    # List metric definitions that meet criteria.
    metricDefinitions(criteria: MetricDefinitionSearchCriteria!): MetricDefinitionSearchResults!
    # List entity attributes that meet criteria.
    entityAttributes(criteria: EntityAttributeSearchCriteria!): EntityAttributeSearchResults!
    # Query the append-only audit journal (ADR-019); tenant-scoped, newest first.
    auditEvents(criteria: AuditEventSearchCriteria!): AuditEventSearchResults!
    # Find devices by unique id.
    devicesById(ids: [ID!]!): [Device!]!
    # Find devices by unique token.
    devicesByToken(tokens: [String!]!): [Device!]!
    # List devices that meet criteria.
    devices(criteria: DeviceSearchCriteria!): DeviceSearchResults!
    # Find device groups by unique id.
    deviceGroupsById(ids: [ID!]!): [DeviceGroup!]!
    # Find device groups by unique token.
    deviceGroupsByToken(tokens: [String!]!): [DeviceGroup!]!
    # List device groups that meet criteria.
    deviceGroups(criteria: DeviceGroupSearchCriteria!): DeviceGroupSearchResults!
    # Find device credentials by unique id.
    deviceCredentialsById(ids: [ID!]!): [DeviceCredential!]!
    # Find device credentials by unique token.
    deviceCredentialsByToken(tokens: [String!]!): [DeviceCredential!]!
    # List device credentials that meet criteria.
    deviceCredentials(criteria: DeviceCredentialSearchCriteria!): DeviceCredentialSearchResults!
    # Find provisioning profiles by unique id.
    provisioningProfilesById(ids: [ID!]!): [ProvisioningProfile!]!
    # Find provisioning profiles by unique token.
    provisioningProfilesByToken(tokens: [String!]!): [ProvisioningProfile!]!
    # List provisioning profiles that meet criteria.
    provisioningProfiles(criteria: ProvisioningProfileSearchCriteria!): ProvisioningProfileSearchResults!
    # Get a device's current possession claim, or null if it has none.
    deviceClaim(deviceToken: String!): DeviceClaim

    # Find entity relationship types by unique id.
    entityRelationshipTypesById(ids: [String!]!): [EntityRelationshipType!]!
    # Find entity relationship types by unique token.
    entityRelationshipTypesByToken(tokens: [String!]!): [EntityRelationshipType!]!
    # List entity relationship types that meet criteria.
    entityRelationshipTypes(criteria: EntityRelationshipTypeSearchCriteria!): EntityRelationshipTypeSearchResults!
    # Find entity relationships by unique id.
    entityRelationshipsById(ids: [String!]!): [EntityRelationship!]!
    # Find entity relationships by unique token.
    entityRelationshipsByToken(tokens: [String!]!): [EntityRelationship!]!
    # List entity relationships that meet criteria.
    entityRelationships(criteria: EntityRelationshipSearchCriteria!): EntityRelationshipSearchResults!

    # Find asset types by unique id.
    assetTypesById(ids: [ID!]!): [AssetType!]!
    # Find asset types by unique token.
    assetTypesByToken(tokens: [String!]!): [AssetType!]!
    # List asset types that meet criteria.
    assetTypes(criteria: AssetTypeSearchCriteria!): AssetTypeSearchResults!
    # Find assets by unique id.
    assetsById(ids: [ID!]!): [Asset!]!
    # Find assets by unique token.
    assetsByToken(tokens: [String!]!): [Asset!]!
    # List assets that meet criteria.
    assets(criteria: AssetSearchCriteria!): AssetSearchResults!
    # Find asset groups by unique id.
    assetGroupsById(ids: [ID!]!): [AssetGroup!]!
    # Find asset groups by unique token.
    assetGroupsByToken(tokens: [String!]!): [AssetGroup!]!
    # List asset groups that meet criteria.
    assetGroups(criteria: AssetGroupSearchCriteria!): AssetGroupSearchResults!

    # Find customer types by unique id.
    customerTypesById(ids: [ID!]!): [CustomerType!]!
    # Find customer types by unique token.
    customerTypesByToken(tokens: [String!]!): [CustomerType!]!
    # List customer types that meet criteria.
    customerTypes(criteria: CustomerTypeSearchCriteria!): CustomerTypeSearchResults!
    # Find customers by unique id.
    customersById(ids: [ID!]!): [Customer!]!
    # Find customers by unique token.
