#
# goreleaser config for the DeviceChain CLI (dcctl).
#
# Builds cross-platform `dcctl` binaries from the backend/cli module and
# attaches them (with archives + checksums) to the GitHub Release created for
# a vX.Y.Z tag. The release workflow runs this from the backend/cli directory,
# so this module IS the project root and `main: .` resolves to backend/cli/main.go.
#
# Version is stamped via ldflags into github.com/devicechain-io/dcctl/cmd.Version
# (and the existing gitCommit var), so `dcctl version` reports the release.

version: 2

project_name: dcctl

# No `go mod tidy` before-hook: the cli module depends on sibling modules via
# go.work + replace directives, and tidying outside the workspace rewrites
# go.mod/go.sum incorrectly. The committed go.mod is already tidy.

builds:
  - id: dcctl
    binary: dcctl
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devicechain-io/dcctl/cmd.Version={{ .Version }}
      - -X github.com/devicechain-io/dcctl/cmd.gitCommit={{ .FullCommit }}
      # A released binary is the longest-lived dcctl there is — it sits on a PATH
      # for months, which is exactly the staleness `dcctl version` reports. Left
      # unstamped it would print "built: unknown", disabling the age and stale
      # warning precisely for the population that needs them most.
      - -X github.com/devicechain-io/dcctl/cmd.buildDate={{ .Date }}
      - -X github.com/devicechain-io/dcctl/cmd.gitTreeState={{ if .IsGitDirty }}dirty{{ else }}clean{{ end }}
      # Pin the default image version a released dcctl deploys to this release's
      # tag, so `dcctl bootstrap` (published path) pulls real images instead of
      # the unpublished ":dev". Unlike the Makefile's dev builds — whose
      # cmd.Version carries a build stamp naming no pushed image — a release's
      # version IS its image tag, so both stamps take {{ .Version }} here.
      - -X github.com/devicechain-io/dcctl/bootstrap.DefaultImageVersion={{ .Version }}

archives:
  - id: dcctl
    ids:
      - dcctl
    name_template: >-
      dcctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    # Windows users expect a .zip rather than a tarball.
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc

release:
  github:
    owner: devicechain-io
    name: devicechain
  # Mark the GitHub Release as a prerelease automatically when the tag carries
  # a prerelease segment (e.g. v1.2.3-rc.1). Stable tags publish a full release.
  prerelease: auto
  # A standing pre-1.0 notice on every release. Before v1.0.0 a PATCH release is
  # allowed to tighten validation or change a schema, so the version number alone
  # cannot tell a user whether an upgrade is safe — only the notes can. Putting this
  # in the goreleaser config rather than writing it per release means it cannot be
  # forgotten on the one release that needed it most. Any release-specific breaking
  # changes are added to the notes by hand, under this notice.
  #
  # Remove this header at v1.0.0, when a normal semver compatibility promise applies.
  header: |
    > [!WARNING]
    > **Pre-1.0 release.** Until v1.0.0, any release — including a patch — may change
    > APIs, schemas, or behavior without a compatibility shim. Check for a
    > "Breaking changes" section below before upgrading.
    > See [Pre-1.0 stability](https://docs.devicechain.io/deployment/releases-and-upgrades#pre-10-stability).
