{{/*
Extra Opaque Secrets rendered into the instance namespace from values.

The chart owns the instance namespace (namespace.yaml), so a caller that needs a
Secret in it cannot create one out-of-band without an ownership/ordering fight
(the namespace may not exist yet, and a pre-created Secret an env var references
that is missing at install turns into a CreateContainerConfigError → a pod that
never goes Ready → a ten-minute --wait timeout). Threading the material through
values into a chart-RENDERED Secret is the same pattern the instance-config Secret
(instance-config.yaml) and the secrets root key already use, and it installs in one
pass with the workloads that consume it.

This is how a caller (e.g. `dcctl bootstrap --lwm2m-identities`) provisions a device
PSK the deployed DTLS server must accept: it composes one extraSecrets entry holding
the base64 PSK and an extraEnv `secretKeyRef` (per functional area) projecting it into
the env var the identity's `pskEnv` names.

Trust boundary: like the instance-config Secret, the value lives in the Helm release
and is visible to `helm get values`. Prefer projecting an externally-managed Secret
via a functional area's extraEnv for production; this path is for bootstrap-time
provisioning where the caller already holds the material.

stringData (not data) so callers pass the value verbatim — for a LwM2M PSK that value
is the BASE64 PSK STRING the service base64-decodes at load (config ResolveCredentials),
so it must survive to the env var unchanged rather than being decoded by Kubernetes.
*/}}
{{- range $s := .Values.extraSecrets | default list }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ required "extraSecrets[].name is required" $s.name }}
  namespace: {{ $.Values.instance.id }}
  labels:
    {{- include "devicechain.instanceLabels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml (required "extraSecrets[].stringData is required" $s.stringData) | nindent 2 }}
{{- end }}
