# Admin (instance-scoped) GraphQL API — ADR-033.
#
# Served at /admin/graphql and authenticated with an *identity*-tier token (the
# tenant-less system token minted by login), not a tenant access token. Every
# operation additionally requires a specific system authority; a superuser holds
# the super-authority "*" and so passes them all. This API is cross-tenant: it
# administers the global identity directory, the tenant registry, the role
# catalog, and the per-tenant memberships.

# A global, email-keyed principal (ADR-033).
type AdminIdentity {
    id: ID!
    createdAt: String
    updatedAt: String
    email: String!
    firstName: String
    lastName: String
    enabled: Boolean!
    # System role tokens held by this identity (e.g. "superuser").
    systemRoles: [String!]!
    # The tenants this identity can act in, with its per-tenant roles.
    memberships: [AdminMembership!]!
}

# An identity's binding to a single tenant, with its tenant-scoped role tokens.
type AdminMembership {
    tenant: String!
    enabled: Boolean!
    roles: [String!]!
}

# An operator-defined packaging tier (ADR-065): the one durable answer to "what
# kind of customer is this?". Subsystems read it and each owns its own
# interpretation — shed order, the set of AI models offered, default ceilings — but
# none redefines it. gold/silver/bronze ship seeded and are editable: packaging is
# data, not a code deploy.
type AdminTenantTier {
    id: ID!
    createdAt: String
    updatedAt: String
    token: String!
    name: String
    description: String
    # The tier's settings as a JSON object string (null when unset).
    config: String
    # How many tenants are packaged at this tier. A tier with tenants cannot be
    # deleted (its tenants' tier is a required FK).
    tenantCount: Int!
}

# Data to create a tier. config is an optional JSON object string.
input AdminTenantTierCreateRequest {
    token: String!
    name: String
    description: String
    config: String
}

# Data to update a tier (its token is fixed). Editing a tier changes behavior for
# every tenant at it, live.
#
# name and description are a full replace: omitting one CLEARS it. config is not —
# omitting it leaves the tier's settings untouched, and passing "{}" clears them.
# The asymmetry is deliberate: clearing a name is cosmetic, while clearing config
# silently re-prices every tenant at the tier (they fall back to the platform default
# within a minute), which is too destructive to reach by omission.
input AdminTenantTierUpdateRequest {
    name: String
    description: String
    config: String
}

# A control-plane tenant record (ADR-033): a registry entry, not a provisioned
# resource. Config is freeform JSON exposed as a JSON-encoded string.
type AdminTenant {
    id: ID!
    createdAt: String
    updatedAt: String
    token: String!
    name: String
    enabled: Boolean!
    # The tier this tenant is packaged at (ADR-065). Never null: every tenant has a
    # tier, enforced by a NOT NULL FK, so there is no un-tiered state.
    tier: AdminTenantTier!
    # Freeform per-tenant config as a JSON object string (null when unset).
    config: String
    # Per-tenant ingest governance overrides. Null means the tenant inherits the
    # platform default; a set value raises or lowers its ceiling.
    ingestMessagesPerSecond: Float
    ingestBurst: Int
    # Per-tenant outbound-connector governance overrides (ADR-060). Null means the
    # tenant inherits the platform default; a set value raises or lowers its ceiling.
    outboundMessagesPerSecond: Float
    outboundBurst: Int
    # Per-tenant external-AI consent (ADR-056 §6). Null/false means the tenant is
    # not opted in (fail-closed); true records the operator's consent to route this
    # tenant's data to an external frontier model.
    aiExternalEnabled: Boolean
    # Per-tenant AI-inference rate overrides (ADR-056 §6 / ADR-023): how fast this
    # tenant may spend inference budget on the NL authoring door. Declared per
    # MINUTE. Null means the tenant inherits the platform default, never unlimited.
    # Distinct from aiExternalEnabled: that gates WHETHER this tenant's data may be
    # routed externally, these gate HOW OFTEN.
    aiInferenceRequestsPerMinute: Float
    aiInferenceBurst: Int
}

# A globally-defined, named bundle of authorities (ADR-008 RBAC / ADR-033). Scope
# is "system" (assigned to identities, gates the admin API) or "tenant" (assigned
# to memberships, gates the data plane).
type AdminRole {
    id: ID!
    createdAt: String
    updatedAt: String
    scope: String!
    token: String!
    name: String
    description: String
    authorities: [String!]!
}

# Data to create a role. scope is "system" or "tenant"; each authority must name a
# known capability (e.g. "device:write", "tenant:read", or "*").
input AdminRoleCreateRequest {
    scope: String!
    token: String!
    name: String
    description: String
    authorities: [String!]!
}

# Data to update a role (its scope + token identity is fixed).
input AdminRoleUpdateRequest {
    name: String
    description: String
    authorities: [String!]!
}

# Data to create a tenant. config is an optional JSON object string. The ingest* /
# outbound* overrides are optional; omit them to inherit the platform default.
input AdminTenantCreateRequest {
    token: String!
    name: String
    # The tier to package this tenant at, by token (ADR-065). Required — there is no
    # un-tiered tenant, so there is nothing to default.
    tierToken: String!
    config: String
    ingestMessagesPerSecond: Float
    ingestBurst: Int
    outboundMessagesPerSecond: Float
    outboundBurst: Int
    # Per-tenant external-AI consent (ADR-056 §6); omit for not-opted-in (the
    # fail-closed default).
    aiExternalEnabled: Boolean
    # Per-tenant AI-inference rate overrides (ADR-056 §6 / ADR-023): how fast this
    # tenant may spend inference budget on the NL authoring door. Declared per
    # MINUTE. Null means the tenant inherits the platform default, never unlimited.
    # Distinct from aiExternalEnabled: that gates WHETHER this tenant's data may be
    # routed externally, these gate HOW OFTEN.
    aiInferenceRequestsPerMinute: Float
    aiInferenceBurst: Int
}

# Data to update a tenant (its token is fixed). A null ingest* / outbound* override
# clears it, reverting the tenant to the platform default. A null aiExternalEnabled
# likewise clears consent (the tenant reverts to not-opted-in).
input AdminTenantUpdateRequest {
    name: String
    # The tier to package this tenant at, by token (ADR-065). Required, like on
    # create: this request is a full replace of the mutable fields, and a tenant is
    # never un-tiered. Re-tiering is a live, settings-only change.
    tierToken: String!
    config: String
    ingestMessagesPerSecond: Float
    ingestBurst: Int
    outboundMessagesPerSecond: Float
    outboundBurst: Int
    aiExternalEnabled: Boolean
    # Per-tenant AI-inference rate overrides (ADR-056 §6 / ADR-023): how fast this
    # tenant may spend inference budget on the NL authoring door. Declared per
    # MINUTE. Null means the tenant inherits the platform default, never unlimited.
    # Distinct from aiExternalEnabled: that gates WHETHER this tenant's data may be
    # routed externally, these gate HOW OFTEN.
    aiInferenceRequestsPerMinute: Float
    aiInferenceBurst: Int
}

# Data required to create a global identity. Each system role must name an
# existing role with system scope; the password is hashed server-side.
input AdminIdentityCreateRequest {
    email: String!
    password: String!
    firstName: String
    lastName: String
    enabled: Boolean!
    systemRoles: [String!]!
}

# Pagination info for admin search results.
type SearchResultsPagination {
    pageStart: Int
    pageEnd: Int
    totalRecords: Int
}

# A row of the instance's user-management audit journal (ADR-019): an
# authentication event (login/refresh) or an administrative mutation (identity /
# role / tenant / membership). Instance-wide and cross-tenant, so it is exposed
# only on the admin API. Times are RFC3339 strings.
type AdminAuditEvent {
    id: ID!
    # RFC3339 time the audited statement committed / the event occurred.
    occurredTime: String!
    # "auth" (a login/login_failed/refresh) or "mutation" (an admin entity change).
    category: String!
    # The tenant the row was stamped with, or null for a tenant-less system/auth event.
    tenant: String
    # JWT subject that performed it, "system" for a system-context op, or "".
    actor: String!
    # "login"/"login_failed"/"refresh" for auth; "create"/"update"/"delete" for a mutation.
    operation: String!
    # Schema-qualified mutated table (null for an auth event).
    tableName: String
    # Primary key of the affected row for a single-row mutation; null otherwise.
    entityPk: String
    # Human-facing, non-sensitive label of the affected row (e.g. a role/tenant
    # token or an identity email), captured when the model provides one; null otherwise.
    entityLabel: String
    # Number of rows the audited statement affected.
    rowsAffected: Int!
}

# Criteria for an admin audit query. All filters are optional except pagination;
# actor is a case-insensitive substring match, category/operation/tenant are exact.
input AdminAuditEventSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    startTime: String
    endTime: String
    category: String
    operation: String
    actor: String
    # Restrict to a single tenant's rows (by tenant token). Tenant-less auth
    # events are excluded when set.
    tenant: String
}

# A page of admin audit rows, newest first.
type AdminAuditEventSearchResults {
    results: [AdminAuditEvent!]!
    pagination: SearchResultsPagination!
}

# A registered OAuth 2.1 client (ADR-047): the allowlist entry the Authorization
# Server validates the authorization-code flow against. redirectUris is the
# exact-match allowlist; scopes is the set the client may request. hasSecret tells
# whether it is a confidential client (authenticates at the token endpoint with a
# secret) or a public PKCE client — the cleartext secret is never exposed here.
type AdminOAuthClient {
    id: ID!
    createdAt: String
    updatedAt: String
    clientId: String!
    name: String
    description: String
    enabled: Boolean!
    redirectUris: [String!]!
    scopes: [String!]!
    hasSecret: Boolean!
}

# The result of registering or rotating a client. clientSecret is the cleartext,
# returned EXACTLY ONCE (only its bcrypt hash is stored) — null for a public client.
# Capture it now; it cannot be retrieved again.
type AdminOAuthClientSecret {
    client: AdminOAuthClient!
    clientSecret: String
}

# Data to register an OAuth client. clientId is its stable public identifier; each
# redirectUri must be https (or http for a loopback host) with no fragment; each
# scope must name a scope the AS grants (e.g. "read-only"). confidential requests a
# server-generated client secret (returned once) for a confidential client;
# omitted/false registers a public PKCE client.
input AdminOAuthClientCreateRequest {
    clientId: String!
    name: String
    description: String
    redirectUris: [String!]!
    scopes: [String!]!
    confidential: Boolean
}

# Data to update a client (its clientId is fixed).
input AdminOAuthClientUpdateRequest {
    name: String
    description: String
    redirectUris: [String!]!
    scopes: [String!]!
}

# Admin queries. Each requires a system authority (superusers hold "*").
type Query {
    # Liveness placeholder.
    ping: String!
    # List the full identity directory (requires user:read).
    identities: [AdminIdentity!]!
    # List every tenant (requires tenant:read).
    tenants: [AdminTenant!]!
    # List the tenant tier catalog (requires tenant:read). Gated on the tenant
    # authorities rather than one of its own: a tier is tenant-registry packaging,
    # administered on the same plane by the same operator.
    tenantTiers: [AdminTenantTier!]!
    # List the role catalog, optionally filtered to a scope (requires role:read).
    roles(scope: String): [AdminRole!]!
    # The known authority vocabulary (sorted, includes "*"), for offering a
    # checklist when defining a role rather than free-text entry (requires role:read).
    authorities: [String!]!
    # Query the instance audit journal for user-management — auth events plus
    # identity/role/tenant administration, newest first (requires audit:read).
    auditEvents(criteria: AdminAuditEventSearchCriteria!): AdminAuditEventSearchResults!
    # List the OAuth 2.1 client registry (requires client:read).
    oauthClients: [AdminOAuthClient!]!
}

# Admin mutations. Identity + membership administration requires user:write
# (superusers hold "*"). All return the affected identity (re-loaded) unless noted.
type Mutation {
    # Create a global identity with the given system roles.
    createIdentity(request: AdminIdentityCreateRequest!): AdminIdentity!
    # Enable or disable an identity (disabled identities cannot authenticate).
    setIdentityEnabled(email: String!, enabled: Boolean!): AdminIdentity!
    # Replace an identity's system-role assignments (role tokens, system scope).
    setSystemRoles(email: String!, roleTokens: [String!]!): AdminIdentity!
    # Replace an identity's password (hashed server-side).
    setPassword(email: String!, password: String!): AdminIdentity!
    # Delete an identity and its memberships; returns whether one was removed.
    deleteIdentity(email: String!): Boolean!

    # Bind an identity to an existing tenant with the given tenant roles.
    addMembership(email: String!, tenant: String!, roleTokens: [String!]!): AdminIdentity!
    # Replace a membership's tenant-role assignments (role tokens, tenant scope).
    setMembershipRoles(email: String!, tenant: String!, roleTokens: [String!]!): AdminIdentity!
    # Enable or disable a membership (a disabled membership cannot be selected).
    setMembershipEnabled(email: String!, tenant: String!, enabled: Boolean!): AdminIdentity!
    # Remove an identity's membership in a tenant.
    removeMembership(email: String!, tenant: String!): AdminIdentity!

    # Create a role granting a set of authorities (requires role:write).
    createRole(request: AdminRoleCreateRequest!): AdminRole!
    # Update a role by scope + token (requires role:write).
    updateRole(scope: String!, token: String!, request: AdminRoleUpdateRequest!): AdminRole!
    # Delete a role by scope + token; returns whether one was removed. The
    # superuser system role is protected (requires role:write).
    deleteRole(scope: String!, token: String!): Boolean!

    # Create a tenant tier (requires tenant:write).
    createTenantTier(request: AdminTenantTierCreateRequest!): AdminTenantTier!
    # Update a tier by token. This changes behavior for every tenant at the tier,
    # live and with no deploy (requires tenant:write).
    updateTenantTier(token: String!, request: AdminTenantTierUpdateRequest!): AdminTenantTier!
    # Delete a tier by token; returns whether one was removed. Refused while any
    # tenant is still packaged at it (requires tenant:write).
    deleteTenantTier(token: String!): Boolean!

    # Create a tenant, enabled by default, at the requested tier (requires tenant:write).
    createTenant(request: AdminTenantCreateRequest!): AdminTenant!
    # Replace a tenant's name, tier, config, and ingest overrides by token; omitting an
    # ingest override clears it back to the platform default (requires tenant:write).
    updateTenant(token: String!, request: AdminTenantUpdateRequest!): AdminTenant!
    # Enable or disable a tenant (requires tenant:write).
    setTenantEnabled(token: String!, enabled: Boolean!): AdminTenant!
    # Delete a tenant by token; returns whether one was removed. Rejected if the
    # tenant still has memberships (requires tenant:write).
    deleteTenant(token: String!): Boolean!

    # Register an OAuth client, enabled by default (requires client:write). Returns
    # the client plus, for a confidential client, its one-time cleartext secret.
    createOauthClient(request: AdminOAuthClientCreateRequest!): AdminOAuthClientSecret!
    # Replace a client's name, redirect URIs, and scopes by clientId (requires
    # client:write).
    updateOauthClient(clientId: String!, request: AdminOAuthClientUpdateRequest!): AdminOAuthClient!
    # Enable or disable a client; a disabled client is rejected at the authorize /
    # token endpoints (requires client:write).
    setOauthClientEnabled(clientId: String!, enabled: Boolean!): AdminOAuthClient!
    # Mint a fresh secret for a client (promotes a public client to confidential),
    # invalidating any previous one. Returns the new one-time secret (requires
    # client:write).
    rotateOauthClientSecret(clientId: String!): AdminOAuthClientSecret!
    # Delete a client by clientId; returns whether one was removed (requires
    # client:write).
    deleteOauthClient(clientId: String!): Boolean!
}

schema {
    query: Query
    mutation: Mutation
}
