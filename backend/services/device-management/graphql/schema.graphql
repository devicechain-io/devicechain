# Contains mutations executed against model.
type Mutation {
    # Create a new device type.
    createDeviceType(request: DeviceTypeCreateRequest): DeviceType!
    # Update an existing device type.
    updateDeviceType(token: String!, request: DeviceTypeCreateRequest): DeviceType!
    # Delete a device type. Refused while any device references it. Its capability
    # definitions live on the DeviceProfile now (ADR-045), which survives. Returns
    # whether a row was deleted.
    deleteDeviceType(token: String!): Boolean!
    # Create a new device profile (ADR-045).
    createDeviceProfile(request: DeviceProfileCreateRequest): DeviceProfile!
    # Update an existing device profile, located by the token argument (ADR-045).
    updateDeviceProfile(token: String!, request: DeviceProfileCreateRequest): DeviceProfile!
    # Delete a device profile (ADR-045). Refused while any device type references
    # it; its owned metric, command, and detection-rule definitions are cascade-removed.
    # Returns whether a row was deleted.
    deleteDeviceProfile(token: String!): Boolean!
    # Publish the profile's current draft as a new immutable version and make it the
    # version devices resolve (ADR-045 versioning). label/description are optional.
    publishDeviceProfile(token: String!, label: String, description: String): DeviceProfileVersion!
    # Re-point the profile's active published version at an existing version — a
    # non-destructive rollback; the draft is untouched. Returns the updated profile.
    rollbackDeviceProfile(token: String!, version: Int!): DeviceProfile!
    # Create a new metric definition.
    createMetricDefinition(request: MetricDefinitionCreateRequest): MetricDefinition!
    # Update an existing metric definition.
    updateMetricDefinition(token: String!, request: MetricDefinitionCreateRequest): MetricDefinition!
    # Delete a single metric definition.
    deleteMetricDefinition(token: String!): Boolean!
    # Create a new command definition.
    createCommandDefinition(request: CommandDefinitionCreateRequest): CommandDefinition!
    # Update an existing command definition.
    updateCommandDefinition(token: String!, request: CommandDefinitionCreateRequest): CommandDefinition!
    # Delete a single command definition.
    deleteCommandDefinition(token: String!): Boolean!
    # Create a new detection rule.
    createDetectionRule(request: DetectionRuleCreateRequest!): DetectionRule!
    # Update an existing detection rule.
    updateDetectionRule(token: String!, request: DetectionRuleCreateRequest!): DetectionRule!
    # Delete a single detection rule.
    deleteDetectionRule(token: String!): Boolean!
    # Acknowledge a raised alarm (operator action). The acknowledging identity is the
    # authenticated subject, recorded server-side — not a client-supplied value.
    acknowledgeAlarm(token: String!): Alarm!
    # Clear a raised alarm (manual operator override).
    clearAlarm(token: String!): Alarm!
    # Set (upsert) an entity attribute.
    setEntityAttribute(request: EntityAttributeSetRequest!): EntityAttribute!
    # Delete an entity attribute by its natural key.
    deleteEntityAttribute(entityType: String!, entity: String!, scope: String!, attrKey: String!): Boolean!
    # Create a new device.
    createDevice(request: DeviceCreateRequest): Device!
    # Create many devices in one transaction from a template (bulk fleet
    # provisioning): the server renders count devices from the token/name/
    # external-id templates and creates them all-or-nothing.
    createDevices(request: DeviceBulkCreateRequest!): [Device!]!
    # Update an existing device.
    updateDevice(token: String!, request: DeviceCreateRequest): Device!
    # Delete a device, cascade-removing its credentials and relationship edges.
    deleteDevice(token: String!): Boolean!
    # Create a new entity group (ADR-061). A static group's members are managed over
    # "member" relationship edges; a dynamic group carries a CEL selector and resolves
    # its members eval-on-read (validated + cost-gated at create).
    createEntityGroup(request: EntityGroupCreateRequest): EntityGroup!
    # Update an existing entity group's presentation fields (member family + mode
    # are immutable).
    updateEntityGroup(token: String!, request: EntityGroupCreateRequest): EntityGroup!
    # Delete an entity group, its relationship edges, and its frozen versions.
    # Refused (ErrEntityInUse) while a detection rule scopes to the group (ADR-062).
    deleteEntityGroup(token: String!): Boolean!
    # Publish a DYNAMIC entity group's current draft selector as a new immutable
