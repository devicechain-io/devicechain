#
# Device Management GraphQL Schema
#

# Base elements in gorm RDB model.
interface Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
}

# Entity referenced by unique token.
interface TokenReference {
    token: String!
}

# Entity that provides human-readable name-description.
interface NamedEntity {
    name: String
    description: String
}

# Entity that provides branding information.
interface BrandedEntity {
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
}

# Entity that provides metadata.
interface MetadataEntity {
    metadata: String
}

# Pagination info for search results.
type SearchResultsPagination {
	pageStart: Int
	pageEnd: Int
	totalRecords: Int
}

# Represents a type or class of devices
type DeviceType implements Model & TokenReference & NamedEntity & BrandedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    metadata: String
    metricDefinitions: [MetricDefinition!]!
}

# Represents a typed, unit-bearing metric declared on a device profile (ADR-016).
type MetricDefinition implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    deviceType: DeviceType!
    metricKey: String!
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Data required to create a metric definition.
input MetricDefinitionCreateRequest {
    token: String!
    deviceTypeToken: String!
    metricKey: String!
    name: String
    description: String
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Criteria used when searching for metric definitions.
input MetricDefinitionSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceType: String
    metricKey: String
}

# Search results returned from metric definition query.
type MetricDefinitionSearchResults {
    results: [MetricDefinition!]!
    pagination: SearchResultsPagination!
}

# Represents a single current-state attribute for an entity (ADR-012).
type EntityAttribute implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    entityType: String!
    entity: Entity!
    scope: String!
    attrKey: String!
    valueType: String!
    value: String
    lastUpdated: String
}

# Data required to set (upsert) an entity attribute.
input EntityAttributeSetRequest {
    entityType: String!
    entity: String!
    scope: String!
    attrKey: String!
    valueType: String!
    value: String
}

# Criteria used when searching for entity attributes.
input EntityAttributeSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    entityType: String
    entity: String
    scope: String
    attrKeys: [String!]
}

# A row of the append-only audit journal (ADR-019). Captured by construction on
# every entity mutation in this service; the journal is never mutated via the
# API. Times are RFC3339 strings.
type AuditEvent {
    id: ID!
    # RFC3339 time the audited statement committed.
    occurredTime: String!
    # "mutation" (an entity create/update/delete) or "auth" (login/refresh).
    category: String!
    # JWT subject that performed it, "system" for a system-context operation, or
    # "" when neither is present.
    actor: String!
    # "create" | "update" | "delete" for a mutation.
    operation: String!
    # Schema-qualified mutated table (empty for an auth event).
    tableName: String
    # Primary key of the affected row when the statement targets a single row;
    # empty for a bulk/condition mutation (rowsAffected then conveys the scope).
    entityPk: String
    # Human-facing, non-sensitive label of the affected row (e.g. its token),
    # captured when the model provides one; null otherwise.
    entityLabel: String
    # Number of rows the audited statement affected.
    rowsAffected: Int!
}

# Criteria for an audit-journal query. All filters are optional except
# pagination; a bounded (startTime, endTime) range is recommended.
input AuditEventSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    startTime: String
    endTime: String
    category: String
    operation: String
    actor: String
    tableName: String
    entityPk: String
}

# A page of audit-journal rows, newest first.
type AuditEventSearchResults {
    results: [AuditEvent!]!
    pagination: SearchResultsPagination!
}

# Search results returned from entity attribute query.
type EntityAttributeSearchResults {
    results: [EntityAttribute!]!
    pagination: SearchResultsPagination!
}

