{{/*
One Deployment per enabled functional area (ADR-022 decision 2). Each pod gets
the instance identity via env and mounts the instance + per-service config at the
paths the shared core reads. Readiness/liveness target the /readyz and /healthz
endpoints introduced in ADR-022 decision 3, so a degraded pod (auth not yet live)
is held out of Service endpoints.

ADR-022 review hardening:
  C2 — the instance config is backed by a Secret (it carries DB credentials).
  C3 — pod/container securityContext run the workload non-root with a read-only
       rootfs and no capabilities (the scratch static binaries write nothing).
  E7 — resource requests/limits, probes (incl. startupProbe for slow cold starts)
       and a dedicated ServiceAccount with the API token unmounted.
  E8 — checksum annotations roll the pods when config (Secret/ConfigMap) changes.
*/}}
{{- $root := . -}}
{{- $blob := include "devicechain.blobBackendConfig" . | fromJson }}
{{- $blobBackend := $blob.backend | default "filesystem" }}
{{- $blobPersist := ($root.Values.blobStorage | default dict).persistence | default dict }}
{{- $blobPath := ternary ($blobPersist.mountPath | default "") ($blob.directory | default "") (ne ($blobPersist.mountPath | default "") "") }}
{{- $blobWantVolume := or $blobPersist.enabled (not (empty $blobPersist.existingClaim)) }}
{{- $blobMountAreas := ($root.Values.blobStorage | default dict).mountAreas | default (list "user-management") }}
{{- range $area := splitList "," (include "devicechain.enabledAreas" .) }}
{{- $areaCfg := get ($root.Values.functionalAreas | default dict) $area | default dict }}
{{/*
Mount the filesystem object-store volume (ADR-058) into this area only when it consumes the
store (blobStorage.mountAreas), the filesystem backend is selected with a resolved path, and a
volume is provided. The read-only rootfs means the store's directory MUST be a writable mount;
the s3 backend needs no volume, so this stays false there.
*/}}
{{- $mountBlob := and (has $area $blobMountAreas) (eq $blobBackend "filesystem") (ne $blobPath "") $blobWantVolume }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $area }}
  namespace: {{ $root.Values.instance.id }}
  labels:
    {{- include "devicechain.areaLabels" (dict "root" $root "area" $area) | nindent 4 }}
spec:
  replicas: {{ get $areaCfg "replicas" | default $root.Values.replicas }}
  {{/*
  Rollout strategy. Default RollingUpdate for zero-downtime rollouts (methodology §10.1):
  maxUnavailable:0 keeps full capacity during an upgrade — a new pod must go Ready
  (/readyz) before an old one is removed — and maxSurge:1 brings the replacement up
  first. Pair with replicas >= 2 for true zero-downtime (a single replica still has a
  brief gap while its one pod is replaced).

  A per-area "strategy: Recreate" override (functionalAreas.<area>.strategy) switches to
  Recreate: during a ROLLOUT all old pods terminate before any new pod starts, so a deploy
  never overlaps old+new. This is REQUIRED for the DETECT engine (event-processing, ADR-051):
  a single-writer stream processor whose correctness depends on exactly one instance binding
  the resolved-events durable + owning the Postgres snapshot at a time. A rolling update
  briefly runs old+new together, which splits the durable and diverges windowed/absence state
  on restart; Recreate trades a brief detection gap (acceptable — the durable redelivers from
  the last checkpoint on the new pod) for that split-brain safety at deploy time.

  Recreate governs ROLLOUTS ONLY. An eviction / node drain / manual pod delete is handled by
  the ReplicaSet, which schedules the replacement IMMEDIATELY while the old pod is still
  Terminating — so those paths CAN briefly run two engines. That residual overlap is covered
  at the app layer, not here: the engine's snapshot Save is monotonic and detectStaleOwner
  halts a writer whose checkpoint another has passed (ResolvedEventsProcessor). Both fences
  are load-bearing — do not remove them assuming Recreate makes single-writer airtight.

  Such an area MUST also stay at replicas:1 (a Recreate with 2 replicas runs 2 PERMANENT
  writers — strictly worse than a rolling overlap); the guard below fails the render if not.

  event-sources is the INVERSE case, and the guard below refuses Recreate there (ADR-030 I5).
  It ingests device telemetry from a JetStream capture stream that it ensures at startup,
  before it reports ready — and a JetStream stream captures nothing published before it
  existed, even though the broker already PUBACKed it. RollingUpdate (maxUnavailable:0,
  maxSurge:1) is therefore load-bearing rather than merely preferred: the incoming pod
  creates the stream and goes Ready while the outgoing pod is still ingesting, so capture
  is live before the last ingester dies and nothing the broker accepted is dropped.
  Recreate reverses exactly that order — all old pods terminate BEFORE any new pod starts,
  so no stream exists for the whole gap and every message the broker PUBACKs during it is
  accepted and written nowhere. The loss is silent on both sides: the device is told its
  message is safe and the platform never sees it. Pinned by
  TestCaptureBeginsOnlyWhenTheStreamExists in event-sources/processor/cutover_test.go.

  Nor does event-sources need Recreate: unlike the DETECT engine it is not a single writer.
  Its capture consumer is a durable scoped to instance+area+suffix, so every replica shares
  one consumer and each message is delivered to exactly one of them (core/messaging NewReader)
  — which is also why event-sources may scale past one replica once cut over, something the
  MQTT-client path it replaces could never do.
  */}}
  {{- $strategy := get $areaCfg "strategy" | default "RollingUpdate" }}
  {{- if and (eq $strategy "Recreate") (gt (int (get $areaCfg "replicas" | default $root.Values.replicas)) 1) }}
  {{- fail (printf "functionalAreas.%s: strategy Recreate is a single-writer guarantee and requires replicas:1 (got %v)" $area (get $areaCfg "replicas" | default $root.Values.replicas)) }}
  {{- end }}
  {{- if and (eq $strategy "Recreate") (eq $area "event-sources") }}
  {{- fail "functionalAreas.event-sources: strategy Recreate would silently DROP device telemetry (ADR-030). It terminates the old pod before the new one creates the ingest capture stream, so everything the broker PUBACKs in the gap is accepted and stored nowhere. event-sources is not a single writer and must stay on RollingUpdate." }}
  {{- end }}
  strategy:
    type: {{ $strategy }}
    {{- if eq $strategy "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $root.Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ $root.Values.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "devicechain.areaLabels" (dict "root" $root "area" $area) | nindent 6 }}
  template:
    metadata:
      annotations:
        {{/* E8: roll pods deterministically when config changes. */}}
        checksum/instance-secret: {{ $root.Values.instance.config | toJson | sha256sum }}
        checksum/microservice-config: {{ include "devicechain.microserviceConfig" $root | sha256sum }}
      labels:
        {{- include "devicechain.areaLabels" (dict "root" $root "area" $area) | nindent 8 }}
    spec:
      {{/*
      Graceful shutdown window (§10.2): must exceed shutdownDrainSeconds plus the
      time to drain in-flight requests, or the kubelet SIGKILLs mid-drain.
      */}}
      terminationGracePeriodSeconds: {{ $root.Values.terminationGracePeriodSeconds }}
      {{- if $root.Values.serviceAccount.create }}
      serviceAccountName: {{ include "devicechain.serviceAccountName" $root }}
      {{- end }}
      automountServiceAccountToken: {{ $root.Values.serviceAccount.automountToken }}
      {{- with $root.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $area }}
          image: {{ include "devicechain.image" (dict "area" $area "root" $root) }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          {{- with $root.Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DC_INSTANCE_ID
              value: {{ $root.Values.instance.id | quote }}
            - name: DC_MICROSERVICE_ID
              value: {{ $area | quote }}
            - name: DC_MS_FUNCTIONAL_AREA
              value: {{ $area | quote }}
            {{/* §10.2: app-side drain window (the scratch images have no shell
            for a preStop hook) — readiness flips to 503 this many seconds before
            the server stops, so endpoints drain first. */}}
            - name: DC_SHUTDOWN_DRAIN_SECONDS
              value: {{ $root.Values.shutdownDrainSeconds | quote }}
            {{/* Go does not read the container's memory limit — a Go 1.26 process
            in a 128m container reports no soft limit at all. Setting one is a
            CEILING against an OOMKill during a live-heap spike, not a way to shrink
            the footprint (measurement found no heap reduction); it is off by
            default. Derived from THIS area's own limit so the two cannot drift; see
            devicechain.goMemLimit. Omitted entirely when the area has no memory
            limit to derive from, rather than guessed. */}}
            {{- with include "devicechain.goMemLimit" (dict "areaCfg" $areaCfg "root" $root) }}
            - name: GOMEMLIMIT
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: graphql
              containerPort: {{ $root.Values.service.port }}
              protocol: TCP
            {{- range $port := get $areaCfg "extraPorts" | default list }}
            - name: {{ $port.name }}
              containerPort: {{ $port.port }}
              protocol: TCP
            {{- end }}
          {{/*
          E7: a startupProbe with a generous failureThreshold gives a slow JWKS/DB
          cold start time to come up before liveness can act; liveness keeps a
          raised failureThreshold so a transient blip doesn't kill a healthy pod.
          */}}
          startupProbe:
            httpGet:
              path: /readyz
              port: graphql
            periodSeconds: {{ $root.Values.startupProbe.periodSeconds }}
            failureThreshold: {{ $root.Values.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: graphql
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: graphql
            periodSeconds: 20
            failureThreshold: {{ $root.Values.livenessProbe.failureThreshold }}
          resources:
            {{- get $areaCfg "resources" | default $root.Values.resources | toYaml | nindent 12 }}
          volumeMounts:
            - name: instance-config
              mountPath: /etc/dci-config
              readOnly: true
            - name: microservice-config
              mountPath: /etc/dct-config
              readOnly: true
            {{- if $mountBlob }}
            - name: blob-store
              mountPath: {{ $blobPath | quote }}
            {{- end }}
      volumes:
        - name: instance-config
          secret:
            secretName: {{ include "devicechain.instanceConfigSecret" $root }}
        - name: microservice-config
          configMap:
            name: {{ include "devicechain.microserviceConfigMap" $root }}
        {{- if $mountBlob }}
        - name: blob-store
          persistentVolumeClaim:
            claimName: {{ include "devicechain.blobClaimName" $root }}
        {{- end }}
{{- end }}
