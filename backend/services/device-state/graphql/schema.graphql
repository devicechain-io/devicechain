#
# Device State GraphQL Schema
#

# Base elements in gorm RDB model.
interface Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
}

# Pagination info for search results.
type SearchResultsPagination {
	pageStart: Int
	pageEnd: Int
	totalRecords: Int
}

# Live current-state projection for a single device (connectivity + activity).
type DeviceState implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    deviceId: Int!
    active: Boolean!
    lastConnectTime: String
    lastDisconnectTime: String
    lastActivityTime: String
    inactivityAlarmTime: String
    inactivityTimeout: Int!
}

# Current (most-recent) value of a single named measurement for a device — the
# live "what is it now?" projection beside the append-only history. occurredTime
# is the RFC3339 time of the reading; value is null only for a non-numeric reading
# (not stored in v1).
type LatestMeasurement implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    deviceId: Int!
    name: String!
    value: Float
    classifier: Int
    occurredTime: String!
}

# Criteria used when searching for device states. Device-id lookups are served by
# the deviceStatesByDeviceId query instead of a criteria field.
input DeviceStateSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    active: Boolean
}

# Search results returned from device state query.
type DeviceStateSearchResults {
    results: [DeviceState!]!
    pagination: SearchResultsPagination!
}

# Queries for accessing device state.
type Query {
    # Get device states for one or more devices by device id.
    deviceStatesByDeviceId(deviceIds: [Int!]!): [DeviceState!]!
    # Search for device states that match the given criteria.
    deviceStates(criteria: DeviceStateSearchCriteria!): DeviceStateSearchResults!
    # Current value of every measurement name for a device (live readings).
    latestMeasurements(deviceId: Int!): [LatestMeasurement!]!
}

schema {
    query: Query
}
