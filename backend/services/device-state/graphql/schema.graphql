#
# Device State GraphQL Schema
#

# Base elements in gorm RDB model.
interface Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
}

# Pagination info for search results.
type SearchResultsPagination {
	pageStart: Int
	pageEnd: Int
	totalRecords: Int
}

# Live current-state projection for a single device (connectivity + activity).
type DeviceState implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    deviceToken: String!
    active: Boolean!
    lastConnectTime: String
    lastDisconnectTime: String
    lastActivityTime: String
    inactivityAlarmTime: String
    inactivityTimeout: Int!
    # externalId is the device's transport-native identity, denormalized from the
    # resolved event (ADR-049); null when the device has no external id.
    externalId: String
    # presenceSource discriminates authoritative presence from inferred (ADR-067):
    # INFERRED (activity + inactivity sweep) or ASSERTED (Active driven only by a
    # StateChange). sessionId is the last-applied transition's ordering epoch, returned
    # as a String because it is a UnixNano value that overflows a 32-bit GraphQL Int
    # (0 until the first StateChange). presenceTime is that transition's time.
    presenceSource: String!
    sessionId: String!
    presenceTime: String
}

# Current (most-recent) value of a single named measurement for a device — the
# live "what is it now?" projection beside the append-only history. occurredTime
# is the RFC3339 time of the reading; value is null only for a non-numeric reading
# (not stored in v1).
type LatestMeasurement implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    deviceToken: String!
    name: String!
    value: Float
    classifier: Int
    # unit + dataType are denormalized from the bound metric definition (ADR-016) so
    # the last-known value is self-describing; both are null for an undeclared
    # measurement. dataType lets a consumer render a 0/1 BOOLEAN value as false/true.
    unit: String
    dataType: String
    occurredTime: String!
}

# Criteria used when searching for device states. Device-token lookups are served
# by the deviceStatesByDeviceToken query instead of a criteria field.
input DeviceStateSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    active: Boolean
}

# Search results returned from device state query.
type DeviceStateSearchResults {
    results: [DeviceState!]!
    pagination: SearchResultsPagination!
}

# Queries for accessing device state.
type Query {
    # Get device states for one or more devices by device token.
    deviceStatesByDeviceToken(deviceTokens: [String!]!): [DeviceState!]!
    # Get device states for one or more devices by their (denormalized) external id.
    deviceStatesByExternalId(externalIds: [String!]!): [DeviceState!]!
    # All ASSERTED + active device states for the calling tenant AND the given event
    # source — the set the Sparkplug adapter reconciles against on failover (ADR-067
    # SP4b): it enumerates the devices the platform believes that source has online,
    # floors its epoch generator from the max sessionId here, and probes each for
    # liveness. The source scope stops two Sparkplug sources on one tenant from
    # cross-disconnecting each other's devices.
    assertedActiveDeviceStates(source: String!): [DeviceState!]!
    # Search for device states that match the given criteria.
    deviceStates(criteria: DeviceStateSearchCriteria!): DeviceStateSearchResults!
    # Current value of every measurement name for a device (live readings).
    latestMeasurements(deviceToken: String!): [LatestMeasurement!]!
}

schema {
    query: Query
}
