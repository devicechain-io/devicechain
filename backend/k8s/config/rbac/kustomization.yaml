resources:
# The manager's ServiceAccount, its ClusterRole (generated from the
# +kubebuilder:rbac markers by `make manifests`), and the binding that grants it.
- service_account.yaml
- role.yaml
- role_binding.yaml
# Leader-election Role + binding (granted ahead of main.go wiring leader election).
- leader_election_role.yaml
- leader_election_role_binding.yaml
# NOTE: the kube-rbac-proxy auth-proxy resources (auth_proxy_*) were dropped with
# the deprecated metrics sidecar. The per-CRD editor/viewer convenience roles
# (*_editor_role.yaml / *_viewer_role.yaml) are intentionally not deployed.
