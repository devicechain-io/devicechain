# Adds namespace to all resources.
namespace: dc-k8s-system

# Value of this field is prepended to the names of all resources, e.g. a
# deployment named "wordpress" becomes "alices-wordpress". It should match the
# prefix (text before '-') of the namespace field above.
namePrefix: dc-k8s-

resources:
- ../crd
- ../rbac
- ../manager
# [WEBHOOK] / [CERTMANAGER] / [PROMETHEUS]: add ../webhook, ../certmanager, or
# ../prometheus here to enable those components.

# The manager's runtime flags now live directly in config/manager/manager.yaml
# (the deprecated kube-rbac-proxy auth-proxy patch was removed).
# [WEBHOOK]/[CERTMANAGER]: add a `patches:` block with manager_webhook_patch.yaml /
# webhookcainjection_patch.yaml here (each with an explicit `target:`, since
# kustomize v5 matches strictly), and use `replacements:` (the v5 successor to
# `vars:`) for the cert-manager namespace/name substitutions when enabling them.
