# Criteria used when searching for device groups.
input DeviceGroupSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
}

# Search results returned from device group query.
type DeviceGroupSearchResults {
    results: [DeviceGroup!]!
    pagination: SearchResultsPagination!
}

# Represents rotatable authentication material for a device (ADR-014).
type DeviceCredential implements Model & TokenReference & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    device: Device!
    credentialType: String!
    credentialId: String!
    credentialValue: String
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Data required to create a device credential.
input DeviceCredentialCreateRequest {
    token: String!
    deviceToken: String!
    credentialType: String!
    credentialId: String!
    credentialValue: String
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Criteria used when searching for device credentials.
input DeviceCredentialSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    device: String
    credentialType: String
    credentialId: String
    enabled: Boolean
}

# Search results returned from device credential query.
type DeviceCredentialSearchResults {
    results: [DeviceCredential!]!
    pagination: SearchResultsPagination!
}

# Represents a typed, unit-bearing metric declared on a device profile (ADR-016).
type MetricDefinition implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    deviceType: DeviceType!
    metricKey: String!
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Data required to create a metric definition.
input MetricDefinitionCreateRequest {
    token: String!
    deviceTypeToken: String!
    metricKey: String!
    name: String
    description: String
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Criteria used when searching for metric definitions.
input MetricDefinitionSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceType: String
    metricKey: String
}

# Search results returned from metric definition query.
type MetricDefinitionSearchResults {
    results: [MetricDefinition!]!
    pagination: SearchResultsPagination!
}

