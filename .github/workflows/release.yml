#
# Release CI for the DeviceChain monorepo.
#
# Triggered EXCLUSIVELY by a version tag (vX.Y.Z, optionally a -rc.N prerelease).
# A release is therefore a deliberate, auditable act -- `main` never publishes.
#
# On a tag this workflow:
#   - guard:  validates the tag is strict semver, computes version + prerelease,
#             and enumerates the image build matrix (hack/list-services.sh).
#   - images: ko-builds + pushes every service image and the operator image to
#             ghcr.io/devicechain-io, multi-arch (amd64 + arm64).
#   - chart:  packages the Helm chart at the tag version and pushes it as an OCI
#             artifact to ghcr.io/devicechain-io/charts.
#   - cli:    goreleaser cross-compiles dcctl and creates the GitHub Release.
#
# Auth is the built-in GITHUB_TOKEN -- no PAT. ghcr packages are created private
# on first push; flip each to Public once (org Packages settings).

name: release

# Trigger on semver-shaped tags. The `*` suffix admits prerelease/build segments
# (e.g. v1.2.3-rc.1); the guard job enforces the strict format and fails fast.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# contents: write -> create the GitHub Release. packages: write -> push to ghcr.
permissions:
  contents: write
  packages: write

# Never run two releases for the same tag concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/devicechain-io

jobs:
  # ---------------------------------------------------------------------------
  # Validate the tag, derive the version + prerelease flag, and enumerate the
  # image build matrix (same source of truth as ci.yml's discover job).
  # ---------------------------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      is_prerelease: ${{ steps.semver.outputs.is_prerelease }}
      smoke: ${{ steps.smoke.outputs.smoke }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate tag is strict semver
        id: semver
        run: |
          version="${GITHUB_REF_NAME}"
          # Strict semver with an optional prerelease segment: vMAJOR.MINOR.PATCH[-pre]
          if ! echo "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$version' is not a valid semver release tag (expected vX.Y.Z or vX.Y.Z-rc.N)."
            exit 1
          fi
          # A '-' in the tag marks a prerelease (e.g. v1.2.3-rc.1).
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "Releasing $version (prerelease=$is_prerelease)"

      - name: Build image module list
        id: smoke
        run: |
          # ko-buildable image modules = each discovered service (mapped to its
          # backend/services/<name> dir) PLUS the operator at backend/k8s.
          # Identical logic to ci.yml's discover job -- single source of truth.
          smoke="$(
            { hack/list-services.sh | jq -r '.[] | "backend/services/" + .'
              echo "backend/k8s"
            } | jq -R . | jq -s -c .
          )"
          echo "smoke=$smoke" >> "$GITHUB_OUTPUT"
          echo "Image modules: $smoke"

  # ---------------------------------------------------------------------------
  # Build + push every service image and the operator image, multi-arch.
  # ---------------------------------------------------------------------------
  images:
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Discovered services (backend/services/<name>) plus the operator
        # (backend/k8s) -- assembled by the guard job.
        module: ${{ fromJson(needs.guard.outputs.smoke) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      # Pinned for the same reasons as ci.yml's image-smoke — and it matters more here.
      # The action's default "latest-release" resolves ko by curl-ing GitHub's
      # AUTHENTICATED API and piping the body to jq, so an API blip fails the job with
      # an "Invalid numeric literal" jq error before anything builds (all 12 CI jobs,
      # 2026-07-16). On a RELEASE that would mean a tag that publishes no images for a
      # reason that has nothing to do with the code. It also means the released images
      # are built by whichever ko happened to be current that day; a release should be
      # reproducible. Keep this in step with ci.yml — bump both together, deliberately.
      - uses: ko-build/setup-ko@v0.10
        with:
          version: v0.19.1

      - name: Log in to ghcr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | ko login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Compute ko repo + tags
        id: ko
        env:
          MODULE: ${{ matrix.module }}
          VERSION: ${{ needs.guard.outputs.version }}
          IS_PRERELEASE: ${{ needs.guard.outputs.is_prerelease }}
        run: |
          # Every image publishes at an EXPLICIT repo via ko --bare (KO_DOCKER_REPO
          # used verbatim as the image name), matching the names the Helm chart
          # deploys and dcctl's local --build path produces:
          #   operator (backend/k8s)      -> ".../operator"  (NOT "k8s")
          #   service (backend/services/X) -> ".../X"         (the directory basename
          #                                   == the functional-area name the chart
          #                                   renders, e.g. device-management)
          # NOTE: do NOT use --base-import-paths here — it names the image after the
          # Go MODULE base (dc-<name>, since the modules are dc-device-management etc.),
          # which the chart does not deploy, yielding an un-deployable release.
          if [ "$MODULE" = "backend/k8s" ]; then
            echo "repo=${REGISTRY}/operator" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${REGISTRY}/$(basename "$MODULE")" >> "$GITHUB_OUTPUT"
          fi
          # :latest moves ONLY on stable releases -- never on prereleases.
          if [ "$IS_PRERELEASE" = "false" ]; then
            echo "tags=${VERSION},latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: ko build + push
        working-directory: ${{ matrix.module }}
        env:
          KO_DOCKER_REPO: ${{ steps.ko.outputs.repo }}
        run: |
          # Multi-arch image published verbatim at the repo computed above
          # (--bare names the image exactly from KO_DOCKER_REPO):
          #   service  -> ghcr.io/devicechain-io/<dir>       (e.g. device-management)
          #   operator -> ghcr.io/devicechain-io/operator
          ko build --bare \
            --platform=linux/amd64,linux/arm64 \
            --tags="${{ steps.ko.outputs.tags }}" \
            ./

  # ---------------------------------------------------------------------------
  # Package the Helm chart at the release version and push it as an OCI artifact.
  # ---------------------------------------------------------------------------
  chart:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pin Helm for the same reproducibility reason as ko above — and, here,
      # for correctness: Helm versions after v3.18.6 regressed OCI push to ghcr
      # (helm/helm#31223), failing with `Tag on destination: <digest>: not found`
      # AFTER packaging succeeds. The unpinned action installs the latest Helm,
      # so a tag would package a chart it then cannot publish. v3.18.6 is verified
      # to push to ghcr; bump deliberately, and re-verify the OCI push when doing so.
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.6

      - name: Log in to ghcr (helm registry)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Package + push chart
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          # The chart version/appVersion are SemVer WITHOUT the leading 'v'.
          # OCI tags follow chart version, so strip the prefix for the chart only.
          chart_version="${VERSION#v}"

          # Pin every rendered image to this release tag. `helm package` cannot
          # override values, so the chart defaults image.tag to .Chart.AppVersion
          # (templates/_helpers.tpl); setting --app-version to the release version
          # therefore makes the packaged chart deploy the matching images by
          # default, with no value override needed.
          helm package deploy/helm/devicechain \
            --version "$chart_version" \
            --app-version "$VERSION"

          # helm package writes devicechain-<chart_version>.tgz to the cwd.
          helm push "devicechain-${chart_version}.tgz" oci://${REGISTRY}/charts

  # ---------------------------------------------------------------------------
  # Build + push the web console image (static nginx SPA), multi-arch.
  #
  # The console is not a Go service, so it is built with docker buildx from
  # frontend/Dockerfile rather than ko. It publishes as ".../frontend", the name
  # the chart resolves by default ({image.registry}/frontend:{image.tag}).
  # ---------------------------------------------------------------------------
  frontend:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          IS_PRERELEASE: ${{ needs.guard.outputs.is_prerelease }}
        run: |
          # :latest moves ONLY on stable releases -- never on prereleases
          # (mirrors the ko images job).
          tags="${REGISTRY}/frontend:${VERSION}"
          if [ "$IS_PRERELEASE" = "false" ]; then
            tags="${tags},${REGISTRY}/frontend:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Frontend tags: $tags"

      - name: Build + push console image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # ---------------------------------------------------------------------------
  # Cross-compile dcctl and create the GitHub Release (goreleaser).
  # ---------------------------------------------------------------------------
  cli:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # goreleaser needs full history (tags + commits) for changelog/version.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
          # The dcctl module is the goreleaser project root; its config and
          # main.go live under backend/cli.
          workdir: backend/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin goreleaser to the pushed tag. A stable release (v0.8.0) is often
          # cut on the SAME commit as its final RC (v0.8.0-rc.4); with two tags on
          # one commit, goreleaser's `git describe` version detection can resolve to
          # the prerelease and then try to upload assets to the RC's existing
          # release (422 already_exists). GITHUB_REF_NAME is unambiguous.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
