#
# Validation CI for the DeviceChain monorepo.
#
# This workflow validates only -- it never publishes images or artifacts.
# Image publishing lives in a separate, tag-triggered workflow.
#
# Services are enumerated dynamically from backend/services/* (via
# hack/list-services.sh), so adding a new service needs no edits here.

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: validation jobs only need to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Enumerate services (image-smoke matrix) and Go modules (go matrix).
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.svc.outputs.services }}
      modules: ${{ steps.mod.outputs.modules }}
      smoke: ${{ steps.smoke.outputs.smoke }}
    steps:
      - uses: actions/checkout@v7

      - name: Discover services
        id: svc
        run: |
          services="$(hack/list-services.sh)"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Services: $services"

      - name: Discover Go modules
        id: mod
        run: |
          # Full set of Go module dirs = non-service modules + discovered services.
          # Derived by finding every dir that holds a go.mod under the known roots.
          modules="$(
            for d in backend/cli backend/core backend/k8s backend/services/*/ backend/sims/*/ backend/tools/*/; do
              [ -f "${d%/}/go.mod" ] && echo "${d%/}"
            done | jq -R . | jq -s -c .
          )"
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "Modules: $modules"

      - name: Build image-smoke module list
        id: smoke
        run: |
          # ko-buildable image modules = each discovered service (mapped to its
          # backend/services/<name> dir) PLUS the operator at backend/k8s.
          smoke="$(
            { hack/list-services.sh | jq -r '.[] | "backend/services/" + .'
              echo "backend/k8s"
            } | jq -R . | jq -s -c .
          )"
          echo "smoke=$smoke" >> "$GITHUB_OUTPUT"
          echo "Smoke modules: $smoke"

  # ---------------------------------------------------------------------------
  # Per-module Go validation: fmt, build, vet, test.
  # go.work makes the module the working directory for each matrix entry.
  # ---------------------------------------------------------------------------
  go:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          # Per-module cache key, NOT the shared "**/go.sum". Every matrix entry
          # hashing all go.sum files computed the SAME key, and a GitHub cache key is
          # write-once — so the first job to finish its post-step saved the cache and
          # every other entry skipped saving. The slowest module (outbound-connectors,
          # whose Bento tree is ~1,240 extra packages) is the LEAST likely to win that
          # race, so its build cache was almost never persisted and it recompiled Bento
          # cold on nearly every run. A per-module key gives each entry its own cache to
          # restore from.
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: gofmt
        working-directory: ${{ matrix.module }}
        run: |
          # gofmt -l prints files that need formatting; any output is a failure.
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      # graph-gophers/graphql-go silently discards input-object entries the schema
      # does not define when the value arrives through a VARIABLE (the literal path
      # rejects them correctly). The spec requires a request error, so a misnamed
      # field returning success is a fail-open: it yields a half-configured entity
      # that is indistinguishable from a correctly configured one. We carry the fix
      # in a fork until it lands upstream — see "Forked dependencies" in CLAUDE.md.
      #
      # A `replace` applies ONLY in the main module, so every module that resolves
      # graphql-go needs its own. Four modules (cli, mcp, dc-simulator,
      # migrationdiff) depend on it TRANSITIVELY and so are invisible to a grep of
      # go.mod — exactly how a module silently reverts to the unpatched library. The
      # check runs with GOWORK=off so it proves the module's own go.mod carries the
      # replace, rather than inheriting it from the workspace.
      - name: graphql-go fork guard
        working-directory: ${{ matrix.module }}
        env:
          # Pin the exact expected replacement. Matching only the module PATH would
          # accept github.com/devicechain-io/graphql-go@v1.10.2 — a real tag on the
          # fork that points at upstream's UNPATCHED code, since a fork inherits the
          # upstream tags. Matching the version closes that.
          WANT: "=> github.com/devicechain-io/graphql-go v1.10.2-dc.2"
        run: |
          set -o pipefail
          # Distinguish "not a dependency" (fine) from a genuine failure such as a
          # proxy outage or a broken go.mod. Swallowing both would let the guard
          # print "nothing to check" and pass while proving nothing.
          if ! stderr="$(GOWORK=off go list -m github.com/graph-gophers/graphql-go 2>&1 >/dev/null)"; then
            case "$stderr" in
              *"not a known dependency"*|*"not a required module"*|*"no required module provides"*)
                echo "graphql-go is not in this module's dependency graph; nothing to check."
                exit 0
                ;;
              *)
                echo "::error::Could not resolve graphql-go, so the fork could not be verified."
                echo "$stderr"
                exit 1
                ;;
            esac
          fi
          resolved="$(GOWORK=off go list -m github.com/graph-gophers/graphql-go)"
          echo "resolved: $resolved"
          case "$resolved" in
            *"$WANT"*) echo "OK: patched fork in use." ;;
            *)
              echo "::error::This module does not resolve the patched graphql-go fork."
              echo "Unknown GraphQL input fields would be silently dropped instead of rejected."
              echo "Expected a replacement matching: $WANT"
              echo "Fix with:"
              echo "  go mod edit -replace github.com/graph-gophers/graphql-go=github.com/devicechain-io/graphql-go@v1.10.2-dc.2"
              exit 1
              ;;
          esac

      - name: go test
        working-directory: ${{ matrix.module }}
        # The operator's controllers suite is a kubebuilder envtest scaffold with
        # no specs yet — it boots a control plane but asserts nothing, and is
        # environment-sensitive. Exclude it from unit CI; add a dedicated envtest
        # job when real controller specs land. All other packages run normally.
        run: |
          if [ "${{ matrix.module }}" = "backend/k8s" ]; then
            go test $(go list ./... | grep -v '/controllers$')
          else
            go test ./...
          fi

  # NOTE: a golangci-lint job is intentionally omitted for now — no golangci-lint
  # release yet supports Go 1.26 (it refuses: "the Go language version used to
  # build golangci-lint is lower than the targeted Go version"). gofmt + go vet
  # in the `go` job are the Go gates; re-add golangci-lint once a 1.26-compatible
  # release ships.

  # ---------------------------------------------------------------------------
  # Migrations: prove every area's chain still reproduces its golden schema.
  #
  # THIS IS THE ONLY THING THAT CHECKS THE MIGRATIONS AT ALL. The unit tests build
  # their schema by AutoMigrating the LIVE structs on SQLite; nothing but main.go
  # and this harness ever runs a gormigrate chain, and nothing but this runs it
  # against real Postgres + Timescale. A migration can therefore be broken, or
  # silently changed, with every other gate green.
  #
  # What it catches that review cannot: a migration is supposed to be frozen in
  # time, but it is written in Go, so anything it REFERENCES can move underneath
  # it — and the diff that moves it need not touch the migration, the service, or
  # even the module. A core/rdb mixin embedded in a migration's snapshot struct is
  # the live example (~111 of them across the areas today). Gorm's own conventions
  # are another: adding a TableName() to a model that lacked one silently renames
  # its indexes, because core/rdb pins the NamingStrategy TablePrefix and that
  # prefix applies only to DERIVED names. That one was found by this harness, on a
  # change that looked like pure cleanup and passed every other gate.
  #
  # If it fails: either the change was unintended — fix it — or the schema really
  # did change, in which case re-snapshot the goldens IN THE SAME PR
  # (hack/migration-diff.sh snapshot) so the diff shows a human what moved.
  # ---------------------------------------------------------------------------
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      # Runs the production rdb.RdbManager path against a throwaway TimescaleDB
      # the script starts in docker (present on ubuntu-latest), then diffs each
      # area's pg_dump against backend/tools/migrationdiff/golden/.
      - name: migration-diff verify
        run: hack/migration-diff.sh verify

  # ---------------------------------------------------------------------------
  # License header check (backend only, per CLAUDE.md).
  # ---------------------------------------------------------------------------
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Check SPDX headers
        # Go + hand-authored GraphQL/proto sources + the C# SDK. YAML and the
        # operator Dockerfile are excluded: those manifests are controller-gen-
        # generated, so a header would drift away on every `make manifests`
        # regeneration. .NET project/build files are excluded (addlicense has no
        # header style for them); the .cs sources are checked.
        run: >
          go run github.com/google/addlicense@latest -check
          -ignore '**/*.yaml' -ignore '**/Dockerfile'
          -ignore '**/*.csproj' -ignore '**/*.sln' -ignore '**/*.props'
          -ignore '**/bin/**' -ignore '**/obj/**'
          -ignore '**/migrationdiff/golden/*.sql'
          -f hack/license-header.txt backend sdks

  # ---------------------------------------------------------------------------
  # Frontend: codegen drift check, typecheck, unit tests, build.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Matches the frontend Dockerfile build stage (node:26-alpine) and
          # satisfies vite 8's engines floor (^20.19 || ^22.12 || >=24).
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Codegen drift check
        run: |
          # Regenerate and fail if the committed output in the console's src/gql
          # is stale (workspace layout: apps/console).
          npm run codegen
          git diff --exit-code -- apps/console/src/gql

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # C# SDK (sdks/csharp): restore, build both TFMs (netstandard2.1 + net8.0), test.
  # TreatWarningsAsErrors + IsAotCompatible keep the Unity/IL2CPP guarantee honest.
  # ---------------------------------------------------------------------------
  csharp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/csharp
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  # ---------------------------------------------------------------------------
  # Unity package (sdks/unity) tier-1 verification: compile the Runtime + Sample C# against real
  # UnityEngine reference assemblies (UnityEngine.Modules, reference-only) in BOTH platform branches
  # — desktop (#else) and WebGL (#if UNITY_WEBGL). Catches wrong-API / branch typos with no Editor,
  # license, or GUI. Editor/WebGL runtime behavior is out of scope here (game-ci + a browser smoke).
  # ---------------------------------------------------------------------------
  unity-compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Tier-1 compile check (both platform branches)
        run: ./sdks/unity/tools/UnityCompileCheck/compile-check.sh

  # ---------------------------------------------------------------------------
  # Helm chart: lint and template render.
  # ---------------------------------------------------------------------------
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: helm lint
        run: helm lint deploy/helm/devicechain

      - name: profile workloads
        # Renders EVERY profile and pins the workloads each one produces.
        #
        # This replaces a pair of render-to-/dev/null calls that caught template
        # errors and asserted nothing about the output. It still catches render
        # errors — a failed render fails the diff — but it also pins what an install
        # actually runs, which is what the published footprint measurement is taken
        # against. Moving a functional area into a profile used to invalidate that
        # number silently; now it fails here with instructions.
        #
        # It also covers telemetry and ingest-only, which were rendered by nothing.
        run: hack/check-profile-workloads.sh

  # ---------------------------------------------------------------------------
  # OpenTofu: format, init (no backend), validate.
  # ---------------------------------------------------------------------------
  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/opentofu
    steps:
      - uses: actions/checkout@v7

      - uses: opentofu/setup-opentofu@v2

      - name: tofu fmt
        run: tofu fmt -check -recursive

      - name: tofu init
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

  # ---------------------------------------------------------------------------
  # Image smoke build: ko builds each service image locally (no push). This
  # catches image-build breakage. The matrix covers the discovered services
  # plus the operator (backend/k8s).
  # ---------------------------------------------------------------------------
  image-smoke:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Discovered services (mapped to backend/services/<name>) plus the
        # operator at backend/k8s -- assembled by the discover job.
        module: ${{ fromJson(needs.discover.outputs.smoke) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          # Per-module cache key, NOT the shared "**/go.sum". Every matrix entry
          # hashing all go.sum files computed the SAME key, and a GitHub cache key is
          # write-once — so the first job to finish its post-step saved the cache and
          # every other entry skipped saving. The slowest module (outbound-connectors,
          # whose Bento tree is ~1,240 extra packages) is the LEAST likely to win that
          # race, so its build cache was almost never persisted and it recompiled Bento
          # cold on nearly every run. A per-module key gives each entry its own cache to
          # restore from.
          cache-dependency-path: ${{ matrix.module }}/go.sum

      # Pin ko rather than letting the action resolve its default "latest-release".
      # That resolution is, inside the action:
      #   tag=$(curl -L -s -u "username:${GH_TOKEN}" \
      #           https://api.github.com/repos/ko-build/ko/releases/latest | jq -r '.tag_name')
      # which makes every image-smoke job depend on GitHub's AUTHENTICATED API being
      # healthy at that moment — and when it is not, the action pipes an HTML error
      # page straight into jq, which dies with "Invalid numeric literal at line 1,
      # column 10" and an empty tag, failing the job in ~10s before anything is built.
      # That is exactly what took out all 12 image-smoke jobs on 2026-07-16: GitHub was
      # 503-ing authenticated api.github.com requests while unauthenticated ones still
      # returned 200, so the failure looked like a code problem and was not.
      #
      # A pinned version takes the action's `*)` branch (tag="${KO_VERSION}"), skipping
      # the lookup entirely; the binary then comes from the release-asset host, not the
      # API. It also makes the image build reproducible — the same ko for every run
      # rather than whatever shipped that morning, which is what pinning a build tool
      # is for. Bump this deliberately.
      - uses: ko-build/setup-ko@v0.10
        with:
          version: v0.19.1

      - name: ko build (local, no push)
        working-directory: ${{ matrix.module }}
        env:
          KO_DOCKER_REPO: ghcr.io/devicechain-io
        # --local loads to the runner's Docker daemon and never pushes to a
        # registry. --base-import-paths keeps the local tag deterministic.
        #
        # Retry with backoff: the distroless base (cgr.dev/chainguard/static)
        # lives on a public registry that intermittently returns
        # MANIFEST_UNKNOWN for the :latest tag, flaking otherwise-green builds.
        # The retry absorbs those transient blips without masking a real
        # build failure (which fails all three attempts deterministically).
        run: |
          for attempt in 1 2 3; do
            if ko build --local --base-import-paths ./; then
              exit 0
            fi
            echo "::warning::ko build attempt ${attempt}/3 failed (likely a transient base-image registry blip); retrying..." >&2
            sleep $((attempt * 15))
          done
          echo "::error::ko build failed after 3 attempts" >&2
          exit 1
