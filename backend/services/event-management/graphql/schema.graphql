#
# Event Management GraphQL Schema
#

# Pagination info for search results.
type SearchResultsPagination {
    pageStart: Int
    pageEnd: Int
    totalRecords: Int
}

# One anchor of an event: a tracked-relationship target the event is queryable by.
# Both the type (an entity class, e.g. "customer") and the token (that entity's
# stable per-tenant token) name the target across the service seam — never a
# device-management row id (ADR-044).
type EventAnchorRef {
    type: String!
    token: String!
}

# A persisted base event with token references resolved. The originating device is
# named by its token (ADR-044). Its tracked-relationship targets are recorded as a
# set of anchors in event_anchors (ADR-013 addendum 2026-07-01), exposed as `anchors`
# and queryable via the (type, token) search filter below; an event with no
# assignment simply has no anchor rows.
type Event {
    id: ID!
    deviceToken: String!
    eventType: Int!
    occurredTime: String
    processedTime: String
    source: String!
    altId: String
    anchors: [EventAnchorRef!]!
}

# A persisted location event.
type LocationEvent {
    id: ID!
    deviceToken: String!
    eventType: Int!
    occurredTime: String
    latitude: Float
    longitude: Float
    elevation: Float
}

# A persisted measurement event (one row per measurement entry). unit and dataType
# are denormalized from the bound metric definition (ADR-016) so the reading is
# self-describing; both are null for an undeclared measurement. dataType lets a
# consumer interpret value — e.g. render a 0/1 BOOLEAN measurement as false/true.
type MeasurementEvent {
    id: ID!
    deviceToken: String!
    eventType: Int!
    occurredTime: String
    name: String!
    value: Float
    classifier: String
    unit: String
    dataType: String
}

# A persisted alert event (one row per alert entry).
type AlertEvent {
    id: ID!
    deviceToken: String!
    eventType: Int!
    occurredTime: String
    type: String!
    level: Int!
    message: String
    source: String
}

# Relationship anchor used to filter events. The type names an entity class
# (e.g. "customer", "area") and the token is that entity's stable per-tenant token;
# together they filter the (anchorType, anchorToken) columns on event_anchors
# (ADR-044).
input EventAnchor {
    type: String!
    token: String!
}

# Criteria used when searching for events. Times are RFC3339 strings.
input EventSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceToken: String
    eventTypes: [Int!]
    startTime: String
    endTime: String
    anchor: EventAnchor
}

# Search results returned from a base event query.
type EventSearchResults {
    results: [Event!]!
    pagination: SearchResultsPagination!
}

# Search results returned from a location event query.
type LocationEventSearchResults {
    results: [LocationEvent!]!
    pagination: SearchResultsPagination!
}

# Search results returned from a measurement event query.
type MeasurementEventSearchResults {
    results: [MeasurementEvent!]!
    pagination: SearchResultsPagination!
}

# Search results returned from an alert event query.
type AlertEventSearchResults {
    results: [AlertEvent!]!
    pagination: SearchResultsPagination!
}

# Criteria for a server-side, time-bucketed measurement aggregation. Reuses the
# event search filters (device, event types, time range, anchor) plus an optional
# measurement-name filter. intervalSeconds is the time_bucket width and must be
# >= 1. Always bound this with a time range — it returns every matching bucket.
input MeasurementAggregationCriteria {
    deviceToken: String
    name: String
    eventTypes: [Int!]
    startTime: String
    endTime: String
    anchor: EventAnchor
    intervalSeconds: Int!
}

# One time bucket of aggregated measurement values for a single measurement name.
# bucketStart is the RFC3339 bucket start. Every standard aggregate is returned
# so one query can drive a chart under any aggregation; avg/min/max/sum are null
# for an all-null bucket and count is the number of non-null values.
type MeasurementBucket {
    bucketStart: String!
    name: String!
    avg: Float
    min: Float
    max: Float
    sum: Float
    count: Int!
}

# Contains queries executed against model.
type Query {
    events(criteria: EventSearchCriteria!): EventSearchResults!
    locationEvents(criteria: EventSearchCriteria!): LocationEventSearchResults!
    measurementEvents(criteria: EventSearchCriteria!): MeasurementEventSearchResults!
    alertEvents(criteria: EventSearchCriteria!): AlertEventSearchResults!
    bucketedMeasurements(criteria: MeasurementAggregationCriteria!): [MeasurementBucket!]!
}

# Events are written by the persistence pipeline, not via the API.
type Mutation {
    _empty: Boolean
}

# Live event streams (ADR-037). Each field pushes events to the subscriber as
# they flow through the resolve pipeline — the same resolved events that are
# persisted — scoped to the subscriber's tenant. A subscription streams from
# subscribe time onward with no historical backfill; use the queries for history.
type Subscription {
    # Streams measurement events as they resolve, optionally filtered to one
    # device (by token) and/or one measurement name. Drives live charts, gauges,
    # and cards. Named measurementStream (not measurementEvents, the historical
    # query) since both fields resolve off the one root resolver.
    measurementStream(deviceToken: String, name: String): MeasurementEvent!
}

schema {
    query: Query
    mutation: Mutation
    subscription: Subscription
}
