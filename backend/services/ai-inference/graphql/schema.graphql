#
# AI Inference GraphQL Schema — the DATA plane (ADR-056)
#
# This is the tenant-facing surface, and it is deliberately tiny: one call, made on
# behalf of a tenant's NL→rule authoring request. Everything an OPERATOR does —
# registering providers, their write-only API keys, granting them to tiers, smoke-
# testing an endpoint — lives on the instance-scoped admin plane instead
# (admin_schema.graphql, served at /admin/graphql behind an identity token).
#
# The split is the ADR-065 correction. The AIProvider list was always an
# instance-scoped, operator-managed resource, but it was served HERE, on the plane
# that authenticates tenant access tokens — so the only way to reach it was from
# inside a tenant, and the console put the screen there. A tenant does not
# administer providers; it only CONSENTS to external routing (the per-tenant
# ai_external_enabled flag on user-management, ADR-056 §6).

# Static service identity — the deployed functional area (non-sensitive).
type ServiceInfo {
    area: String!
}

# An inference request: the user prompt plus an optional system prompt. The
# output-token cap, the provider endpoint, and the call timeout are server-side (the
# fail-closed service config + the resolved provider row), never caller-supplied.
input InferenceRequest {
    # The user prompt (required).
    prompt: String!
    # An optional system prompt (instructions/persona).
    system: String
}

# The result of an inference call: the candidate the provider produced (returned
# verbatim — validated downstream by the deterministic rule compiler, not trusted
# here), the model that answered, and the provider token that served it.
type InferenceResult {
    candidate: String!
    model: String!
    provider: String!
}

type Query {
    # Non-sensitive service identity (the deployed functional area).
    aiInferenceInfo: ServiceInfo!
}

type Mutation {
    # Run a prompt through the tenant's DEFAULT model for its NL→rule authoring request
    # (ADR-056 Zone 1). Gated by the least-privilege ai:infer authority; the tenant
    # comes from the caller's token. Fails closed when the tenant's tier offers no model,
    # the provider is disabled, the tenant has not opted in to external routing, or no
    # API key is set. The candidate is validated downstream by the rule compiler.
    inferRuleCandidate(request: InferenceRequest!): InferenceResult!
}

schema {
    query: Query
    mutation: Mutation
}
