{{/*
The web console: a static nginx Deployment + Service serving the Vite/React SPA
(frontend/Dockerfile). It is not a functional area — it runs no Go core, exposes
no GraphQL, and talks to the services only from the browser over the ingress —
so it is rendered here as a standalone workload rather than through the area loop.

The ingress serves this Service at "/" (templates/ingress.yaml); /api/<area> is
routed to the per-area Services instead. Disabled by setting frontend.enabled=false
(e.g. a headless/ingest-only instance that needs no UI).

The image is nginx-unprivileged: it listens on 8080 as uid 101 and writes its pid
and temp paths under /tmp, so it runs non-root with a read-only root filesystem
given a writable /tmp (the emptyDir below). This mirrors the services' C3 hardening
without their shared securityContext (nginx is not a FROM-scratch static binary).
*/}}
{{- if .Values.frontend.enabled }}
{{- $fe := .Values.frontend }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.instance.id }}
  labels:
    {{- include "devicechain.areaLabels" (dict "root" . "area" "frontend") | nindent 4 }}
spec:
  replicas: {{ $fe.replicas | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "devicechain.areaLabels" (dict "root" . "area" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devicechain.areaLabels" (dict "root" . "area" "frontend") | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "devicechain.serviceAccountName" . }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ include "devicechain.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          resources:
            {{- $fe.resources | default .Values.resources | toYaml | nindent 12 }}
          volumeMounts:
            # nginx-unprivileged writes its pid + temp paths under /tmp; a writable
            # emptyDir there keeps the rest of the rootfs read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.instance.id }}
  labels:
    {{- include "devicechain.areaLabels" (dict "root" . "area" "frontend") | nindent 4 }}
spec:
  selector:
    {{- include "devicechain.areaLabels" (dict "root" . "area" "frontend") | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
{{- end }}
