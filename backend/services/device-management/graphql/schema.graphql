    deletedAt: String
    token: String!
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    metadata: String
}

# Data required to create a device group.
input DeviceGroupCreateRequest {
    token: String!
