syntax="proto3";

option go_package = "/proto";

package io.devicechain.devicemanagement;

/**
 * Enumeration of failure reasons.
 */
enum FailureReason {
    Unknown = 0; // Failed for unknown reason
    Invalid = 1; // Event was not able to be parsed
    ApiCallFailed = 2; // API call required for resolution failed
    DeviceNotFound = 3; // Device token could not be resolved to a device
    Unauthenticated = 4; // Presented device credential was missing or invalid (ADR-014)
}

/**
 * Event that could not be processed.
 */
message PFailedEvent {
    FailureReason reason = 1;
    string service = 2;
    string message = 3;
    string error = 4;
    bytes payload = 5;
}

/**
 * A single resolved anchor: one of the device's tracked relationships at event
 * time, denormalized so the event is queryable by that (type, token) dimension
 * (ADR-013/044). The target is addressed by its stable per-tenant token, not a
 * device-management row id, so the reference stays valid across the service seam.
 * A device with several tracked relationships yields several anchors.
 */
message PResolvedAnchor {
	string anchor_type = 1;
	string anchor_token = 2;
	uint64 relationship_id = 3;
}

/**
 * One rule-scoped dynamic-group version an event belongs to (ADR-062): the group's
 * per-tenant token and the frozen selector version the membership was computed
 * against. Carried on the resolved event so the DETECT engine's scope check is a set
 * test on the replayed bytes (replay-correct by construction).
 */
message PScopeMembership {
	string group_token = 1;
	int32 version = 2;
}

/**
 * Event that was successfully resolved. It carries the full set of the device's
 * tracked-relationship anchors (empty when the device is unassigned). The source
 * device is addressed by its token (ADR-044): the numeric row id never crosses the
 * seam to event-management / device-state.
 *
 * device_type_token and profile_version_token denormalize the device's rule-scoping
 * identity at resolve time (ADR-051): the device-type token and a
 * "{profileToken}@{version}" token naming the active PUBLISHED profile version
 * (ADR-045) whose rules apply. event-processing's DETECT engine selects which
 * rules apply to an event from these tokens without a graph read back into
 * device-management. profile_version_token is empty when the type has no profile
 * or the profile is unpublished (no active version) — the device has no resolvable
 * rules, the same limiting case as an unclassified measurement.
 */
 message PResolvedEvent {
	// Field numbers 5 and 6 previously held target_type/target_id (removed in #134
	// when the anchor set replaced the single target); reserved so they are never
	// re-decoded from a retained/replayed pre-#134 message on this durable stream.
	reserved 5, 6;
	reserved "target_type", "target_id";
	string source = 1;
	optional string alt_id = 2;
	string source_device_token = 3;
	repeated PResolvedAnchor anchors = 4;
    string occurred_time = 7;
    string processed_time = 8;
    int64 event_type = 9;
    bytes payload = 10;
	optional string device_type_token = 11;
	optional string profile_version_token = 12;
	// The rule-scoped dynamic-group versions the device + its anchors belong to
	// (ADR-062), stamped at resolve time; empty when no rule references such a group.
	repeated PScopeMembership scope_memberships = 13;
}

/**
 * Payload for resolved new relationship request. The target is a uniform
 * (type, id) reference (ADR-013).
 */
 message PResolvedNewRelationshipPayload {
	uint64 relationship_type_id = 1;
    optional string target_type = 2;
    optional uint64 target_id = 3;
}

/**
 * Single location entry for a location payload.
 */
 message PResolvedLocationEntry {
    optional string latitude = 1;
    optional string longitude = 2;
    optional string elevation = 3;
    optional string occurred_time = 4;
}

/**
 * Payload for a location event.
 */
message PResolvedLocationsPayload {
    repeated PResolvedLocationEntry entries = 1;
}

/**
 * Single measurement entry for a measurement payload. unit and data_type are
 * denormalized from the bound metric definition at resolve time (ADR-016) — as of
 * the profile's active PUBLISHED version, alongside the classifier — so the stored
 * measurement is self-describing on read without a cross-service hop back into
 * device-management, and stays consistent for historical rows across a later
 * republish. Both are absent for an undeclared (unbound) measurement.
 */
 message PResolvedMeasurementEntry {
    string name = 1;
    string value = 2;
    optional uint64 classifier = 3;
    optional string unit = 4;
    optional string data_type = 5;
}

/**
 * Single measurement entry for a measurement payload.
 */
message PResolvedMeasurementsEntry {
    repeated PResolvedMeasurementEntry measurements = 1;
    optional string occurred_time = 2;
}

/**
 * Payload for a measurement event.
 */
message PResolvedMeasurementsPayload {
    repeated PResolvedMeasurementsEntry entries = 1;
}

/**
 * Single alert entry for an alerts payload.
 */
message PResolvedAlertEntry {
    string type = 1;
    uint32 level = 2;
    string message = 3;
    string source = 4;
    optional string occurred_time = 5;
}

/**
 * Payload for an alert event.
 */
message PResolvedAlertsPayload {
    repeated PResolvedAlertEntry entries = 1;
}

/**
 * Payload for a resolved device presence state-change event (ADR-067). Distinct
 * from PAlarmStateChangeEvent (ADR-041), which is an alarm transition envelope.
 */
message PResolvedStateChangePayload {
    string state = 1;
    string reason = 2;
    uint64 session_id = 3;
    optional string occurred_time = 4;
}

/**
 * Alarm state-change event (ADR-041): re-emitted whenever a raised alarm
 * transitions (raised/escalated/de-escalated/cleared/acknowledged). It is a
 * snapshot of the alarm after the transition plus the transition kind and the
 * prior severity (for a severity change), and is the substrate for graphql-ws
 * subscriptions (ADR-037) and notifications (ADR-017).
 */
message PAlarmStateChangeEvent {
    string event_type = 1;
    string alarm_token = 2;
    string originator_type = 3;
    uint64 originator_id = 4;
    string alarm_key = 5;
    string metric_key = 6;
    string state = 7;
    string severity = 8;
    bool acknowledged = 9;
    optional string previous_severity = 10;
    optional string acknowledged_by = 11;
    optional double last_value = 12;
    optional string message = 13;
    string occurred_time = 14;
    string raised_time = 15;
}

/**
 * Entity-deletion event (ADR-044): emitted when an edge entity is deleted in
 * device-management so cross-service reference holders (event-management's
 * event_anchors) can drop dangling references. The entity is named by both its
 * uniform (type, token) address (ADR-013/042) and its raw row id — the id is what
 * event_anchors currently key on, the token is for logging and the future
 * token-reference reshape (ADR-044 decision 4). The tenant travels on the subject,
 * not in the payload.
 */
message PEntityDeletedEvent {
    string entity_type = 1;
    uint64 entity_id = 2;
    string entity_token = 3;
    string deleted_time = 4;
}

/**
 * One published detection rule inside a PDetectionRulesPublishedEvent: its
 * authoring token (unique per profile, ADR-042) plus the opaque rules.Rule JSON
 * document (ADR-051 slice 4b-1). device-management never parses the definition
 * taxonomy — it is compiled by event-processing's single-homed DETECT compiler on
 * consume, the same compiler the ADR-044 publish gate ran (slice 4b-2).
 */
message PPublishedDetectionRule {
    string token = 1;
    string definition = 2;
    // Optional group scope (ADR-062 S4): the published dynamic entity-group version
    // whose members the rule fires for. Empty token / version 0 ⇒ an unscoped
    // (profile-wide) rule; a non-empty token ⇒ the engine fires the rule only for events
    // whose scope_memberships include {entity_group_token}@{entity_group_version}.
    string entity_group_token = 3;
    int32 entity_group_version = 4;
}

/**
 * Detection-rules-published event (ADR-051 slice 4b-3): emitted post-commit when a
 * device profile is published, carrying the ENABLED detection rules frozen into the
 * new immutable version so event-processing's DETECT engine can run them. The rules
 * are keyed on the immutable profile_version_token ("{profileToken}@{version}",
 * ADR-045) — the same token a resolved event denormalizes (PResolvedEvent field 12) —
 * so the engine scopes them read-free and a rollback needs no new fact (the target
 * version's rules are already loaded). Disabled rules are omitted: they ride the
 * frozen snapshot but are inert until a later publish enables them. The tenant travels
 * on the per-tenant subject, not in the payload.
 */
message PDetectionRulesPublishedEvent {
    string profile_version_token = 1;
    repeated PPublishedDetectionRule rules = 2;
    string published_at = 3;
}

/**
 * Device-roster event (ADR-051 slice 4c-2): emitted post-commit when a device is
 * created or re-typed, naming the device and the STABLE profile token its type
 * adopts (ADR-045) — deliberately the profile token, not the "{profileToken}@{version}"
 * token, so a re-publish that mints a new version never staleness-orphans the roster
 * entry (event-processing cross-references the latest published version at arming
 * time). expected_since is the device's creation time: the base of the dead-man clock
 * for a device that has NEVER reported, so event-processing can arm absence for it
 * (the reported-once-then-silent case is already covered by the heartbeat-armed timer).
 * profile_token is empty when the type has no profile — a roster entry with no
 * resolvable rules, retained so a later re-type re-homes it. The tenant travels on the
 * per-tenant subject, not in the payload.
 */
message PDeviceRosterEvent {
    string device_token = 1;
    string profile_token = 2;
    string expected_since = 3;
}

/**
 * Device-attribute event (ADR-051 slice 4c-3): emitted post-commit when a numeric,
 * platform-set attribute of a DEVICE is upserted or deleted, so event-processing can
 * resolve a DYNAMIC detection threshold from it — a rule of the form
 * "m[metric] <op> attr[key]" reads the device's own attribute instead of a
 * compile-time literal, so one published rule enforces a per-device limit. Only
 * numeric device attributes (ADR-012 value type DOUBLE or LONG) in the two
 * platform-set scopes (SHARED or SERVER) are emitted: CLIENT (device-reported) is
 * excluded so a device cannot set the limit it is checked against. A non-numeric
 * value or type emits a removal (removed=true) so a previously-projected numeric value
 * never goes stale, as does an attribute delete. value is the parsed number (unset
 * when removed). updated_at is the write time — the monotonic clock event-processing
 * orders upsert-vs-delete on.
 *
 * scope is part of the identity: an attribute's natural key is (entity, scope, key), so
 * a device may hold the SAME key in both eligible scopes at once. The fact therefore
 * carries scope, and event-processing keys its projection on (device, scope, key) so a
 * write/delete in one scope never annihilates the other. The rule language stays
 * scope-less (attr["key"]); event-processing flattens the two scopes at eval time with a
 * fixed precedence — SERVER over SHARED (a platform-only override beats the
 * device-readable value). The tenant travels on the per-tenant subject, not in the
 * payload.
 *
 * A device DELETE emits NO attribute fact (its attributes are hard-deleted in the delete
 * cascade); event-processing drops the device's whole attribute projection off the
 * entity-deleted fact instead, exactly as the device roster does.
 */
message PDeviceAttributeEvent {
    string device_token = 1;
    string attr_key = 2;
    string scope = 3;
    double value = 4;
    bool removed = 5;
    string updated_at = 6;
}
