#
# Event Processing GraphQL Schema
#
# The rule-authoring home is device-management (rules are PROFILE-homed, ADR-053 §5 /
# ADR-045); event-processing owns the DETECT schema and its cel-go compiler. The one
# surface here is the ADR-044 SYNCHRONOUS validation gate device-management calls at
# profile publish so a profile carrying an uncompilable rule fails closed.
#

type Query {
    # Identity/liveness probe for the event-processing service.
    eventProcessingInfo: EventProcessingInfo!

    # Validate a batch of detection-rule definitions (opaque rules.Rule JSON) by
    # decoding, compiling, and cost-gating each through the DETECT compiler — the
    # single-homed authority for rule structure, type coherence, CEL type-checking, and
    # the ADR-023 predicate-cost ceiling. This is the ADR-044 validate-invariants-sync
    # gate: device-management invokes it at profile publish (over the service-token
    # svcclient), submitting the profile's ENABLED draft rules, and refuses to publish
    # if any of them does not compile (a disabled rule is inert and is not submitted).
    # Pure validation — no state is read or written, so it is safe to call repeatedly.
    validateDetectionRules(rules: [DetectionRuleInput!]!): DetectionRuleValidationResult!

    # Compile a visual automation canvas (ADR-053) to its DETECT rule definition — the
    # server-authoritative graph→schema pass (slice 9a). The graph is the opaque
    # CanvasDefinition JSON the console editor emits; profileToken scopes it (every Source
    # node must be profile-scoped to it). It partitions the graph at its condition node,
    # lowers it through the SAME compiler + cost gate the form builder uses, and returns the
    # compiled rules.Rule definition (byte-identical to the equivalent form rule) plus any
    # node-anchored diagnostics. The GA profile-homed canvas authors exactly ONE rule, so a
    # graph with zero or many condition nodes is rejected with a diagnostic. Pure validation —
    # no state is read or written; the browser never authors the definition directly. Gated
    # on device:read.
    compileCanvas(graph: String!, profileToken: String!): CanvasCompileResult!

    # Per-rule health for a device profile's ACTIVE published version (ADR-051 slice 7b):
    # for each live DETECT rule, its status, last-fired time, and lifetime fire count. It
    # joins the durable rule projection (the engine's live rule set) with the RuleStat firing
    # projection, resolving the profile's active version from the ProfileActive projection.
    # Tenant-scoped to the caller's tenant. An unpublished profile (no active version) returns
    # an empty list. Read-only; gated on device:read.
    ruleHealth(profileToken: String!): [RuleHealth!]!

    # Run a DRAFT detection rule against REPLAYED history and report the RAISE/RESOLVE edges it
    # WOULD have produced (ADR-053 slice 9d) — the "what would this rule have done?" headline. The
    # draft is named by exactly one of `graph` (a CanvasDefinition JSON) or `ruleDefinition` (a
    # rules.Rule JSON); `start`/`end` are the RFC3339 occurred-time window (capped to the most
    # recent 24h). It builds a THROWAWAY in-memory DETECT core over an ephemeral replay consumer and
    # COLLECTS edges instead of publishing, so it never perturbs the live singleton (no snapshot
    # write, no production-durable ack, no live-state mutation). A compile failure returns ok=false
    # with node-anchored diagnostics; an unpublished profile, an aged-out window, or the scan cap
    # returns a degraded but non-error result. Tenant-scoped; read-only; gated on device:read.
    previewRule(input: PreviewRuleInput!): PreviewResult!
}

# Input to previewRule. Exactly one of graph or ruleDefinition names the draft.
input PreviewRuleInput {
    # A CanvasDefinition JSON (the console canvas editor's graph).
    graph: String
    # A rules.Rule JSON (the form builder's definition).
    ruleDefinition: String
    # The profile whose published history the draft previews against.
    profileToken: String!
    # RFC3339 occurred-time window bounds.
    start: String!
    end: String!
    # When true, each firing carries a per-node trace (slice 9e) reconstructing what each canvas node
    # did for that firing — for the console's canvas overlay. Off by default (the trace is only useful
    # to the graph editor); ignored for a ruleDefinition draft, which has no canvas node map.
    trace: Boolean
}

# The outcome of a replay preview.
type PreviewResult {
    # True when the draft compiled and the replay ran (even if it found zero firings). False only on
    # a compile failure, whose reasons are in diagnostics.
    ok: Boolean!
    # The RAISE/RESOLVE timeline the draft would have produced, ordered by time.
    firings: [PreviewFiring!]!
    # Coverage counters for the run.
    stats: PreviewStats!
    # A human-readable reason the result is PARTIAL (history aged out below the window, the scan cap
    # was hit, the window was capped, the profile is unpublished, or a concurrent-preview refusal) —
    # null on a complete result.
    degraded: String
    # Compile diagnostics when ok is false (node-anchored, reusing the canvas diagnostic shape).
    diagnostics: [CanvasDiagnostic!]!
}

# One edge the draft would have emitted.
type PreviewFiring {
    # RFC3339 occurred time of the edge.
    occurredAt: String!
    # The series (device token, or anchor token for a correlation rule) the edge is for.
    series: String!
    # "raised" (rising edge) or "resolved" (falling edge).
    signal: String!
    # The per-node trace for this firing (slice 9e) — what each canvas node did, source→condition→
    # (branch…)→action. Empty unless the request set input.trace and the draft is a canvas graph. A
    # branch feeding two actions appears once per action path (its disposition is identical across them).
    trace: [NodeTraceStep!]!
}

# One canvas node's disposition for a single firing (slice 9e node trace).
type NodeTraceStep {
    # The canvas node id this step is about (matches a node in the request's graph).
    nodeId: String!
    # The node category: "source" | "condition" | "branch" | "action".
    kind: String!
    # What the node did for this firing: "delivered" (source); "raised"/"resolved" (condition, and
    # "raised" for a raiseAlarm that fired); "passed"/"blocked"/"skipped" (branch); "sent"/"cleared"/
    # "inert"/"skipped" (action).
    disposition: String!
    # Optional human context (why a branch blocked, why an action was inert) — null when the
    # disposition is self-explanatory.
    detail: String
}

# Coverage counters for a preview run.
type PreviewStats {
    # How many in-scope events were processed.
    eventsScanned: Int!
    # How many edges were produced.
    firingCount: Int!
    # How many in-scope samples a rule's leaf could not evaluate (a predicate error). Nonzero drives
    # a degraded note so a rule that errors is not mistaken for a quiet one.
    evalErrors: Int!
    # Wall-clock milliseconds the replay took (server-side).
    wallMs: Int!
}

# The lifecycle status of a live detection rule (ADR-051 slice 7b). DISABLED_BY_BUDGET is
# reserved for when state-budget enforcement lands (slice 6c-2 — unbuilt today, so never
# returned yet); until then a projected rule is ACTIVE unless it no longer compiles.
enum RuleStatus {
    # The rule compiles under the current limits and is running.
    ACTIVE
    # The projected rule no longer compiles under the current compile limits (e.g. a tightened
    # cost ceiling) — it is surfaced so the author can see and re-author it, rather than failing
    # silently. A rule that failed to compile at publish never reaches the projection (publish
    # fails closed), so this only catches a rule that stopped compiling after it was published.
    COMPILE_ERROR
}

# Health of one live detection rule.
type RuleHealth {
    # The composed runtime rule id "{tenant}/{profileVersionToken}/{ruleToken}".
    ruleId: String!
    # The rule's device-management token (its stable authoring id within the profile).
    ruleToken: String!
    # The rule's display name (from the authored definition), falling back to its token.
    name: String!
    # The composed status (ACTIVE / COMPILE_ERROR).
    status: RuleStatus!
    # RFC3339 logical time of the most recent fire, or null if the rule has never fired.
    lastFiredAt: String
    # Lifetime fire count (approximate — a replay may re-count; see RuleStat). Zero if never fired.
    fireCount: Int!
    # The edge of the most recent fire ("raised"/"resolved"), or null if never fired.
    lastSignal: String
    # A human-readable diagnostic when status is COMPILE_ERROR, else null.
    message: String
}

type Subscription {
    # Streams a device profile's DETECT detections as they fire (ADR-037 / ADR-057, slice 7c):
    # every firing whose rule belongs to the profile, RAISED or RESOLVED, including a rule with
    # no alarm action (a pure signal the alarm stream would miss). Live from subscribe time
    # onward, no backfill; torn down on disconnect. Tenant-scoped; gated on device:read.
    detectionStream(profileToken: String!): DetectionEvent!
}

# One DETECT detection on the live feed.
type DetectionEvent {
    # The composed runtime rule id that fired.
    ruleId: String!
    # The firing rule's device-management token (parsed from the id) — links a firing to its rule.
    ruleToken: String!
    # The rule type ("threshold", "absence", …).
    kind: String!
    # The transition ("raised" / "resolved", ADR-057).
    edge: String!
    # The keyed series — the device token, or the anchor token for a correlation rule.
    series: String!
    # RFC3339 logical (event) time the detection is stamped at.
    occurredTime: String!
    # The detection tier (ADR-041), null when the rule declares none.
    severity: String
    # The triggering scalar (raised edge only), null otherwise.
    value: Float
}

# Service identity returned by the scaffold query.
type EventProcessingInfo {
    # The functional area this service serves ("event-processing").
    functionalArea: String!
}

# The outcome of compiling one automation canvas (ADR-053 slice 9a).
type CanvasCompileResult {
    # True only if the graph partitioned, lowered to exactly one rule, and passed the cost
    # gate. A save/publish proceeds only when this is true.
    ok: Boolean!
    # The compiled rules.Rule JSON the console stores on DetectionRule.Definition — null when
    # !ok. It decodes to the same rules.Rule as the equivalent form-authored rule and
    # re-marshals to identical canonical bytes (§3.2); the two surfaces' verbatim stored
    # strings may differ in key order, since nothing compares rule bytes.
    definition: String
    # The compiled predicate's static worst-case cost (the ADR-023 gate cleared) — null when !ok.
    estimatedCost: Int
    # One entry per problem, each anchored to the offending node (null nodeId ⇒ a graph-level
    # problem). Empty when ok.
    diagnostics: [CanvasDiagnostic!]!
}

# A single canvas compile diagnostic the console surfaces on its node.
type CanvasDiagnostic {
    # The offending node's id, or null for a graph-level problem (a cycle, a dangling edge).
    nodeId: String
    # The severity ("error" today; "warning" reserved).
    severity: String!
    # Human-readable, console-surfaceable message.
    message: String!
}

# A single detection rule handed to the validation gate: the authoring token (used to
# anchor error messages and as the compile-time rule-id placeholder — the authoritative
# runtime id is composed when the published-rule fact is emitted) plus the opaque
# rules.Rule JSON definition to compile.
input DetectionRuleInput {
    # The rule's device-management token, for error anchoring.
    token: String!
    # The opaque rules.Rule JSON definition to compile.
    definition: String!
    # Whether the rule carries a group scope (ADR-062 S4). device-management forwards this so
    # the gate — which parses the taxonomy — can reject a scope on a kind it cannot apply to
    # (absence / correlation) with an author-facing error, rather than the runtime silently
    # skipping the rule. Defaults to false (unscoped) when omitted.
    groupScoped: Boolean = false
}

# The outcome of validating a batch of detection-rule definitions.
type DetectionRuleValidationResult {
    # True only if every submitted definition decoded, compiled, and passed the cost
    # gate. A publish proceeds only when this is true.
    valid: Boolean!
    # One entry per rejected definition (empty when valid), each naming the offending
    # rule and a console-surfaceable reason.
    errors: [DetectionRuleValidationError!]!
}

# A single rejected detection rule.
type DetectionRuleValidationError {
    # Zero-based index of the offending definition in the submitted list.
    index: Int!
    # The rejected rule's token (echoed from the input), for the console to name it.
    token: String!
    # Human-readable, console-surfaceable reason the rule did not compile.
    message: String!
}
