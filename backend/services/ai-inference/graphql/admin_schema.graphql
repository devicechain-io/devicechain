#
# AI Inference ADMIN GraphQL Schema (ADR-056 §4, re-homed by ADR-065)
#
# The INSTANCE-scoped, operator-managed provider list: register providers, pick THE
# active one ("default of none"), smoke-test an endpoint before promoting it. Served
# at /admin/graphql behind an IDENTITY token, in the system context across tenants —
# the same shape user-management's admin API uses (ADR-033).
#
# Why this is a separate plane and not just a set of ai:admin fields on the data
# plane (the ADR-065 origin story): ai-inference validated tenant access tokens
# only, so an operator could reach these fields only from inside a tenant. That is
# backwards for instance config, and it was not merely cosmetic — the seeded
# `tenant-admin` role grants "*", which satisfied every ai:admin check. The plane
# is the enforcement: an access token cannot authenticate here at all. The tier rule
# in core/auth (a tenant access token can never satisfy a system-tier authority) is
# the belt to this suspenders.
#
# API keys are write-only. A `secret` goes IN on create/update and is sealed in the
# ADR-059 envelope-encrypted secret store; it never comes back out — the read side
# exposes only `hasSecret`.

# Pagination info for search results.
type SearchResultsPagination {
    pageStart: Int
    pageEnd: Int
    totalRecords: Int
}

# An instance-scoped, operator-managed inference-provider config (ADR-056 §4). The
# `kind` selects the provider implementation (`anthropic` at GA); `endpoint`
# overrides the kind's default base URL (for a self-hosted / proxied model); `params`
# is the opaque per-kind tuning document. The API key is never returned — `hasSecret`
# reports only whether one is configured.
type AiProvider {
    id: ID!
    createdAt: String
    updatedAt: String
    token: String!
    name: String
    description: String
    # One of the registered provider kinds (see the aiProviderKinds query).
    kind: String!
    # The provider API base URL, or null for the kind's built-in default.
    endpoint: String
    # The provider model id (e.g. "claude-opus-4-8").
    model: String!
    # The opaque per-kind inference params (a JSON object), or null.
    params: String
    # Whether this provider may be resolved and used.
    enabled: Boolean!
    # Whether this is THE active provider used by default for inference. At most one
    # provider is active; none active is the valid "default of none" (feature off).
    active: Boolean!
    # Whether an API key is configured, without exposing it.
    hasSecret: Boolean!
}

# Data to create or update a provider. `secret` (the API key) is write-only: omit it
# on update to preserve the stored key, send a value to replace it, or send an empty
# string to clear it. On create, omit or empty means no key yet.
input AiProviderCreateRequest {
    token: String!
    name: String
    description: String
    kind: String!
    endpoint: String
    model: String!
    params: String
    enabled: Boolean!
    secret: String
}

# Criteria used when searching for providers.
input AiProviderSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    kind: String
}

# Search results returned from a provider query.
type AiProviderSearchResults {
    results: [AiProvider!]!
    pagination: SearchResultsPagination!
}

# An inference request: the user prompt plus an optional system prompt. The
# output-token cap, the provider endpoint, and the call timeout are server-side,
# never caller-supplied.
input InferenceRequest {
    # The user prompt (required).
    prompt: String!
    # An optional system prompt (instructions/persona).
    system: String
}

# The result of an inference call.
type InferenceResult {
    candidate: String!
    model: String!
    provider: String!
}

type Query {
    # Look up a single provider by its token (requires ai:admin).
    aiProvider(token: String!): AiProvider
    # Search providers by criteria (requires ai:admin).
    aiProviders(criteria: AiProviderSearchCriteria!): AiProviderSearchResults!
    # The registered provider-kind vocabulary, for a console picker (requires ai:admin).
    aiProviderKinds: [String!]!
    # THE active provider, or null when none is active ("default of none").
    activeAiProvider: AiProvider
}

type Mutation {
    # Create a new provider (never active on create — promote it with setAiProvider).
    createAiProvider(request: AiProviderCreateRequest!): AiProvider!
    # Update the provider with the given (current) token. When expectedUpdatedAt is
    # supplied it is an optimistic-concurrency precondition: the update fails (CONFLICT)
    # if the provider's updatedAt has changed since. `active` is not changed here.
    updateAiProvider(token: String!, request: AiProviderCreateRequest!, expectedUpdatedAt: String): AiProvider!
    # Delete the provider with the given token (and its key). Returns whether a row was
    # deleted. Deleting the active provider leaves the platform with none active.
    deleteAiProvider(token: String!): Boolean!
    # Promote the provider with the given token to THE active one, clearing any previous.
    setActiveAiProvider(token: String!): AiProvider!
    # Clear the active provider (return to "default of none"). Returns true always.
    clearActiveAiProvider: Boolean!
    # Smoke-test a SPECIFIC provider (by token) with an operator-supplied prompt — the
    # affordance to validate a provider's endpoint + key before promoting it. It applies
    # no tenant-consent gate (operator config, an operator prompt, no tenant data
    # crosses the boundary), but the provider's key must still resolve.
    testAiProvider(token: String!, request: InferenceRequest!): InferenceResult!
}

schema {
    query: Query
    mutation: Mutation
}
