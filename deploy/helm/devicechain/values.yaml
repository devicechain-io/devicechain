# DeviceChain Helm values.
#
# Deployment selection (ADR-022 decision 2): set exactly one of `profile` or
# `enabledFunctionalAreas`. An empty selection resolves to the `default` profile. The
# chart fails the render if the resulting set omits a required core area
# (user-management, device-management) or an enabled area's hard dependency.

# A named profile: one of "default", "full", "telemetry", "ingest-only".
#
#   default  the standard system: the whole device/telemetry/automation platform.
#   full     everything this build ships — `default` PLUS the three areas that reach
#            OUTSIDE the instance (ai-inference, outbound-connectors, mcp). Each of
#            those carries a decision to make deliberately (a paid provider key, an
#            egress surface, an agent-facing API), which is why they are not in
#            `default` — and each needs infrastructure.secrets.rootKey below.
#
# Left empty by default so an override file that sets `enabledFunctionalAreas` is not
# rejected for "setting both" against a baked-in profile (E19); an empty selection
# still resolves to `default` — never to `full`, since deploying an egress or AI
# surface should never follow from stating no intent at all.
profile: ""

# An explicit set of functional areas, as an alternative to `profile`.
# e.g. [user-management, device-management, event-sources]
enabledFunctionalAreas: []

# Extra Opaque Secrets rendered into the instance namespace (see
# templates/extra-secrets.yaml). Each entry becomes one Secret; project it into a
# functional area's env with that area's `extraEnv` secretKeyRef. Used for
# bootstrap-time provisioning of material the chart owns the namespace for — e.g. a
# LwM2M device PSK (`dcctl bootstrap --lwm2m-identities`). Values live in the Helm
# release (visible to `helm get values`), same trust class as the instance-config
# Secret; prefer an externally-managed Secret for production. stringData holds the
# value verbatim (for a PSK, the base64 PSK STRING the service decodes at load).
#   extraSecrets:
#     - name: dci-devicechain-lwm2m-psk
#       stringData:
#         DC_LWM2M_PSK_1: <base64-encoded pre-shared key>
extraSecrets: []

instance:
  # Instance identity: becomes DC_INSTANCE_ID and the target namespace.
  id: devicechain
  # Whether the chart creates the target namespace (disable if managed elsewhere).
  createNamespace: true
  # C2 (ADR-022 review): the instance config below carries persistence credentials
  # (persistence.*.password), so the chart renders it into a *Secret*, not a
  # ConfigMap, and mounts that Secret at /etc/dci-config. For production, prefer
  # External Secrets / a pre-created Secret over committing passwords here: set
  # `existingSecret` to the name of a Secret that already holds the full instance
  # config JSON under an `instance` key, and the chart will mount it and skip
  # rendering its own Secret (the `config` block below is then unused).
  existingSecret: ""
  # Instance-wide configuration mounted at /etc/dci-config/instance and read by
  # every service (infrastructure endpoints + persistence). Rendered verbatim as
  # JSON into a Secret; keys are matched case-insensitively to the Go config struct.
  config:
    infrastructure:
      nats:
        hostname: dc-nats.dc-system
        port: 4222
        streamReplicas: 1
        # Per-stream JetStream size ceilings (ADR-023): a per-stream platform bound
        # so a producer flood or a wedged consumer cannot grow one stream without
        # limit. Paired with DiscardOld retention, hitting a ceiling evicts the
        # OLDEST messages (size-based backpressure alongside the 7-day age window),
        # so size these for the retention a busy cluster needs. streamMaxMsgSize
        # mirrors the broker's default max_payload (1 MiB). Omitting a value (or
        # setting 0) falls back to the built-in platform default — never unlimited.
        # Raise them (and the broker max_payload / PV) for a high-throughput deploy.
        #
        # The byte ceiling is split by stream class, because JetStream reserves it UP
        # FRONT at creation: the platform's 16 streams would reserve 16 GiB at a
        # uniform 1 GiB, most of it on control-plane streams that never hold more than
        # a few MiB. streamMaxBytes applies to the 8 HOT streams (volume scales with
        # device count × message rate); streamMaxBytesCold applies to the 8
        # control-plane ones (see streams.All in backend/core/streams for the
        # classification — it is set in code, not here, so every service agrees on the
        # bound for a given stream). One hot stream, the device-events capture stream,
        # additionally caps itself below that bound (256 MiB), so the platform streams
        # reserve 8.25 GiB rather than 9. The MQTT gateway's own streams, bounded at
        # startup because nats-server creates them unlimited, add 384 MiB for
        # ~8.6 GiB total. The KV buckets (device caches, locks, refresh tokens,
        # OAuth codes) are bounded too and reserve a further 768 MiB, for ~9.4 GiB —
        # which fits the 12Gi JetStream PV, whose max_file_store ceiling is 10Gi,
        # leaving ~640 MiB genuinely unreserved. Note that ceiling
        # floors 90% of the PV's MAGNITUDE and reattaches the unit
        # (floor(12 * 0.9) = 10 → "10Gi"), so it is 10Gi and not 10.8 GiB — the
        # difference is 819 MiB of headroom that does not exist.
        #
        # streamMaxBytesCold must stay <= streamMaxBytes: lowering only the hot bound
        # (e.g. for a small-footprint deploy) inverts the two and makes control-plane
        # streams the largest on disk. Services REJECT an inverted pair at startup
        # rather than clamping it, and `dcctl bootstrap` runs the same check against
        # the rendered config BEFORE installing — so a partial edit is reported as a
        # sentence naming the two keys, not as a ten-minute wait for pods that will
        # never become ready. The same applies to kvCacheMaxBytes <= kvStateMaxBytes
        # below.
        #
        # NOTE this is enforced on every start, not only on a fresh install: an
        # existing instance already running an inverted pair will refuse to come back
        # up on its next restart. That is deliberate pre-GA — it was already running
        # with the bound on the wrong tier — but it means the fix belongs in the same
        # change as the upgrade.
        #
        # Raising these REQUIRES raising the PV (nats_jetstream_storage) to match, or
        # the last services to create a stream crashloop with "insufficient storage
        # resources available" — see that variable's comment for the full story.
        streamMaxBytes: 1073741824 # 1 GiB per hot stream
        streamMaxBytesCold: 134217728 # 128 MiB per control-plane stream
        streamMaxMsgs: 5000000 # 5M messages per stream
        streamMaxMsgSize: 1048576 # 1 MiB per message
        # The MQTT gateway's own streams. nats-server creates $MQTT_msgs, $MQTT_out
        # and $MQTT_qos2in with NO size limit and offers no setting to bound them,
        # yet they sit in the same account and draw on the same max_file_store as
        # everything above — so the platform bounds them itself at startup
        # (messaging.ReconcileMqttStores). Sized as working buffers, not retention
        # windows: $MQTT_msgs drains as QoS-1 subscribers ack. The QoS 2 pair is
        # smaller on purpose, since QoS 2 is refused by default and its buffers
        # should not reserve disk the recommended configuration never uses.
        mqttStoreMaxBytes: 268435456 # 256 MiB for the QoS>=1 message store
        mqttQoS2StoreMaxBytes: 67108864 # 64 MiB per QoS 2 store ($MQTT_out, $MQTT_qos2in)
        # The JetStream KV buckets (device caches, locks, refresh tokens, OAuth
        # codes). They are streams too — backed by KV_-prefixed streams in the same
        # account — so a bounded bucket reserves its ceiling up front like any other.
        #
        # The split keys on what a FULL bucket costs, not on how much it holds.
        # nats.go creates every KV bucket with DiscardNew, so a full one REFUSES
        # writes rather than evicting: a cache bucket degrades to a miss and the read
        # falls through to the database, while a state bucket fails the login, token
        # exchange, or lock acquisition that needed it. That is why the state tier
        # takes the LARGER ceiling despite holding far fewer entries — and why
        # kvCacheMaxBytes must stay <= kvStateMaxBytes: the cache buckets are the ones
        # that scale with fleet size, so they are the ones that must carry the smaller
        # bound. See kv.All in backend/core/kv for the per-bucket classification.
        kvCacheMaxBytes: 67108864 # 64 MiB per cache bucket (6 buckets)
        kvStateMaxBytes: 134217728 # 128 MiB per state bucket (3 buckets)
        # Client-side TLS to the broker (ADR-025). MUST match the broker: the
        # OpenTofu nats module terminates TLS on the 4222 + 1883 listeners and
        # emits its CA as the `nats_ca` output, which the bring-up threads in here
        # (enabled=true + ca=<PEM>). Off by default so the chart renders without a
        # CA; enabling without a matching broker cert (or vice versa) breaks every
        # client connection, so the two are always driven together.
        tls:
          enabled: false
          ca: ""
        # Broker authentication (ADR-025). When the NATS module has auth callout
        # enabled, the bring-up threads the shared service credential here so every
        # service authenticates, plus (device-management only) the callout issuer
        # seed. Empty = the broker requires no auth. Kept in lockstep with the
        # broker: enabling one without the other locks every service out.
        auth:
          user: ""
          password: ""
          calloutIssuerSeed: ""
      metrics:
        enabled: true
        httpPort: 9090
      userManagement:
        # user-management is a functional area deployed by THIS chart into the
        # instance namespace (not infra in dc-system), so peers reach it by its
        # in-namespace Service name. The short name resolves within the instance
        # namespace regardless of instance.id. (Was dc-user-management.dc-system,
        # a stale pre-Helm coordinate that does not exist under ADR-022 rendering.)
        hostname: user-management
        port: 8080
      deviceManagement:
        # device-management is reached in-cluster by its instance-namespace Service
        # name for synchronous cross-service calls (ADR-044 amendment): command-
        # delivery verifies a target device exists before enqueue (W1.1b).
        hostname: device-management
        port: 8080
      eventProcessing:
        # event-processing is reached in-cluster by its instance-namespace Service name
        # for the reverse-direction sync call (ADR-044 amendment): device-management
        # compiles a profile's draft detection rules against it at publish so an
        # uncompilable rule fails closed (ADR-051 slice 4b).
        hostname: event-processing
        port: 8080
      deviceState:
        # device-state is reached in-cluster by its instance-namespace Service name for
        # the Sparkplug adapter's failover reconciliation (ADR-044 amendment / ADR-067
        # SP4b): on winning leadership it enumerates a tenant's asserted-active devices
        # to floor its epoch generator and probe them for liveness.
        hostname: device-state
        port: 8080
      commandDelivery:
        # command-delivery is reached in-cluster by its instance-namespace Service name
        # for event-processing's REACT dispatcher to enqueue a command when a detection
        # rule's sendCommand action fires (ADR-044 amendment / ADR-051 slice 5b). Unset
        # (or empty hostname) disables REACT send-command dispatch, fail-closed.
        hostname: command-delivery
        port: 8080
      aiInference:
        # ai-inference is reached in-cluster by its instance-namespace Service name for
        # event-processing to draft a detection rule from natural language (ADR-056 slice 1):
        # it carries the human's NL prompt to the tenant's model over a service token
        # (ai:infer) and runs the returned candidate through its own rules.Compile firewall.
        # ai-inference is an OPT-IN area — held back from the `default` profile and shipped
        # by the `full` profile (see devicechain.enabledAreas in _helpers.tpl), or enable it
        # explicitly via enabledFunctionalAreas. Enable the area AND set the coordinate here
        # to turn NL rule-drafting on. Unset (or empty hostname) leaves NL drafting cleanly
        # UNAVAILABLE, fail-closed (the form + canvas authoring doors are unaffected).
        hostname: ai-inference
        port: 8080
      serviceAuth:
        # Shared secret backing the synchronous cross-service call primitive
        # (ADR-044 amendment): a caller presents it to user-management's mint
        # endpoint to obtain a short-lived service token, which the target service
        # then validates via the normal JWKS. The bring-up (dcctl) mints a random
        # value here; empty disables service-token minting (fail-closed).
        secret: ""
      secrets:
        # Secret-storage backend + KEK selection (ADR-059). The default is envelope
        # encryption in each service's own Postgres, with per-secret DEKs wrapped by
        # a single instance root key (zero new infrastructure).
        backend: postgres
        kekProvider: instance
        # rootKey is the base64-encoded 256-bit instance KEK. The bring-up (dcctl)
        # mints a random value; for production, supply it via a pre-created Secret
        # (instance.existingSecret) rather than committing it to values. Empty means
        # a service that uses the secret store fails closed at startup (it cannot
        # form its KEK). DR: losing this key loses every stored secret — back up the
        # rendered instance Secret.
        rootKey: ""
      blob:
        # Object/asset-store backend for opaque binaries that do not belong in
        # Postgres (branding logos today; firmware/OTA + exports later, ADR-058).
        # Default: the local filesystem. directory is the store root — it MUST be a
        # MOUNTED, SHARED volume (an RWX PVC) when user-management runs more than one
        # replica, since a filesystem store is not shared across pods otherwise.
        # Left EMPTY by default: the object store is then "not configured" and
        # branding-logo upload/read return 503 (Tier-0 inline/URL logos still work) —
        # a safe default rather than a silent per-pod ephemeral store. Set directory
        # (and mount a volume there) to enable object-store logos; or use the s3
        # backend below (recommended for multi-replica — no RWX volume needed).
        backend: filesystem
        directory: ""
        # S3-compatible backend (backend: s3) — AWS S3 or MinIO. Non-secret settings
        # only: the access key / secret come from the standard AWS credential chain
        # (env from a pre-created Secret, IRSA, or an instance profile), NEVER here
        # (ADR-058 §5). bucket is required; region for AWS; endpoint + usePathStyle
        # for MinIO / other S3-compatible services.
        bucket: ""
        region: ""
        endpoint: ""
        usePathStyle: false
    persistence:
      rdb:
        type: postgres95
        configuration:
          hostname: dc-postgresql.dc-system
          port: 5432
          maxConnections: 5
          username: devicechain
          password: devicechain
      tsdb:
        type: timescaledb
        configuration:
          hostname: dc-timescaledb-single.dc-system
          port: 5432
          maxConnections: 5
          username: postgres
          password: devicechain

# Container image defaults. The image for an area is
# "{registry}/{area}:{tag}" unless overridden under functionalAreas.<area>.image.
image:
  registry: ghcr.io/devicechain-io
  # Empty means "use the chart's appVersion". A release sets appVersion to the
  # release tag (helm package --app-version), so the packaged chart deploys the
  # matching images with no override; dcctl sets this explicitly for local/dev.
  tag: ""
  pullPolicy: IfNotPresent

# GraphQL/HTTP port exposed by every service (also serves /healthz and /readyz).
service:
  port: 8080

# The web console (single-page app). Unlike the functional areas this is a static
# nginx image (frontend/Dockerfile), not a Go service, so it is a standalone
# workload rather than part of the area machinery. The cluster ingress serves it
# at "/" and routes /api/<area> to the services (see templates/ingress.yaml).
frontend:
  enabled: true
  # Image defaults to "{image.registry}/frontend:{image.tag}"; override repository
  # and/or tag to pin a different console build.
  image:
    repository: ""
    tag: ""
  replicas: 1
  # nginx is lighter than the Go services; size accordingly.
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Prometheus scrape integration. Metrics are NOT served on a dedicated port:
# /metrics rides on the graphql port 8080 (the shared HTTP mux), so the
# ServiceMonitor scrapes the Service's named `graphql` port at path /metrics.
# (The instance.config.infrastructure.metrics.httpPort 9090 is not used here.)
#
# enabled renders one monitoring.coreos.com/v1 ServiceMonitor per enabled
# functional area. This REQUIRES the Prometheus Operator CRDs to be installed on
# the cluster — set it to false if they are not present (the chart will then omit
# all ServiceMonitors).
metrics:
  enabled: true
  # grafanaDashboards renders the event-processing operations dashboard as a ConfigMap
  # labeled grafana_dashboard: "1" for the Grafana sidecar (kube-prometheus-stack) to
  # auto-import. Set false on clusters that have the Prometheus Operator but no Grafana
  # sidecar. Ignored when metrics.enabled is false.
  grafanaDashboards: true
  # alerts renders a PrometheusRule with the event-processing (DETECT + REACT) alerting
  # rules. Requires the Prometheus Operator CRDs (same as enabled). Ignored when
  # metrics.enabled is false.
  alerts: true

# Kubernetes volume wiring for the FILESYSTEM object store (ADR-058), i.e. when
# instance.config.infrastructure.blob.backend is "filesystem". The filesystem backend
# reads/writes blob.directory, and because the service pods run with a read-only root
# filesystem (securityContext.readOnlyRootFilesystem), that directory MUST be a writable
# mounted volume — and, for more than one replica of a consuming area, an RWX
# (ReadWriteMany) volume SHARED across pods (a filesystem store is per-pod otherwise).
# Ignored for the s3 backend (S3 needs no volume; enabling persistence with backend:s3
# fails the render). Leaving persistence disabled with an empty blob.directory keeps the
# object store "not configured" — branding-logo upload/read return 503 and Tier-0 inline/
# URL logos still work — a safe default rather than a silent per-pod ephemeral store.
blobStorage:
  persistence:
    # Create a PersistentVolumeClaim for the filesystem store and mount it into the
    # consuming areas. Requires backend: filesystem and a resolved mount path (below).
    enabled: false
    # Use a pre-created PVC instead of having the chart create one (e.g. an RWX claim
    # provisioned out-of-band). When set, size/accessModes/storageClass are ignored and
    # no PVC is rendered — but the volume is still mounted into mountAreas.
    existingClaim: ""
    # The mount path. Defaults to instance.config.infrastructure.blob.directory (they MUST
    # match — the volume mounts exactly where the store writes; the render fails if both are
    # set and differ). Set this explicitly only when the instance config is supplied via
    # instance.existingSecret, so the chart cannot see blob.directory itself.
    mountPath: ""
    # RWO suits a single replica. For multi-replica consumers (e.g. user-management
    # replicas > 1) this MUST be ReadWriteMany with an RWX-capable storageClass (EFS /
    # Filestore / NFS), or use the s3 backend instead.
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    # Empty uses the cluster default StorageClass. Set the RWX-capable class for
    # multi-replica. "-" (a literal dash) selects "no storage class" for a statically
    # pre-provisioned PV.
    storageClass: ""
    # Extra annotations merged onto the PVC (e.g. a backup policy).
    annotations: {}
  # Functional areas that mount the blob volume at the store directory. Only areas that
  # actually read/write the object store need it (today: user-management, for branding
  # logos). An area that uses the store but is omitted here finds it "not configured".
  mountAreas:
    - user-management

# E7 (ADR-022 review): default pod resource requests/limits (override per area
# under functionalAreas.<area>.resources). These are lightweight Go services
# (~50MB baseline per the mission); requests size for scheduling, limits cap the
# blast radius. requests are mandatory (values.schema.json enforces non-empty
# resources) so pods land in the Burstable/Guaranteed QoS class, not BestEffort.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# GOMEMLIMIT, as a percentage of each container's own memory LIMIT.
#
# DEFAULT OFF, deliberately, and the reason is worth reading before turning it on.
#
# Go does not read the container's memory limit. Measured on Go 1.26: a process in a
# container limited to 128m reports GOMEMLIMIT as unlimited, while GOMAXPROCS *is*
# derived from the cgroup CPU limit. Memory is the half the runtime leaves
# unmanaged. (That asymmetry is also why there is no GOMAXPROCS setting here —
# adding one would override the runtime's own container awareness with a worse
# guess.)
#
# The obvious conclusion — that setting GOMEMLIMIT therefore shrinks a service's
# memory — did not survive measurement. Across four workload shapes in a limited
# container (churn over a small live set, churn over a large one, and a live set
# sized so that GOGC's 2x pacing would exceed the container limit), a soft limit
# produced NO reduction in heap_sys and cost GC CPU. At a 64MiB limit against a
# 60 MiB live set, heap_sys was slightly HIGHER. Steady-state footprint is governed
# by the live set, and GOMEMLIMIT cannot go below it.
#
# What it genuinely offers is a ceiling, not a reduction: during a spike in LIVE
# heap it makes the collector work harder instead of letting the heap double past
# the cgroup limit and be OOMKilled. That is death-versus-degradation, and it
# matters most where limits are tight. It is a survivability property, not a
# footprint one — so it must never be quoted as part of a published footprint
# number.
#
# It is off until that ceiling is shown to be worth its GC cost on real services
# under real load. Turning it on is one number.
#
# When enabled: 75 is a sensible value. NOT 100 — the cgroup limit also covers
# goroutine stacks, mmap'd regions and runtime bookkeeping that sit outside the Go
# heap, so aiming at the full limit OOMKills instead of collecting (the schema
# rejects >= 100). The value is DERIVED from each area's own limit, so raising a
# limit raises its GOMEMLIMIT with it; a pinned value would keep throttling a
# service whose limit had since been raised, and GC thrash with no visible cause is
# a miserable thing to debug. An area with no memory limit gets no GOMEMLIMIT —
# there is nothing to derive from, and guessing is worse than leaving it to Go.
goMemLimitPercent: 0

# An explicit GOMEMLIMIT for every area, bypassing goMemLimitPercent. Go's own
# syntax (e.g. "192MiB"). Prefer the percentage, and read the note above first.
goMemLimit: ""

# Replica count per area (override per area under functionalAreas.<area>.replicas).
# Recommend >= 2 in production for true zero-downtime rollouts (a single replica
# still has a brief gap while its one pod is replaced) and node-failure survival.
replicas: 1

# Zero-downtime rolling-update strategy (methodology §10.1). maxUnavailable:0 keeps
# full capacity through an upgrade — a new pod must pass /readyz before an old one
# is removed; maxSurge:1 brings the replacement up first.
rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

# Graceful shutdown (§10.2). On SIGTERM a service flips readiness to 503, waits
# shutdownDrainSeconds for the endpoint controllers to pull it from Service
# endpoints, then drains in-flight requests. The scratch images have no shell, so
# this drain is app-side (DC_SHUTDOWN_DRAIN_SECONDS), not a preStop hook.
# terminationGracePeriodSeconds must exceed shutdownDrainSeconds plus in-flight
# request time, or the kubelet SIGKILLs the pod mid-drain.
terminationGracePeriodSeconds: 30
shutdownDrainSeconds: 5

# E7: a dedicated ServiceAccount per release, referenced by every Deployment, in
# place of the namespace `default` SA. The data-plane services never call the
# Kubernetes API, so the token is not mounted.
serviceAccount:
  create: true
  # Defaults to "dc-<instance.id>" when empty.
  name: ""
  automountToken: false

# E7: PodDisruptionBudget per enabled area so a node drain cannot evict every
# replica at once. Only emitted for areas with replicas > 1 (a PDB on a single
# replica would block voluntary drains). Set exactly one of minAvailable /
# maxUnavailable.
podDisruptionBudget:
  enabled: true
  minAvailable: ""
  maxUnavailable: 1

# E7: startupProbe (on /readyz) gives a slow JWKS/DB cold start up to
# periodSeconds * failureThreshold to come up before liveness can fire; the
# liveness probe keeps a raised failureThreshold so a transient blip won't kill a
# healthy pod. Readiness still gates Service endpoints on /readyz.
startupProbe:
  periodSeconds: 5
  failureThreshold: 30
livenessProbe:
  failureThreshold: 6

# C3 (ADR-022 review): hardened, values-driven securityContext. Defaults run the
# workload as the distroless nonroot uid (65532) with a read-only rootfs and no
# Linux capabilities — strictly matching the operator's own manager.yaml. The
# service images are `FROM scratch` static binaries that read config from mounts
# and write nothing to the rootfs, so these defaults are safe; relax them here if
# an operator builds images that need to run as root or write to disk.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Ingress exposing the GraphQL/HTTP surface, with cert-manager TLS. Requires the
# ingress-nginx controller + cert-manager from deploy/opentofu. Disabled by
# default; enable to route an external host to the per-area Services. Each enabled
# area is reachable at https://<host>/<area>/graphql (the /<area> prefix is
# stripped before the request reaches the service).
ingress:
  enabled: false
  # Must match the IngressClass the controller registered (OpenTofu `ingress_class`).
  className: nginx
  host: devicechain.local
  # Extra annotations merged onto the Ingress (e.g. body size, timeouts).
  annotations: {}
  tls:
    enabled: true
    # selfSigned renders a cert-manager self-signed Issuer in the instance
    # namespace (dev: valid TLS, browser-untrusted). For real certs set
    # selfSigned=false and point clusterIssuer at a configured ClusterIssuer
    # (e.g. a Let's Encrypt ACME issuer).
    selfSigned: true
    issuerName: devicechain-selfsigned
    clusterIssuer: ""
    secretName: devicechain-tls

# Per-functional-area settings. `config` defaults to {} → the service applies its
# own typed defaults at load (ADR-022 decision 1). Override `image`, `replicas`,
# `resources`, or `config` per area as needed.
functionalAreas:
  user-management:
    config: {}
  device-management:
    config:
      # disabled | optional | required. required (the hardened default, ADR-025)
      # rejects any inbound event that does not present a valid device credential;
      # relax to optional/disabled only for a trusted/bootstrapping transport.
      deviceAuthMode: required
  event-sources:
    config: {}
    # ADR-063 preferential shedding. Set an operator floor to shed the lowest tiers
    # first under contention (gold is never shed). 0 (the default) = off.
    #   config:
    #     contention:
    #       manualFloor: 0   # 0..3 — 1 sheds best-effort, 2 adds bronze, 3 adds silver
    # HTTP device-ingest listener (PR #38): event-sources serves
    # POST /{instanceId}/{tenant}/events on 8081, in addition to the 8080 GraphQL/management
    # port. Exposed as an extra Service/container port so devices can reach it.
    # (The MQTT source dials out to the broker, so it needs no inbound port.)
    extraPorts:
      - name: http-ingest
        port: 8081
  event-management:
    config: {}
    # anchorSweepIntervalSeconds: 3600  # ADR-044 decision 3 reconciliation-sweep
    # cadence. Unset defaults to hourly; a negative value disables the sweep (the
    # entity.deleted consumer remains the primary anchor-cleanup path).
  device-state:
    config: {}
  dashboard-management:
    config: {}
  command-delivery:
    config: {}
  notification-management:
    config: {}
  event-processing:
    config: {}
    # ADR-051: the DETECT engine must run as ONE active instance per deployment (no two
    # engines splitting the resolved-events durable, or windowed/absence detection breaks
    # on restart). It holds durable window/timer state in the Postgres snapshot store; two
    # concurrent engines would each see only HALF the events and diverge. The store's Save
    # is MONOTONIC (it refuses to move the checkpoint sequence backward), which blocks the
    # worst outcome — a lagging writer clobbering a newer checkpoint — but does NOT by
    # itself make split-brain safe.
    #
    # So this area deploys with strategy Recreate (during a ROLLOUT all old pods stop before
    # any new pod starts — no old+new overlap that a rolling update would otherwise cause) and
    # stays at replicas:1. Recreate covers rollouts only; an eviction / node drain still briefly
    # runs two engines (the ReplicaSet replaces a deleted pod immediately), which the app-level
    # fence handles (monotonic snapshot Save + detectStaleOwner). Do NOT raise replicas past 1
    # (a Recreate with 2 replicas runs 2 permanent writers; the template fails the render) until
    # the intra-Instance tenant-sharded DETECT fleet lands (post-GA, ADR-052).
    #
    # Operational note: during a Recreate rollout the event-processing Service has no ready
    # endpoint (old-pod stop + new-pod snapshot replay + startupProbe). Publishing a device
    # profile that has ENABLED detection rules calls event-processing's validateDetectionRules
    # synchronously and fails CLOSED on transport error (ADR-044 sync gate), so such publishes
    # error for the rollout window — expected; retry after the new pod is Ready.
    replicas: 1
    strategy: Recreate
    # checkpointEvents: 1000          # ADR-051: max applied events between snapshot
    # checkpointIntervalSeconds: 10   # commits (whichever comes first). The engine
    # acks the resolved-events durable only after the snapshot containing an event's
    # effect commits (ack-on-checkpoint), so these bound write-amplification vs the
    # ack/redelivery latency on a crash.
    # --- REACT SOURCE-side outbound egress cost-gate (ADR-060 SD-3): REACT charges the tenant's
    # outbound budget before publishing a connector-dispatch and DROPS over-quota httpCall/publish
    # actions at the source (an immediate Allow, never a block), so a runaway rule cannot flood the
    # connector-dispatch stream. Defaults MATCH outbound-connectors' egress ceiling (both ends meter
    # the same dimension); per-tenant overrides come from user-management. Never unlimited. ---
    # outboundMessagesPerSecond: 100  # platform-default source egress rate ceiling (0/unset ⇒ this default)
    # outboundBurst: 200              # platform-default source egress burst
  mcp:
    # The MCP server (ADR-047): an OAuth 2.1 Resource Server fronting the per-area
    # GraphQL over the Model Context Protocol. Held back from the `default` profile
    # (an agent-facing API is a deliberate choice), shipped by `full`, or named
    # explicitly in enabledFunctionalAreas.
    #
    # It REQUIRES both URLs below and fails startup without them — so when an ingress
    # is configured they are DERIVED from it and you need set nothing: resourceUrl
    # becomes <origin>/api/mcp and issuerUrl <origin>/api/user-management, where
    # <origin> is the ingress scheme + host. Set either here to override.
    #
    # resourceUrl is this server's identifier that access tokens must be
    # audience-bound to (RFC 8707/9728). issuerUrl is the OAuth AS (this instance's
    # user-management) that issues them, and must equal user-management's
    # auth.issuerUrl BYTE-FOR-BYTE (an RFC 8414 issuer is compared exactly) — which
    # is why both derive from one origin rather than being spelled out twice. Both are
    # external https origins (http only for a localhost value).
    #
    # NOTE the OAuth AS is OFF unless user-management's auth.issuerUrl is set: mcp
    # still starts and serves its metadata (it fetches JWKS in the background), but no
    # client can obtain a token until the AS is enabled — a separate, deliberate
    # switch, since setting the issuer changes the `iss` claim of EVERY minted token.
    config: {}
      # resourceUrl: https://<host>/api/mcp
      # issuerUrl: https://<host>/api/user-management
  outbound-connectors:
    # The outbound-connectors service (ADR-060): a durable consumer of the
    # connector-dispatch stream that executes each fired httpCall/publish REACT action
    # (the HTTP call / broker publish, secret resolution, dead-lettering). It is an
    # OPT-IN area — held back from `default` (it opens an EGRESS surface), shipped by
    # `full`, or named explicitly (enabledFunctionalAreas:
    # [..., event-processing, outbound-connectors]); it hard-depends on event-processing
    # (its dispatch producer). It keeps its own envelope-encrypted secret store (ADR-059)
    # for outbound credentials, so the instance root key (infrastructure.secrets) must be
    # configured. Scales independently of DETECT (outbound I/O vs ingest). In slice C3 it
    # executes httpCall; the Bento publish tier + versioned Connector entity land in C4.
    config: {}
      # sendTimeoutMs: 10000        # fallback per-send timeout when an action specifies none
      # maxConcurrentSends: 32      # outbound concurrency ceiling (worker-pool width / back-pressure)
      # dispatchBacklog: 8          # reader→worker hand-off buffer (small: paces prefetch under AckWait)
      # --- per-tenant egress rate (ADR-060 SD-3); platform default, per-tenant overrides via user-management ---
      # outboundMessagesPerSecond: 100  # platform-default egress rate ceiling (never unlimited; below ingest)
      # outboundBurst: 200              # platform-default egress burst
      # egressWaitBudgetMs: 5000        # smoothing wait for a token before a shed (bounded < AckWait − max send)
  ai-inference:
    # The ai-inference service (ADR-056): a synchronous, fail-closed proxy to an
    # external inference provider (Claude at GA) that powers NL→rule authoring — the
    # "third front door" to the CEL rule compiler. It returns a candidate rule STRING
    # only; it holds NO ambient authority over tenant data and never sits in the
    # replay-correct DETECT/REACT path ("AI proposes, the CEL compiler disposes").
    #
    # OPT-IN area — held back from `default` (it reaches an EXTERNAL provider on a paid
    # key), shipped by `full`, or named explicitly (enabledFunctionalAreas:
    # [..., ai-inference]). It has NO hard dependency: when a peer it would consult is
    # absent it fails the affected path CLOSED rather than refusing to start.
    #
    # It keeps its own envelope-encrypted secret store (ADR-059) for provider API keys,
    # so the instance root key (infrastructure.secrets.rootKey above) MUST be configured
    # or the service fails startup closed. Providers, their API keys, and which tenant
    # TIERS each is granted to (ADR-065) are runtime state managed in the admin console
    # (/admin/ai-providers) / GraphQL — NOT Helm config.
    #
    # External routing is PER-TENANT opt-in and fail-closed (ADR-056 §6): the service
    # reads each tenant's ai_external_enabled consent flag from user-management over a
    # least-privilege tenant:read service token, so it needs infrastructure.serviceAuth.secret
    # AND infrastructure.userManagement configured (userManagement is defaulted above;
    # serviceAuth.secret defaults empty and is minted by the bring-up / dcctl). Absent either, the
    # NL-authoring inference path is cleanly UNAVAILABLE (a DENY-ALL consent checker) rather
    # than silently permissive; the ai:admin provider smoke test does not consult consent and
    # still works.
    #
    # Inference spend is RATE-GOVERNED per tenant (ADR-056 §6 / ADR-023): the authority to
    # author a rule is not the authority to spend the operator's provider key without bound,
    # so every tenant is metered against the platform ceiling below. A tenant may raise or
    # lower its own ceiling via the ai_inference_* overrides on its control-plane row (set in
    # the console's admin tenant screen); an unset override inherits these. There is no
    # "unlimited" setting: 0 means UNSET here (as it does for every tunable above) and takes
    # the default, while a negative value fails startup — neither disables metering.
    config: {}
      # inferenceTimeoutMs: 60000        # per-call ceiling on one outbound provider call (max 120000)
      # maxPromptBytes: 131072           # cap on an inbound prompt (+ its schema context); 128 KiB default
      # maxOutputTokens: 2048            # cap on the provider's generated output for one call (a rule candidate is small)
      # inferenceRequestsPerMinute: 30   # PLATFORM per-tenant rate ceiling. Declared per minute: drafting is a
      #                                  # human-paced authoring action. One draft costs up to 3 provider calls
      #                                  # (the bounded repair loop), so 30/min is ~10 drafts a minute sustained.
      # inferenceBurst: 15               # tokens a tenant may spend back-to-back before the rate binds (~5 drafts)
  sparkplug-ingest:
    # The Sparkplug ingest service (ADR-069): a stateful Sparkplug B Host Application
    # that connects OUT to one or more per-tenant customer MQTT brokers, announces its
    # Sparkplug 3.0 STATE on each, subscribes to the configured Sparkplug groups, resolves
    # each edge-node / device to a DeviceChain device (by external id, auto-registering
    # when configured), and emits its numeric metrics as measurements onto inbound-events —
    # a parallel inbound transport to event-sources. OPT-IN edge area: held back from `default` (a Sparkplug topology
    # is a deliberate choice), shipped by `full`, or named explicitly
    # (enabledFunctionalAreas: [..., sparkplug-ingest]). It hard-depends on
    # device-management (which resolves what it produces).
    #
    # TENANCY IS CONNECTION-SCOPED (ADR-069 M7). A Sparkplug topic carries no tenant and
    # its Group ID is a customer's own label — not globally unique, and spoofable by any
    # publisher — so a tenant is NEVER derived from the topic. Instead each source below
    # binds one broker connection to one tenant; every message received on that
    # connection is attributed to it.
    #
    # It is a STATEFUL single-owner service (ADR-069 / ADR-070): a Sparkplug Host owns
    # per-node alias/seq/session state, so two instances would each see half the
    # traffic and publish a duplicate STATE. Until the ADR-070 fenced lease lands (SP4)
    # it MUST run as ONE instance — so it deploys with strategy Recreate (a rollout
    # stops the old pod before starting the new one, avoiding two concurrent Host
    # Applications) and stays at replicas:1. Do NOT raise replicas past 1 until the
    # lease-elected failover lands (a Recreate with 2 replicas runs two permanent
    # Hosts; the template fails the render), mirroring event-processing above.
    replicas: 1
    strategy: Recreate
    config: {}
      # sources:                       # One entry per tenant broker connection. Empty (the default) connects to nothing.
      #   - tenant: acme               # REQUIRED. The DeviceChain tenant every message on this broker is attributed to.
      #     hostId: devicechain        # Sparkplug Host Application id; STATE topic is spBv1.0/STATE/{hostId}. Unique per
      #                                # broker. Defaults to "devicechain".
      #     broker:
      #       url: ssl://broker.acme.example:8883   # REQUIRED. tcp:// (plaintext) or ssl:// (TLS, system root CAs).
      #       username: devicechain                 # MQTT login; omit for anonymous.
      #       passwordEnv: SPARKPLUG_ACME_PW        # NAMES the env var holding the password (never inline). Project a
      #                                             # Secret into it via extraEnv below.
      #     groups:                    # Sparkplug Group IDs to subscribe (spBv1.0/{group}/#, one per entry).
      #       - plant-a                # Empty subscribes to ALL groups (spBv1.0/#) on this broker.
      #       - plant-b
      #     autoRegister: true         # On first sight of a Sparkplug identity with no matching device, create one.
      #                                # false: drop its telemetry (counted) until an operator pre-registers it.
      #     deviceTypeToken: sparkplug-node   # REQUIRED when autoRegister is true — the device type stamped on a
      #                                # created device (a Sparkplug birth carries no DeviceChain type). Must exist.
    # Project each broker password Secret into the env var its source names:
    # extraEnv:
    #   - name: SPARKPLUG_ACME_PW
    #     valueFrom:
    #       secretKeyRef:
    #         name: sparkplug-acme-broker
    #         key: password
  lwm2m-ingest:
    # The LwM2M ingest service (ADR-075): a stateful adapter that terminates OMA LwM2M
    # over CoAP/UDP+DTLS from constrained devices onto the one device model — the second
    # standards-native edge protocol alongside Sparkplug. OPT-IN edge area: held back from
    # `default`, shipped by `full`, or named explicitly
    # (enabledFunctionalAreas: [..., lwm2m-ingest]). Hard-depends on device-management
    # (which resolves what it produces, once the L1 registration/measurement handlers land).
    #
    # It is a single INBOUND-UDP binder (ADR-075 HA posture): devices connect IN to one
    # bound socket, so — unlike an outbound client — it cannot warm-standby (a Service
    # would spray datagrams across replicas, and a standby would drop half). GA is ONE
    # serving replica; it deploys strategy Recreate + replicas:1 (a rollout stops the old
    # binder before the new one binds). Do NOT raise replicas past 1 until the ADR-070
    # fenced lease lands. L1 adds the /rd registration + presence handlers and exposes the
    # device-facing CoAPS port below.
    replicas: 1
    strategy: Recreate
    # The device-facing CoAPS port is UDP (CoAP over DTLS), so it is declared with an
    # explicit protocol (extraPorts default to TCP). Devices reach this via the Service;
    # external exposure (NodePort/LoadBalancer) is an operator/ingress decision (ADR-048).
    extraPorts:
      - name: coaps
        port: 5684
        protocol: UDP
    config: {}
      # listen:
      #   host: 0.0.0.0
      #   port: 5684                       # CoAPS (DTLS). Default 5684.
      # security:
      #   connectionIdLength: 8            # DTLS Connection ID length (RFC 9146); 0 disables. Default 8.
      #   maxSessions: 100000              # live-session ceiling (memory bound).
      #   idleTimeoutSeconds: 0            # reap idle sessions after N seconds; 0 = never (set above the queue-mode wake interval).
      #   identities:                      # provisioned PSK credentials + their tenancy binding (ADR-075 D1); empty (default) authenticates no one.
      #     - identity: opaque-handle-1    # the DTLS PSK identity the device presents (prefer an opaque handle; sent in the clear).
      #       pskEnv: DC_LWM2M_PSK_DEV1    # NAMES the env var holding the base64 pre-shared key (never inline). Project a Secret below.
      #       tenant: acme                 # REQUIRED. The DeviceChain tenant this credential belongs to — tenancy is bound to the CREDENTIAL, never the device's untrusted registration payload (D1).
      #       externalId: plant-a/sensor-1 # REQUIRED. The device external id device-management keys on (explicit, distinct from the opaque wire identity).
      #       deviceTypeToken: sensor      # Device type stamped on the device row when autoRegister creates it. Required when autoRegister is true.
      #       autoRegister: true           # Create the device row on first registration (ALLOW_NEW). An unknown device never reaches here — it has no PSK.
    # Project each device PSK Secret into the env var its identity names:
    # extraEnv:
    #   - name: DC_LWM2M_PSK_DEV1
    #     valueFrom:
    #       secretKeyRef:
    #         name: lwm2m-dev1-psk
    #         key: psk
