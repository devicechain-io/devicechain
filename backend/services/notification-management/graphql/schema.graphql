#
# Notification Management GraphQL Schema (ADR-017)
#
# This first slice serves only the service's static capability declaration: which
# channel-adapter types it can deliver an alarm notification through. The per-tenant
# notification policy (recipients, per-severity routing, throttle) and its CRUD land
# in a later slice; they hang off this same Query root.

# A delivery channel the notification subsystem defines. `id` is the stable key a
# policy will reference when it routes an alarm to a channel; `label`/`description`
# drive the channel-type picker in the console. `available` is false until a working
# adapter for the type ships (a policy may still be authored against a defined type,
# but nothing is delivered through it until its adapter lands).
type NotificationChannelType {
    id: String!
    label: String!
    description: String!
    available: Boolean!
}

type Query {
    # The channel-adapter types the notification subsystem defines (a static
    # capability list — a policy picks channels from these; see `available`).
    notificationChannelTypes: [NotificationChannelType!]!
}

schema {
    query: Query
}
