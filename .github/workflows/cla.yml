#
# Contributor License Agreement (CLA) gate.
#
# Uses contributor-assistant/github-action ("CLA Assistant Lite") — no third-party
# app or OAuth grant. Contributors sign by commenting the phrase below on their PR;
# signatures are recorded as JSON in the dedicated `cla-signatures` branch of this
# repo. The CLA text itself lives at ICLA.md (individuals) / CCLA.md (companies).

name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Serialize so concurrent signatures don't race on the signatures file.
concurrency:
  group: cla-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where signatures are recorded (in the branch named below).
          path-to-signatures: 'signatures/version1/cla.json'
          # The agreement contributors are signing.
          path-to-document: 'https://github.com/devicechain-io/devicechain/blob/main/ICLA.md'
          # Dedicated branch that holds the signatures file (keep it unprotected).
          branch: 'cla-signatures'
          # Skip bots so automated PRs aren't blocked.
          allowlist: dependabot[bot],*[bot]
          # Friendly, project-specific messages.
          custom-notsigned-prcomment: >
            Thank you for your contribution to **DeviceChain**! Before we can merge,
            each commit author must agree to our Contributor License Agreement. Please
            read the [Individual CLA](https://github.com/devicechain-io/devicechain/blob/main/ICLA.md)
            (companies: see [CCLA.md](https://github.com/devicechain-io/devicechain/blob/main/CCLA.md))
            and then post the following comment on this PR to sign:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: >
            All contributors have signed the DeviceChain CLA. ✅ Thank you!
