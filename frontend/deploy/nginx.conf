#
# nginx server block for the DeviceChain web console (single-page app).
#
# Serves the static Vite bundle and falls back to index.html for unknown paths
# so client-side (react-router) routes resolve on a hard refresh / deep link.
# The backend GraphQL APIs are NOT proxied here — the cluster ingress routes
# /api/<area> straight to each functional-area service, while everything else
# falls through to this server (see deploy/helm/devicechain/templates/ingress.yaml).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets are immutable — let browsers cache them hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The standalone dashboard app (base '/dash/'), served from its own subtree with
    # its own SPA fallback so deep links like /dash/<token> resolve to its index.
    # More specific than `location /`, so it wins for /dash/*.
    location = /dash {
        return 301 /dash/;
    }
    location /dash/ {
        try_files $uri /dash/index.html;
    }

    # SPA fallback: serve the requested file if it exists, otherwise hand back
    # index.html so the client router can render the route.
    location / {
        try_files $uri /index.html;
    }
}
