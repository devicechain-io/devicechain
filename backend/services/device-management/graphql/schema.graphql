    createDeviceGroup(request: DeviceGroupCreateRequest): DeviceGroup!
    # Update an existing device group.
    updateDeviceGroup(token: String!, request: DeviceGroupCreateRequest): DeviceGroup!
    # Create a new device credential.
    createDeviceCredential(request: DeviceCredentialCreateRequest): DeviceCredential!
    # Update an existing device credential.
