    # resolves device -> its profile's active PUBLISHED command vocabulary -> the
    # definition for commandKey, and validates the payload against its parameter
    # schema. Answers device existence, unknown command key, and payload validity in
    # one hop. A profile declaring no vocabulary allows free-form payloads (decision 4).
    validateCommandEnqueue(deviceToken: String!, commandKey: String!, payload: String): CommandEnqueueVerdict!
    # List the commands a device currently accepts (ADR-043 decision 3) — the listing
    # counterpart of validateCommandEnqueue, which is ask-don't-list. Both are answered
    # from the same resolution, so what this offers is what the gate accepts.
