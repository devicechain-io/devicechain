# Tenant-scoped pair of JWTs returned by selectTenant or token refresh.
type AuthToken {
    accessToken: String!
    refreshToken: String!
    expiresAt: String!
}

# Result of an email/password login (ADR-033): an instance-scoped identity token
# plus the tenants the identity may act in. The caller picks one via selectTenant.
type IdentityAuth {
    identityToken: String!
    expiresAt: String!
    # Whether this identity holds the superuser system role (may enter any tenant).
    superuser: Boolean!
    memberships: [Membership!]!
}

# A tenant the authenticated identity belongs to, with the role tokens it holds.
type Membership {
    tenant: String!
    roles: [String!]!
}

# The tenant the authenticated caller is acting within (control plane). Drives
# the console's tenant header; branding (logo/colors) will extend this type as it
# lands.
type Tenant {
    token: String!
    name: String
    description: String
}

# The ingest governance overrides for the tenant the caller is acting within. A
# null field means the tenant inherits the platform default (never unlimited).
type TenantGovernance {
    ingestMessagesPerSecond: Float
    ingestBurst: Int
}

# The identity the caller is signed in as (control plane), for display in the
# console — its name, falling back to email.
type CurrentIdentity {
    email: String!
    firstName: String
    lastName: String
}

# The tenant-scoped user-management API is the authentication surface only
# (ADR-033). Identities, memberships, the role catalog, and tenants are
# administered through the instance-scoped admin API (admin_schema.gql) — the one
# exception is `tenant`, which lets a caller read their own tenant for display.
type Query {
    # Liveness placeholder.
    ping: String!
    # The tenant the caller is currently acting within (self-scoped).
    tenant: Tenant!
    # The ingest governance overrides for the caller's tenant (requires
    # tenant:read); read by the enforcing service over a service token.
    tenantGovernance: TenantGovernance!
    # The identity the caller is signed in as (self-scoped).
    me: CurrentIdentity!
    # Re-read the caller's live memberships from a valid identity token, so the
    # console can refresh its tenant picker after a membership change without a
    # re-login. The token is validated internally (like selectTenant), so this
    # runs before a tenant is selected.
    identityMemberships(identityToken: String!): [Membership!]!
}

type Mutation {
    # Authenticate with an email and password, returning an identity token + the
    # tenants the identity may select (ADR-033). No tenant is chosen yet.
    login(email: String!, password: String!): IdentityAuth!
    # Exchange an identity token for a tenant-scoped access/refresh pair.
    selectTenant(identityToken: String!, tenant: String!): AuthToken!
    # Exchange a valid refresh token for a new pair (rotates the refresh token).
    refresh(refreshToken: String!): AuthToken!
    # Update the signed-in user's own display name (first/last). Email is fixed;
    # self-scoped to the caller's identity.
    updateProfile(firstName: String, lastName: String): CurrentIdentity!
}

schema {
    query: Query
    mutation: Mutation
}
