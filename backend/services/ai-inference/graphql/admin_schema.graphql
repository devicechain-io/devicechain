#
# AI Inference ADMIN GraphQL Schema (ADR-056 §4, re-homed by ADR-065)
#
# The INSTANCE-scoped, operator-managed provider list: register providers, smoke-test
# an endpoint, and PACKAGE providers by granting them to tenant tiers (ADR-065).
# Served at /admin/graphql behind an IDENTITY token, in the system context across
# tenants — the same shape user-management's admin API uses (ADR-033).
#
# Registering a model and selling it are separate acts here: a new provider is offered
# to nobody until it is granted to a tier, so an operator can add and test one without
# it appearing on any tenant's menu.
#
# Why this is a separate plane and not just a set of ai:admin fields on the data
# plane (the ADR-065 origin story): ai-inference validated tenant access tokens
# only, so an operator could reach these fields only from inside a tenant. That is
# backwards for instance config, and it was not merely cosmetic — the seeded
# `tenant-admin` role grants "*", which satisfied every ai:admin check. The plane
# is the enforcement: an access token cannot authenticate here at all. The tier rule
# in core/auth (a tenant access token can never satisfy a system-tier authority) is
# the belt to this suspenders.
#
# API keys are write-only. A `secret` goes IN on create/update and is sealed in the
# ADR-059 envelope-encrypted secret store; it never comes back out — the read side
# exposes only `hasSecret`.

# Pagination info for search results.
type SearchResultsPagination {
    pageStart: Int
    pageEnd: Int
    totalRecords: Int
}

# An instance-scoped, operator-managed inference-provider config (ADR-056 §4). The
# `kind` selects the provider implementation (`anthropic` at GA); `endpoint`
# overrides the kind's default base URL (for a self-hosted / proxied model); `params`
# is the opaque per-kind tuning document. The API key is never returned — `hasSecret`
# reports only whether one is configured.
type AiProvider {
    id: ID!
    createdAt: String
    updatedAt: String
    token: String!
    name: String
    description: String
    # One of the registered provider kinds (see the aiProviderKinds query).
    kind: String!
    # The provider API base URL, or null for the kind's built-in default.
    endpoint: String
    # The provider model id (e.g. "claude-opus-4-8").
    model: String!
    # The opaque per-kind inference params (a JSON object), or null.
    params: String
    # Whether this provider may be resolved and used. A disabled provider keeps its
    # grants but never serves a call, so a model can be taken out of service without
    # unpicking its packaging.
    enabled: Boolean!
    # Whether an API key is configured, without exposing it.
    hasSecret: Boolean!
}

# One tier→provider offer: this provider is on the menu of every tenant at this tier
# (ADR-065 decision 10).
type AiProviderTierGrant {
    # The user-management tier token. Returned verbatim even when no such tier exists:
    # this service cannot validate it (the tier catalog is on user-management's
    # identity-only admin plane, and this service holds a service token), so an unknown
    # tier stays visible to the operator instead of being filtered out of the one
    # screen that could reveal it.
    tier: String!
    provider: AiProvider!
    # Whether this grant is the tier's default model: what a tenant at this tier gets for
    # a function it never assigned, if the model is still on its menu. At most one grant
    # per tier carries it, and only because an operator said so (setAiTierDefault) — a
    # tier may grant models and mark none, in which case its tenants must choose
    # explicitly. Nothing infers this mark from the grants.
    isDefault: Boolean!
}

# One per-tenant additive grant: a model this tenant may use over and above what its
# tier offers (ADR-065 decision 7's audited exception). Additive-only — there is no
# matching deny, so an exception can never undercut what the tier sold.
type AiProviderTenantGrant {
    tenant: String!
    provider: AiProvider!
}

# One member of the platform's AI-function vocabulary: a job a model can be assigned to
# (ADR-065 S5c′). Platform-declared, never operator-authored — the tokens here are what a
# tenant's function assignment names. GA declares exactly one (rule-drafting); a second is
# a code declaration, never a schema change.
type AiFunction {
    # The stable token stored in an assignment and validated at write.
    token: String!
    # The human label for the operator's picker.
    name: String!
    # What the function does, for the same picker.
    description: String!
}

# One tenant's stored choice of model for a function (ADR-065 S5c′). This is what the
# tenant CHOSE, not necessarily what it GETS: an assignment naming a model the tenant is
# no longer entitled to still appears here (so an operator can see and fix the stale
# choice), and resolves to no model until the entitlement returns. Entitlement is applied
# at resolve time, never here.
type AiFunctionAssignment {
    # The assigned function's token (one of the aiFunctions vocabulary).
    function: String!
    # The provider the tenant chose for it. Present even when off the tenant's current
    # menu — the operator surface shows the choice regardless of entitlement.
    provider: AiProvider!
}

# Data to create or update a provider. `secret` (the API key) is write-only: omit it
# on update to preserve the stored key, send a value to replace it, or send an empty
# string to clear it. On create, omit or empty means no key yet.
input AiProviderCreateRequest {
    token: String!
    name: String
    description: String
    kind: String!
    endpoint: String
    model: String!
    params: String
    enabled: Boolean!
    secret: String
}

# Criteria used when searching for providers.
input AiProviderSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    kind: String
}

# Search results returned from a provider query.
type AiProviderSearchResults {
    results: [AiProvider!]!
    pagination: SearchResultsPagination!
}

# An inference request: the user prompt plus an optional system prompt. The
# output-token cap, the provider endpoint, and the call timeout are server-side,
# never caller-supplied.
input InferenceRequest {
    # The user prompt (required).
    prompt: String!
    # An optional system prompt (instructions/persona).
    system: String
}

# The result of an inference call.
type InferenceResult {
    candidate: String!
    model: String!
    provider: String!
}

type Query {
    # Look up a single provider by its token (requires ai:admin).
    aiProvider(token: String!): AiProvider
    # Search providers by criteria (requires ai:admin).
    aiProviders(criteria: AiProviderSearchCriteria!): AiProviderSearchResults!
    # The registered provider-kind vocabulary, for a console picker (requires ai:admin).
    aiProviderKinds: [String!]!
    # Every tier→provider grant on this instance: the packaging matrix (requires
    # ai:admin). Includes grants naming a tier that no longer exists.
    aiProviderTierGrants: [AiProviderTierGrant!]!
    # One tenant's additive grants (requires ai:admin).
    aiProviderTenantGrants(tenant: String!): [AiProviderTenantGrant!]!
    # The platform's AI-function vocabulary, for the per-tenant assignment picker
    # (requires ai:admin). GA declares exactly one function.
    aiFunctions: [AiFunction!]!
    # One tenant's stored per-function model choices (requires ai:admin). Lists what the
    # tenant CHOSE, including a choice it is no longer entitled to — resolution applies
    # entitlement, this surface does not, so the operator can see a stale choice to fix it.
    aiFunctionAssignments(tenant: String!): [AiFunctionAssignment!]!
}

type Mutation {
    # Create a new provider. It is offered to nobody until granted to a tier.
    createAiProvider(request: AiProviderCreateRequest!): AiProvider!
    # Update the provider with the given (current) token. When expectedUpdatedAt is
    # supplied it is an optimistic-concurrency precondition: the update fails (CONFLICT)
    # if the provider's updatedAt has changed since. Grants are not changed here.
    updateAiProvider(token: String!, request: AiProviderCreateRequest!, expectedUpdatedAt: String): AiProvider!
    # Delete the provider with the given token (and its key). Returns whether a row was
    # deleted. REFUSED while anything still points at the provider — a tier or tenant
    # grant, or a tenant's function assignment — so an operator cannot silently strip a
    # model from live tenants with one delete. The refusal names every reason at once. A
    # tier's default needs no reason of its own: the mark rides a grant row, so a default
    # is always caught by the grant it belongs to.
    deleteAiProvider(token: String!): Boolean!
    # Offer a provider to every tenant at a tier: an ENTITLEMENT, and nothing about
    # which model anything uses. Idempotent. Granting only ever widens what tenants at
    # the tier may use — it never re-points what any of them gets.
    #
    # IT TAKES NO makeDefault ARGUMENT, DELIBERATELY. Granting and defaulting are separate
    # acts with separate mutations (setAiTierDefault). A makeDefault flag is exactly where
    # the auto-mark bug lived: it made the default a property of the grant call, so a later
    # grant could silently overturn an operator's explicit "no default". Granting a tier its
    # first model does not mark it either.
    grantAiProviderToTier(tier: String!, provider: String!): Boolean!
    # Withdraw a tier's offer of a provider. Returns whether a grant was removed. Revoking
    # the tier's default leaves the tier with NO default — nothing is promoted in its
    # place.
    revokeAiProviderFromTier(tier: String!, provider: String!): Boolean!
    # Mark an ALREADY-GRANTED provider as the tier's default: what a tenant at that tier
    # gets for a function it never assigned, PROVIDED its menu includes that model.
    # Demotes any previous default. At most one per tier. Refused when the pair is not
    # granted — a default must be something the tier actually offers, and this never
    # creates the grant as a side effect.
    setAiTierDefault(tier: String!, provider: String!): Boolean!
    # Mark none of a tier's grants as its default, leaving every grant in place.
    # Idempotent. Afterwards a tenant at that tier which assigned no model for a function
    # resolves to none and must choose explicitly.
    clearAiTierDefault(tier: String!): Boolean!
    # Add a provider to ONE tenant's menu over and above its tier. Idempotent. Additive
    # by construction: it widens what the tenant may use and re-points nothing.
    grantAiProviderToTenant(tenant: String!, provider: String!): Boolean!
    # Remove a tenant's additive grant. Returns whether one was removed. This withdraws
    # an exception, not an entitlement — what the tenant's tier offers is untouched.
    revokeAiProviderFromTenant(tenant: String!, provider: String!): Boolean!
    # Smoke-test a SPECIFIC provider (by token) with an operator-supplied prompt — the
    # affordance to validate a provider's endpoint + key before promoting it. It applies
    # no tenant-consent gate (operator config, an operator prompt, no tenant data
    # crosses the boundary), but the provider's key must still resolve.
    testAiProvider(token: String!, request: InferenceRequest!): InferenceResult!
    # Assign a tenant's model for one function — the operator's per-tenant choice
    # (ADR-065 S5c′). One row per (tenant, function); a second call replaces the first.
    #
    # IT DOES NOT CHECK THE MENU, DELIBERATELY. Entitlement is applied at RESOLVE time on
    # every call, so an assignment SURVIVES a temporary revoke: an operator who revokes a
    # model and grants it back has not silently destroyed the tenant's choice. An
    # assignment naming a model the tenant is not entitled to simply resolves to no model
    # until the entitlement returns — it never falls through to a substitute.
    setAiFunctionModel(tenant: String!, function: String!, provider: String!): Boolean!
    # Clear a tenant's choice for one function, reporting whether a row was removed.
    # Idempotent. Afterwards the tenant falls back to its tier's default (if the tier
    # marked one and the tenant is still entitled to it), which is the state it was in
    # before it ever chose.
    clearAiFunctionModel(tenant: String!, function: String!): Boolean!
}

schema {
    query: Query
    mutation: Mutation
}
