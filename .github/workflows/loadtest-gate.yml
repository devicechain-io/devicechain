#
# ADR-064 correctness-under-load release gate -- L5, iteration 2e.
#
# Iteration 1 (run 29856919636: 120s bring-up) proved the `--compact` stack
# cold-boots green on a hosted `ubuntu-latest` runner. On top of that proven
# bring-up this job DRIVES LOAD and asserts correctness oracles, each a
# dc-loadtest* binary whose non-zero exit IS the gate:
#   - L1  -- aggregate reconciliation: drive the seeded devicepulse scenario over
#            the device-plane HTTP ingress, reconcile PERSISTED == ACCEPTED.
#   - L2d-1 detection -> durable alarm: safety/edge/background populations through
#            an authored raiseAlarm rule; gate on the durable CLEARED+MAJOR alarm.
#   - L2d-3 command round-trip: authored threshold->sendCommand rule enqueues a
#            command that a real MQTT cmdreceiver cohort answers; gate on durable
#            SUCCESSFUL. This is the ONLY oracle that dials the NATS MQTT gateway --
#            it needs its own port-forward (see the command port-forward step for why
#            the kind host-port map is a dead route and cannot be used here).
#   - L3  -- ADR-063 tiered contention (the acceptance test for preferential
#            shedding): TWO probe tenants (gold + best-effort) at the same load,
#            first at floor 0 (negative control -- neither may shed), then at an
#            operator-set floor (gold rides through zero-loss, the best-effort probe
#            sheds yet loses only what it was told). The floor is set live between
#            the two regimes by patching event-sources' config + a rollout.
# Reports -> step summary + artifacts, plus a consolidated baseline.json (the
# ADR-064 "target numbers" record) at the end of a run.
#
# TWO ways in, and NEVER per-PR (ADR-064 decision 1 is a pre-release-TAG gate;
# per-PR keeps only the pure oracle/harness unit tests already in `go test ./...`):
#   - workflow_dispatch -- manual, default --build (skew-free HEAD test).
#   - workflow_call     -- release.yml invokes this AFTER its `images` job has
#                          pushed the tag's images, on the PULL path (build=false,
#                          version=<the tag>), so the gate validates the very images
#                          the release published. A red gate blocks the GitHub
#                          Release (release.yml's `cli` job needs this one).
# Both triggers always supply `inputs`, so every step reads `inputs.*` directly;
# the shell-defaulting below is belt-and-suspenders, not a push-event workaround.
#
# Tools needed beyond the runner defaults (docker + kubectl are preinstalled):
# `kind` (dcctl creates the cluster from its embedded topology) and `tofu` (dcctl's
# infra step shells out to it), always; plus `ko` on the --build path only (dcctl
# builds each service image into a local registry; the pull path needs no builder).
# helm + kubectl access are Go libraries inside dcctl.

name: loadtest-gate

on:
  # Manual runs: default to --build (skew-free HEAD test of the checked-out code).
  workflow_dispatch:
    inputs:
      build:
        description: 'Build HEAD images from source (--build) -- skew-free test of the checked-out code. Uncheck to PULL `version` instead (the tag-path mode, where checkout==images==tag).'
        type: boolean
        default: true
      version:
        description: 'Published image tag to bootstrap when build is OFF (must exist in ghcr.io/devicechain-io AND its admin schema must match the checked-out dcctl)'
        required: true
        default: 'v0.8.5'
      skip_preflight:
        description: 'Skip dcctl preflight doctor checks (runner limits differ from a dev box)'
        type: boolean
        default: true
      devices:
        description: 'L1 load: device count (throughput = devices / emit_interval)'
        default: '80'
      emit_interval:
        description: 'L1 load: per-device emit interval (sub-second keeps exercising the #471 fix)'
        default: '500ms'
      hold:
        description: 'L1 load: how long to hold at load before reconciling'
        default: '20s'
  # Reusable entry point for release.yml. Same input names as workflow_dispatch so
  # every step's `inputs.*` reads work identically under either trigger. The caller
  # passes build=false + version=<the released tag> (the pull path); the string
  # inputs fall back to the same L1 defaults the manual path uses.
  workflow_call:
    inputs:
      build:
        description: 'Build HEAD images (--build) vs pull `version`. Release passes false.'
        type: boolean
        default: true
      version:
        description: 'Published image tag to bootstrap when build is false.'
        type: string
        required: false
        default: 'v0.8.5'
      skip_preflight:
        description: 'Skip dcctl preflight doctor checks.'
        type: boolean
        default: true
      devices:
        description: 'L1 load: device count.'
        type: string
        required: false
        default: '80'
      emit_interval:
        description: 'L1 load: per-device emit interval.'
        type: string
        required: false
        default: '500ms'
      hold:
        description: 'L1 load: how long to hold at load before reconciling.'
        type: string
        required: false
        default: '20s'

# Read-only: the gate bootstraps a throwaway kind cluster on the runner and either
# builds HEAD images locally or pulls PUBLIC ghcr images -- it never pushes an image
# or writes to the repo.
permissions:
  contents: read

concurrency:
  group: loadtest-gate-${{ github.ref }}
  # This is a MEASUREMENT run, not PR CI: a second dispatch should queue behind the
  # first, not cancel a mid-flight ~15 min bring-up and throw its numbers away.
  cancel-in-progress: false

jobs:
  bringup:
    runs-on: ubuntu-latest
    # Pull path is ~4 min end to end (iter 1 measured 120s bring-up). The --build
    # path additionally ko-builds ~14 service images + the frontend on 2 cores, so
    # allow more headroom; a genuine hang still trips the timeout well before the cap.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Build dcctl (and later the driver) from the checked-out ref. With the default
      # --build image source, the server images are ALSO built from this same ref, so
      # dcctl, server, and driver are one consistent commit -- no admin-schema skew
      # (a HEAD dcctl sending shedPriority to a pre-#480 published server is the skew
      # this avoids). On the pull path, consistency instead comes from checkout==tag.
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      # kind: install ONLY the binary, pinned. dcctl runs `kind create cluster`
      # itself from its embedded topology (ingress-ready node + host ports 80/443/
      # 1883), so this job must never `kind create` -- that would fight dcctl for
      # the cluster name. Bump deliberately; a newer kind means a newer default
      # node image (k8s version), which the chart must still deploy on.
      - name: Install kind
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          sudo install -m 0755 kind /usr/local/bin/kind
          rm -f kind
          kind version

      # OpenTofu: dcctl's "Apply infrastructure" step shells out to `tofu`
      # (preferred over terraform) for the postgres/timescale modules. tofu_wrapper
      # off so `exec.LookPath("tofu")` finds the real binary, not the action's shim.
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.1
          tofu_wrapper: false

      # ko: only the --build path needs it (dcctl shells out to ko to build each
      # service image into the local registry). Pinned to match release.yml so a
      # HEAD build here uses the same builder a real release would. Skipped on the
      # pull path. On the pull path the images are prebuilt (ghcr / the release
      # `images` job) so no builder is needed.
      - name: Install ko (build path only)
        # Only the --build path shells out to ko; the pull path (release.yml's
        # workflow_call, build=false) has prebuilt images and needs no builder. Both
        # triggers always supply `inputs.build`, so this reads it directly -- note
        # `github.event_name` is `push` under workflow_call (the caller's tag event),
        # so an event-name test would WRONGLY install ko on the release pull path.
        if: ${{ inputs.build }}
        uses: ko-build/setup-ko@v0.10
        with:
          version: v0.19.1

      - name: Build dcctl
        working-directory: backend/cli
        run: go build -o "$RUNNER_TEMP/dcctl" .

      # The one number the spike could not measure: cold `--compact` bring-up
      # wall-clock on a real 2-core hosted runner. dcctl's pipeline ends in a
      # "Wait for readiness" step, so a zero exit here already means green; the
      # independent oracle below re-checks that from kubectl rather than trusting it.
      - name: Bootstrap --compact (timed)
        id: bootstrap
        env:
          # Both triggers (dispatch + release's workflow_call) always supply inputs;
          # the shell-defaulting below is belt-and-suspenders, not a push workaround.
          BUILD_IN: ${{ inputs.build }}
          VERSION_IN: ${{ inputs.version }}
          SKIP_PREFLIGHT_IN: ${{ inputs.skip_preflight }}
        run: |
          set -o pipefail
          BUILD="${BUILD_IN:-true}"
          VERSION="${VERSION_IN:-v0.8.5}"
          SKIP_PREFLIGHT="${SKIP_PREFLIGHT_IN:-true}"
          preflight=""
          if [ "$SKIP_PREFLIGHT" = "true" ]; then preflight="--skip-preflight"; fi

          # Image source: --build (HEAD images from source, so dcctl + server + driver
          # are all the checked-out commit -- no admin-schema skew) vs --version (pull a
          # published tag; only skew-free when the checked-out dcctl's schema matches that
          # release, i.e. the tag-triggered path). A HEAD dcctl sending shedPriority to a
          # pre-#480 v0.8.5 server is exactly the skew --build avoids.
          if [ "$BUILD" = "true" ]; then
            imgargs="--build"
            echo "image source: --build (HEAD from source)"
          else
            imgargs="--version $VERSION"
            echo "image source: --version $VERSION (pull)"
          fi

          # The default step shell runs with `-e`, so capture dcctl's exit via `|| rc=$?`
          # rather than a bare `rc=$?` -- otherwise a failed bring-up aborts the script
          # before `end`/`elapsed_s` are recorded, and the summary loses the very number
          # this job exists to measure (how long it ran before dying = timeout vs crash).
          start=$(date +%s)
          rc=0
          # shellcheck disable=SC2086
          "$RUNNER_TEMP/dcctl" bootstrap local devicechain \
            --compact --host localhost -y $preflight $imgargs || rc=$?
          end=$(date +%s)

          elapsed=$((end - start))
          echo "elapsed_s=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Cold --compact bring-up wall-clock: ${elapsed}s (rc=$rc) on a 2-core ubuntu-latest runner."
          exit $rc

      # Independent oracle: re-derive green-ness straight from the cluster rather
      # than trusting the bootstrap's own readiness wait. Also captures the #381
      # cold-start signal (NATS "insufficient storage" reservation crash) that a
      # warm cluster masks. Runs on failure too, so a red bring-up still reports
      # WHY. This is the seed of the L1-L3 oracle a later iteration grows here.
      - name: Verify green (independent oracle)
        if: always()
        env:
          ELAPSED: ${{ steps.bootstrap.outputs.elapsed_s }}
          # Via env, never interpolated straight into the script -- a dispatch input
          # is attacker-shaped text even when only a maintainer can set it.
          VERSION_IN: ${{ inputs.version }}
          BUILD_IN: ${{ inputs.build }}
        run: |
          BUILD="${BUILD_IN:-true}"
          VERSION="${VERSION_IN:-v0.8.5}"
          kubectl get pods -A -o wide || true

          total=$(kubectl get pods -A --no-headers 2>/dev/null | wc -l)

          # A pod is healthy iff Completed, OR Running with READY n/m where n==m.
          # STATUS alone (the first draft) passed a Running-but-0/1 pod whose
          # readiness probe is failing -- so this reads READY too, making the oracle
          # genuinely independent of dcctl's own "Available" wait rather than a
          # weaker restatement of it. Completed Jobs read 0/1 READY by design and
          # are exempted first.
          not_ready=$(kubectl get pods -A --no-headers 2>/dev/null | awk '
            {
              status=$4; ready=$3
              if (status=="Completed") next
              if (status=="Running") {
                split(ready, rc, "/")
                if (rc[1]==rc[2]) next
              }
              c++
            }
            END { print c+0 }')

          # Restart gate = the REAL #381 detector. The cold-start "insufficient
          # storage" crash surfaces only in service/NATS LOGS, never as a k8s Event
          # (there is no EventRecorder in backend/k8s), so grepping events for it is a
          # check that cannot fail. But any crash-then-recover -- #381 or otherwise --
          # leaves RESTARTS > 0 even after the pod goes green, so gating restarts
          # catches the whole class without needing to know the error string. Scoped
          # to non-kube-system: the instance + infra pods (where #381 lives) must cold-
          # boot with zero restarts, matching the spike's "0 restarts" ground truth,
          # while a control-plane liveness hiccup under 2-core pressure can't flake the
          # gate. RESTARTS renders as "2 (5m ago)"; the leading token is the count.
          restarts=$(kubectl get pods -A --no-headers 2>/dev/null \
            | awk '$1 != "kube-system" { split($5, a, " "); s += a[1] } END { print s+0 }')
          restarts_all=$(kubectl get pods -A --no-headers 2>/dev/null \
            | awk '{ split($5, a, " "); s += a[1] } END { print s+0 }')

          {
            echo "## ADR-064 L5 iteration 2e -- cold --compact bring-up on ubuntu-latest"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            if [ "$BUILD" = "true" ]; then
              echo "| image source | HEAD (\`--build\`) |"
            else
              echo "| image source | \`${VERSION}\` (pull) |"
            fi
            echo "| wall-clock to green | ${ELAPSED:-unknown}s |"
            echo "| pods total (-A) | ${total} |"
            echo "| pods not ready | ${not_ready} |"
            echo "| restarts (non-kube-system) | ${restarts} |"
            echo "| restarts (all namespaces) | ${restarts_all} |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          # Anti-vacuous-pass floor (NOT a health threshold): if kubectl is absent
          # or aimed at an empty/wrong context, every count below reads 0 and the
          # gate would go green having verified NOTHING. A healthy `-A` compact
          # cluster is ~25 pods (kube-system ~10 + the instance); 15 sits safely
          # above a kube-system-only read and below the real stack, so "0 or only
          # kube-system" trips here instead of passing silently. If a legitimate
          # compact stack ever drops below this, that is itself worth a look --
          # raise the floor deliberately, don't lower it to paper over a drop.
          if [ "${total:-0}" -lt 15 ]; then
            echo "::error::Only ${total} pods visible cluster-wide -- a green compact stack is ~25. kubectl is missing, or aimed at an empty/wrong context, or the instance never installed. Refusing to report green off an empty read."
            fail=1
          fi
          if [ "${not_ready:-1}" -ne 0 ]; then
            echo "::error::${not_ready} pod(s) not ready (not Completed, and not Running with all containers ready) after bring-up."
            fail=1
          fi
          if [ "${restarts:-1}" -ne 0 ]; then
            echo "::error::${restarts} restart(s) among non-kube-system pods -- a clean cold --compact boot has zero (spike ground truth). A crash-then-recover (e.g. the #381 'insufficient storage' class) leaves restarts even after the pod goes green; see the diagnostics step for which pod and why."
            fail=1
          fi
          exit $fail

      # =====================================================================
      # ADR-064 L1 -- aggregate reconciliation under load (iteration 2a).
      # The bring-up above proved the stack comes up green; these steps prove it
      # is CORRECT UNDER LOAD, which is the actual point of the gate.
      # =====================================================================

      - name: Build load-test drivers
        working-directory: backend/sims/dc-simulator
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          go build -o "$RUNNER_TEMP/bin/dc-loadtest" ./cmd/loadtest
          go build -o "$RUNNER_TEMP/bin/dc-loadtest-detection" ./cmd/loadtest-detection
          go build -o "$RUNNER_TEMP/bin/dc-loadtest-command" ./cmd/loadtest-command
          go build -o "$RUNNER_TEMP/bin/dc-loadtest-contention" ./cmd/loadtest-contention

      # One shared port-forward for the device-plane ingest, used by every probe
      # (L1, detection, command, contention). Opened once here, closed at the end.
      # Device-plane HTTP ingest (:8081) is NOT a kind host-port map, so it needs a
      # forward -- the coordinate dc-loadtest* resolve from the handshake by default
      # (http://localhost:8081). The tenant GraphQL / durable-oracle read-backs are
      # on the ingress (:80), no forward.
      #
      # MQTT (:1883) is NOT reachable at the host either, despite the kind config
      # mapping host 1883 -> node 31883: that mapping is a DEAD route. dcctl embeds
      # deploy/local/kind-cluster.yaml (assets.KindClusterConfig), whose 1883->31883
      # entry is a NodePort slot from the legacy up.sh topology -- but the dcctl
      # opentofu deploy exposes the MQTT gateway as a ClusterIP Service ONLY and never
      # creates a NodePort on 31883, so the docker-proxy accepts the TCP connection and
      # forwards it to an empty node port, which resets: the paho client sees
      # "network Error: EOF" before the auth callout. (Contrast :80/:443, whose kind
      # host-port maps DO land on ingress-nginx's real NodePort.) The command step
      # therefore opens its OWN port-forward on a fresh host port -- NOT 1883, which
      # the dead docker-proxy already holds -- and points the driver at it.
      - name: Open device-plane ingress (shared port-forward)
        id: ingress
        run: |
          kubectl port-forward -n devicechain svc/event-sources 8081:8081 \
            >"$RUNNER_TEMP/pf-eventsources.log" 2>&1 &
          pf_pid=$!
          echo "pf_pid=$pf_pid" >> "$GITHUB_OUTPUT"

          # Don't proceed until the forward accepts a connection. A 404 from `/` is
          # success -- curl exits 0 only on a real HTTP response, which kubectl
          # port-forward returns only after the pod-side stream is established end to
          # end, so it proves a full round trip, not just an open socket.
          connected=0
          for _ in $(seq 1 30); do
            if curl -sS -o /dev/null --max-time 2 http://localhost:8081/ 2>/dev/null; then
              connected=1
              echo "device-plane ingress reachable at http://localhost:8081"
              break
            fi
            if ! kill -0 "$pf_pid" 2>/dev/null; then
              echo "::error::event-sources port-forward exited before the ingress became reachable"
              cat "$RUNNER_TEMP/pf-eventsources.log" || true
              exit 1
            fi
            sleep 2
          done
          if [ "$connected" -ne 1 ]; then
            echo "::error::device-plane port-forward never became reachable after 30 attempts (~60s); the tunnel, not the platform, is the cause."
            cat "$RUNNER_TEMP/pf-eventsources.log" || true
            exit 1
          fi

      # ---------------------------------------------------------------------
      # L1 -- aggregate reconciliation.
      # ---------------------------------------------------------------------
      - name: L1 -- create tenant, drive load + reconcile (the gate)
        env:
          DEVICES_IN: ${{ inputs.devices }}
          EMIT_INTERVAL_IN: ${{ inputs.emit_interval }}
          HOLD_IN: ${{ inputs.hold }}
        run: |
          # dcctl mints a scoped tenant identity as the seeded superuser (compact seeds
          # superuser@devicechain.local / devicechain -- the `dcctl sim` defaults) and
          # writes ~/.devicechain/sims/l1probe.json (the handshake dc-loadtest reads).
          "$RUNNER_TEMP/dcctl" sim create l1probe -s localhost
          # dc-loadtest drives the seeded scenario over the ingress, then reconciles
          # persisted==accepted (plus clean-drive and load-floor); non-zero exit on any
          # failed invariant IS the gate. Inputs are empty on a push event -> defaulted.
          "$RUNNER_TEMP/bin/dc-loadtest" \
            --handshake "$HOME/.devicechain/sims/l1probe.json" \
            --devices "${DEVICES_IN:-80}" \
            --emit-interval "${EMIT_INTERVAL_IN:-500ms}" \
            --hold "${HOLD_IN:-20s}" \
            --report "$RUNNER_TEMP/l1-report.json"

      - name: L1 report -> summary
        if: always()
        env:
          DEVICES_IN: ${{ inputs.devices }}
          EMIT_INTERVAL_IN: ${{ inputs.emit_interval }}
          HOLD_IN: ${{ inputs.hold }}
        run: |
          report="$RUNNER_TEMP/l1-report.json"
          printf '\n### ADR-064 L1 -- aggregate reconciliation (%s devices @ %s, hold %s)\n' \
            "${DEVICES_IN:-80}" "${EMIT_INTERVAL_IN:-500ms}" "${HOLD_IN:-20s}" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$report" ]; then
            printf '_report written but empty -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload L1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l1-report
          path: ${{ runner.temp }}/l1-report.json
          if-no-files-found: warn
          overwrite: true

      # ---------------------------------------------------------------------
      # L2d-1 -- detection edges -> durable alarm state.
      # ---------------------------------------------------------------------
      - name: L2 detection -- create tenant, drive, reconcile durable alarms (the gate)
        run: |
          # Fresh tenant: the detection harness AUTHORS a threshold+raiseAlarm rule on a
          # dedicated profile, and the authoring guard REFUSES if the rule pre-exists, so
          # every run needs a fresh sim. Three populations through ONE rule: safety
          # (emit below -> must NEVER raise), edge (cross up/down K cycles -> alarm must
          # go ACTIVE then settle CLEARED), background (saturate). The gate reconciles the
          # DURABLE alarm row (CLEARED + MAJOR tier -- not the vacuous raisedTime) over
          # DeviceMgmtGraphQL (:80); detectionStream is non-gating live evidence. Non-zero
          # exit on any failed invariant IS the gate.
          "$RUNNER_TEMP/dcctl" sim create detprobe -s localhost
          "$RUNNER_TEMP/bin/dc-loadtest-detection" \
            --handshake "$HOME/.devicechain/sims/detprobe.json" \
            --bg-devices 40 --bg-interval 500ms \
            --safety-probes 6 --edge-probes 6 --cycles 3 --probe-interval 2s \
            --min-accepted 600 \
            --report "$RUNNER_TEMP/detection-report.json"

      - name: Detection report -> summary
        if: always()
        run: |
          report="$RUNNER_TEMP/detection-report.json"
          printf '\n### ADR-064 L2d-1 -- detection -> durable alarm\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$report" ]; then
            printf '_report written but empty -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload detection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detection-report
          path: ${{ runner.temp }}/detection-report.json
          if-no-files-found: warn
          overwrite: true

      # ---------------------------------------------------------------------
      # L2d-3 -- command round-trip over real MQTT.
      # ---------------------------------------------------------------------
      # This is the one oracle that dials the NATS MQTT gateway (a cmdreceiver cohort
      # subscribes, and a dispatched command must reach durable SUCCESSFUL through
      # enqueue -> 30s sweep -> dispatch -> MQTT -> device respond). MQTT is a ClusterIP
      # Service with no usable host route (see the shared-forward step for why the kind
      # 1883 host map is dead), so this opens its OWN forward on a fresh port. It runs
      # BEFORE L3, while the shared ingress forward (the probes' HTTP emit path) is
      # still up and before L3's floor rollout replaces the event-sources pod.
      - name: Open MQTT gateway (command port-forward)
        id: mqtt
        run: |
          # 18831, deliberately NOT 1883: dcctl's kind topology maps host 1883 to a
          # NodePort (31883) the deploy never creates, so a docker-proxy already holds
          # 1883 as a dead route -- binding a forward there would fail or, worse, the
          # driver's default ssl://127.0.0.1:1883 would hit the dead route and EOF. A
          # fresh port forwards straight to the ClusterIP MQTT listener.
          kubectl port-forward -n dc-system svc/dc-nats 18831:1883 \
            >"$RUNNER_TEMP/pf-mqtt.log" 2>&1 &
          pf_pid=$!
          echo "pf_pid=$pf_pid" >> "$GITHUB_OUTPUT"

          # Ready when a TLS handshake returns the gateway's (self-signed) cert -- the
          # real protocol layer, like the ingress step's curl, proving the tunnel
          # reaches the MQTT listener end to end and not just an open local socket.
          connected=0
          for _ in $(seq 1 30); do
            if echo | timeout 3 openssl s_client -connect 127.0.0.1:18831 2>/dev/null \
                 | grep -q "BEGIN CERTIFICATE"; then
              connected=1
              echo "MQTT gateway reachable at ssl://127.0.0.1:18831"
              break
            fi
            if ! kill -0 "$pf_pid" 2>/dev/null; then
              echo "::error::MQTT gateway port-forward exited before it became reachable"
              cat "$RUNNER_TEMP/pf-mqtt.log" || true
              exit 1
            fi
            sleep 2
          done
          if [ "$connected" -ne 1 ]; then
            echo "::error::MQTT gateway port-forward never became reachable after 30 attempts (~60s); the tunnel, not the platform, is the cause."
            cat "$RUNNER_TEMP/pf-mqtt.log" || true
            exit 1
          fi

      - name: L2d-3 command -- create tenant, drive round-trip over MQTT (the gate)
        run: |
          # Fresh tenant: the command harness AUTHORS a threshold->sendCommand rule and
          # a command definition on a dedicated profile; the authoring guard REFUSES if
          # they pre-exist, so every run needs a fresh sim. Three populations through
          # ONE rule: safety (emit below -> must NEVER enqueue a command), command
          # (cross up K cycles -> exactly K commands each, all driven to durable
          # SUCCESSFUL), background (saturate). The gate reconciles DURABLE command
          # state over the tenant GraphQL (:80); the MQTT receive tally is non-gating
          # evidence. --mqtt-insecure (default) skips the self-signed gateway cert whose
          # SAN a 127.0.0.1 forward cannot match. Non-zero exit on any failed invariant
          # IS the gate.
          "$RUNNER_TEMP/dcctl" sim create cmdprobe -s localhost
          "$RUNNER_TEMP/bin/dc-loadtest-command" \
            --handshake "$HOME/.devicechain/sims/cmdprobe.json" \
            --mqtt-broker "ssl://127.0.0.1:18831" \
            --bg-devices 40 --bg-interval 500ms \
            --safety-probes 3 --command-probes 3 --cycles 3 --probe-interval 2s \
            --min-accepted 600 \
            --report "$RUNNER_TEMP/command-report.json"

      - name: Command report -> summary
        if: always()
        run: |
          report="$RUNNER_TEMP/command-report.json"
          printf '\n### ADR-064 L2d-3 -- command round-trip over MQTT\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$report" ]; then
            printf '_report written but empty -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload command report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-report
          path: ${{ runner.temp }}/command-report.json
          if-no-files-found: warn
          overwrite: true

      - name: Stop MQTT gateway forward (+ attribute the command round-trip)
        if: always()
        env:
          PF_PID: ${{ steps.mqtt.outputs.pf_pid }}
        run: |
          # This forward is the MOST drop-prone tunnel in the job: unlike the HTTP
          # forwards (short requests), it carries the cmdreceiver cohort's long-lived
          # paho connections for the whole drive, and the receiver auto-reconnects to
          # 127.0.0.1:18831 forever if the pf process dies -- so a tunnel drop shows up
          # as commands stuck in SENT and a red command-roundtrip invariant with NO hint
          # it was the tunnel. That is precisely the misdiagnosis ("compact MQTT bug")
          # that deferred this oracle, so attribute it explicitly: died, or stayed alive
          # while logging per-stream forwarding errors. PF_PID is passed via env (the
          # file's convention) rather than interpolated into the script.
          pf_errors=""
          if grep -qiE 'error forwarding|lost connection|an error occurred' "$RUNNER_TEMP/pf-mqtt.log" 2>/dev/null; then
            pf_errors=1
          fi
          if [ -n "$PF_PID" ] && kill -0 "$PF_PID" 2>/dev/null && [ -z "$pf_errors" ]; then
            echo "MQTT gateway port-forward survived the command round-trip cleanly (pid $PF_PID)."
          else
            echo "::warning::MQTT gateway port-forward did not survive cleanly -- a command-roundtrip red may be a kubectl port-forward drop, not a platform correctness failure. Log tail:"
            tail -30 "$RUNNER_TEMP/pf-mqtt.log" 2>/dev/null || true
          fi
          # L3 does not use MQTT and nothing later rebinds 18831, so no need to poll for
          # exit (unlike the shared :8081 forward, which must free the port for reopen).
          kill "$PF_PID" 2>/dev/null || true

      # =====================================================================
      # ADR-064 L3 -- tiered contention: the acceptance test for ADR-063
      # preferential shedding. Two probe tenants drive the SAME scenario at the
      # SAME rate over the shared platform, distinguished ONLY by shed priority --
      # gold (90, never-shed band) and best-effort (10, shed-first band). Run in
      # two regimes on the one cluster:
      #   1. NEGATIVE CONTROL at floor 0 (the default): neither tenant may shed. A
      #      shed here would be an ADR-023 base-ceiling artifact and would falsify
      #      the positive run's attribution ("the floor caused the sheds").
      #   2. POSITIVE at floor 1: gold rides through (zero sheds, zero loss) while
      #      the best-effort probe sheds (429) yet persists everything it accepted.
      # The floor is event-sources instance config, set LIVE between the regimes by
      # patching the per-service ConfigMap + a rollout (the GA "static floor" path;
      # the NATS-KV runtime knob is the deferred auto path). The rollout replaces the
      # event-sources pod, which drops the shared device-plane port-forward -- so the
      # shared forward is stopped before the floor change and a fresh one opened after.
      # dc-loadtest-contention's exit code IS the gate; --expect-floor states the regime.
      # =====================================================================

      - name: L3 -- provision gold + best-effort probe tenants
        run: |
          # Two distinct tenants at different shed bands (ADR-063). --shed-priority
          # overrides the tier's default band so each probe lands exactly where the
          # test needs it: gold in the never-shed 80-100 band, the shed probe in the
          # best-effort 1-19 band.
          "$RUNNER_TEMP/dcctl" sim create l3gold -s localhost --shed-priority 90
          "$RUNNER_TEMP/dcctl" sim create l3shed -s localhost --shed-priority 10

      - name: L3 negative control -- floor 0, neither may shed (the gate)
        run: |
          # Runs BEFORE any floor change, over the still-open shared forward. At floor
          # 0 ShedFactor is 1.0 for every class, so with both tenants driven below the
          # base ceiling neither may shed. This proves the positive run's sheds are
          # floor-caused, not a base-ceiling artifact. Non-zero exit IS the gate.
          "$RUNNER_TEMP/bin/dc-loadtest-contention" \
            --gold-handshake "$HOME/.devicechain/sims/l3gold.json" \
            --shed-handshake "$HOME/.devicechain/sims/l3shed.json" \
            --expect-floor 0 \
            --report "$RUNNER_TEMP/l3-neg-report.json"

      - name: L3 negative-control report -> summary
        if: always()
        run: |
          report="$RUNNER_TEMP/l3-neg-report.json"
          printf '\n### ADR-064 L3 -- contention negative control (floor 0)\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Stop shared device-plane forward (+ attribute L1/detection/command/L3-neg)
        if: always()
        env:
          PF_PID: ${{ steps.ingress.outputs.pf_pid }}
        run: |
          # This forward carried EVERY floor-0 probe's HTTP emit path (L1 + detection +
          # the command round-trip's bg/probe emits + L3 negative control). It can drop
          # under sustained req/s -- which surfaces SAFELY as a red (failed emits /
          # accepted skew), never a false green -- but a red must be ATTRIBUTED to the
          # tunnel vs the platform. Two failure shapes: the forward died, OR it stayed
          # alive but logged per-connection forwarding errors (kubectl pf often keeps
          # listening while failing every new stream). It is stopped here (not at job
          # end) because the coming rollout would drop it anyway, and 8081 must be free
          # for the fresh forward.
          pf_errors=""
          if grep -qiE 'error forwarding|lost connection|an error occurred' "$RUNNER_TEMP/pf-eventsources.log" 2>/dev/null; then
            pf_errors=1
          fi
          if [ -n "$PF_PID" ] && kill -0 "$PF_PID" 2>/dev/null && [ -z "$pf_errors" ]; then
            echo "shared device-plane port-forward survived the floor-0 probes cleanly (pid $PF_PID)."
          else
            echo "::warning::shared device-plane port-forward did not survive cleanly -- an L1/detection/command/L3-neg red may be a kubectl port-forward drop, not a platform correctness failure. Log tail:"
            tail -30 "$RUNNER_TEMP/pf-eventsources.log" 2>/dev/null || true
          fi
          kill "$PF_PID" 2>/dev/null || true
          # Confirm it actually exited so local :8081 is free before the reopened forward
          # binds it -- a lingering pf would either block the new bind or answer the
          # reopen readiness curl against the old (floor-0) tunnel. It is not a child of
          # this step's shell (started in an earlier step), so poll rather than `wait`.
          if [ -n "$PF_PID" ]; then
            for _ in $(seq 1 10); do kill -0 "$PF_PID" 2>/dev/null || break; sleep 1; done
          fi

      - name: L3 -- set contention floor to 1 (patch event-sources + rollout)
        run: |
          set -o pipefail
          # ADR-063 GA static-floor path: the floor is event-sources instance config.
          # READ-MODIFY-WRITE the per-service ConfigMap key so ONLY the contention floor
          # changes. A blind `--type merge` on the JSON-STRING value would REPLACE the
          # whole event-sources config, silently wiping any other config the chart renders
          # there (e.g. ingestRateLimit) and breaking the "only the floor changed between
          # the two regimes" premise the attribution rests on -- a merge patch cannot merge
          # INSIDE a string. jq folds the floor into whatever is there (default {}).
          before=$(kubectl get configmap dct-devicechain-config -n devicechain \
            -o jsonpath='{.data.event-sources}')
          echo "event-sources config before: ${before:-<empty>}"
          # NB: a literal {} default must NOT be inlined as ${before:-{}} -- the shell
          # reads the first } as the end of the expansion, leaving a stray } that makes
          # jq choke ("Unmatched '}'"). Assign the default on its own line instead.
          if [ -z "$before" ]; then before='{}'; fi
          updated=$(printf '%s' "$before" | jq -c '. + {contention: {manualFloor: 1}}')
          kubectl patch configmap dct-devicechain-config -n devicechain --type merge \
            -p "$(jq -nc --arg v "$updated" '{data: {"event-sources": $v}}')"
          # rollout restart forces new pods regardless of the config-checksum annotation,
          # and a fresh pod always mounts the current ConfigMap -- so this needs no helm.
          kubectl rollout restart deployment/event-sources -n devicechain
          kubectl rollout status deployment/event-sources -n devicechain --timeout=120s
          echo "event-sources config after:"
          kubectl get configmap dct-devicechain-config -n devicechain \
            -o jsonpath='{.data.event-sources}'; echo

      - name: L3 -- reopen device-plane forward (post-rollout)
        id: ingress2
        run: |
          # The rollout replaced the event-sources pod. Forward to the NEW pod BY NAME,
          # not the Service: `rollout status` returns when the new pod is Ready, but the
          # old (floor-0) pod may still be Terminating and briefly in the Service's
          # endpoints, so `port-forward svc/` could bind the old pod and run the positive
          # drive against floor 0 -- a misattributed red flake. The newest pod by creation
          # time is the floor-1 pod. (A fresh forward is needed regardless: kubectl
          # port-forward binds one pod and does not follow a rollout.)
          newpod=$(kubectl get pods -n devicechain \
            -l devicechain.io/functional-area=event-sources \
            --field-selector=status.phase=Running \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.name}')
          if [ -z "$newpod" ]; then
            echo "::error::no Running event-sources pod found after the rollout"
            kubectl get pods -n devicechain -l devicechain.io/functional-area=event-sources -o wide || true
            exit 1
          fi
          echo "forwarding device-plane ingress to the post-rollout pod $newpod"
          # Same readiness discipline as the shared forward: a 404 from `/` proves a full
          # round trip through the new pod, not just an open local socket.
          kubectl port-forward -n devicechain "pod/$newpod" 8081:8081 \
            >"$RUNNER_TEMP/pf-eventsources-2.log" 2>&1 &
          pf_pid=$!
          echo "pf_pid=$pf_pid" >> "$GITHUB_OUTPUT"
          connected=0
          for _ in $(seq 1 30); do
            if curl -sS -o /dev/null --max-time 2 http://localhost:8081/ 2>/dev/null; then
              connected=1
              echo "device-plane ingress reachable again at http://localhost:8081 (post-rollout pod $newpod)"
              break
            fi
            if ! kill -0 "$pf_pid" 2>/dev/null; then
              echo "::error::reopened event-sources port-forward exited before the ingress became reachable"
              cat "$RUNNER_TEMP/pf-eventsources-2.log" || true
              exit 1
            fi
            sleep 2
          done
          if [ "$connected" -ne 1 ]; then
            echo "::error::reopened device-plane port-forward never became reachable after 30 attempts (~60s); the tunnel, not the platform, is the cause."
            cat "$RUNNER_TEMP/pf-eventsources-2.log" || true
            exit 1
          fi

      - name: L3 positive test -- floor 1, gold rides / best-effort sheds (the gate)
        run: |
          # Same drive as the negative control, now at floor 1. The classifier expects:
          # gold zero sheds + zero loss; the best-effort probe SHEDS (>0, else "gold rode
          # through" is vacuous) yet persists everything it accepted (shedding drops, it
          # must never corrupt). At the 1000/s base ceiling, 100 devices x 200ms ~= 500/s
          # per tenant sits in the sweet spot: above the shed probe's floor-1 ceiling
          # (0.25 x 1000 = 250/s, so it sheds) yet below gold's untouched base (so gold
          # never hits its own ADR-023 limit). Non-zero exit IS the gate.
          "$RUNNER_TEMP/bin/dc-loadtest-contention" \
            --gold-handshake "$HOME/.devicechain/sims/l3gold.json" \
            --shed-handshake "$HOME/.devicechain/sims/l3shed.json" \
            --expect-floor 1 \
            --report "$RUNNER_TEMP/l3-pos-report.json"

      - name: L3 positive report -> summary
        if: always()
        run: |
          report="$RUNNER_TEMP/l3-pos-report.json"
          printf '\n### ADR-064 L3 -- contention positive test (floor 1)\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload L3 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l3-reports
          path: ${{ runner.temp }}/l3-*-report.json
          if-no-files-found: warn
          overwrite: true

      - name: Stop device-plane forward (post-rollout) (+ attribute L3-pos)
        if: always()
        env:
          PF_PID: ${{ steps.ingress2.outputs.pf_pid }}
        run: |
          # The reopened forward carried only the L3 positive test. Same attribution as
          # the shared forward: a drop surfaces as a red, attributed to the tunnel here.
          pf_errors=""
          if grep -qiE 'error forwarding|lost connection|an error occurred' "$RUNNER_TEMP/pf-eventsources-2.log" 2>/dev/null; then
            pf_errors=1
          fi
          if [ -n "$PF_PID" ] && kill -0 "$PF_PID" 2>/dev/null && [ -z "$pf_errors" ]; then
            echo "post-rollout device-plane port-forward survived the L3 positive test cleanly (pid $PF_PID)."
          else
            echo "::warning::post-rollout device-plane port-forward did not survive cleanly -- an L3-positive red may be a kubectl port-forward drop, not a platform correctness failure. Log tail:"
            tail -30 "$RUNNER_TEMP/pf-eventsources-2.log" 2>/dev/null || true
          fi
          kill "$PF_PID" 2>/dev/null || true

      # =====================================================================
      # Baseline capture (ADR-064 "target numbers"). Consolidate the per-probe
      # reports into ONE baseline.json + a headline table -- the measured record
      # of what this stack sustained (L1 achieved rate + reconcile, detection
      # settle, L3 gold-rides / best-effort-sheds), so a release has a durable,
      # comparable number rather than only scattered per-step artifacts.
      # =====================================================================
      - name: Capture load-test baseline
        # always(): a green run records the baseline; a red run still records
        # whatever numbers it reached (useful evidence). Pure reporting -- it must
        # never turn a green gate red or mask a red one, so continue-on-error makes
        # that STRUCTURAL, not just intended: a truncated/malformed report (e.g. a
        # driver OOM-killed mid-write leaves non-empty invalid JSON that read_json
        # can't screen and `jq --argjson` rejects) fails only this step, never the job.
        if: always()
        continue-on-error: true
        env:
          BUILD_IN: ${{ inputs.build }}
          VERSION_IN: ${{ inputs.version }}
        run: |
          BUILD="${BUILD_IN:-true}"
          VERSION="${VERSION_IN:-v0.8.5}"
          export BUILD VERSION

          # Emit a file's JSON if it is non-empty, else the literal `null`, so a probe
          # that never produced a report folds into the baseline as null rather than
          # aborting the jq assembly (--argjson rejects an empty string).
          read_json() { if [ -s "$1" ]; then cat "$1"; else echo 'null'; fi; }
          l1="$(read_json "$RUNNER_TEMP/l1-report.json")"
          det="$(read_json "$RUNNER_TEMP/detection-report.json")"
          cmd="$(read_json "$RUNNER_TEMP/command-report.json")"
          pos="$(read_json "$RUNNER_TEMP/l3-pos-report.json")"

          # `passed` per probe mirrors Report.Passed(): an EMPTY invariant set is a
          # fail, not a vacuous pass, so a truncated report can't read as green here.
          baseline="$RUNNER_TEMP/loadtest-baseline.json"
          jq -n \
            --argjson l1 "$l1" \
            --argjson det "$det" \
            --argjson cmd "$cmd" \
            --argjson pos "$pos" '
            def verdict: ((.invariants | length) > 0) and all(.invariants[]; .passed);
            {
              runId:       env.GITHUB_RUN_ID,
              runAttempt:  env.GITHUB_RUN_ATTEMPT,
              ref:         env.GITHUB_SHA,
              imageSource: (if env.BUILD == "true" then "HEAD (--build)" else ("pull " + env.VERSION) end),
              l1: ($l1 | if . == null then null else {
                achievedRatePerSec: .drive.achievedRatePerSec,
                accepted:  .drive.accepted,
                persisted: .persistedEvents,
                failed:    .drive.failed,
                passed:    verdict
              } end),
              detection: ($det | if . == null then null else {
                achievedRatePerSec: .drive.achievedRatePerSec,
                accepted:           .drive.accepted,
                edgeProbes:         .edgeProbes,
                safetyProbes:       .safetyProbes,
                alarmSettleSeconds: .alarmSettleSeconds,
                passed:             verdict
              } end),
              command: ($cmd | if . == null then null else {
                achievedRatePerSec: .drive.achievedRatePerSec,
                accepted:           .drive.accepted,
                commandProbes:      .commandProbes,
                cycles:             .cycles,
                commandsReached:    .commandsReachedTarget,
                passed:             verdict
              } end),
              contentionFloor1: ($pos | if . == null then null else {
                goldAccepted:  .gold.Accepted,
                goldShed:      .gold.Shed,
                goldPersisted: .gold.Persisted,
                shedAccepted:  .shed.Accepted,
                shedShed:      .shed.Shed,
                shedPersisted: .shed.Persisted,
                passed:        verdict
              } end)
            }' > "$baseline"

          {
            echo ""
            echo "## ADR-064 load-test baseline (run ${GITHUB_RUN_ID})"
            echo ""
            echo "| probe | achieved ev/s | accepted | persisted | shed | verdict |"
            echo "| --- | ---: | ---: | ---: | ---: | :---: |"
            jq -r '
              def row($name; $rate; $acc; $per; $shed; $ok):
                "| \($name) | \($rate // "-") | \($acc // "-") | \($per // "-") | \($shed // "-") | \(if $ok == true then "PASS" elif $ok == false then "FAIL" else "-" end) |";
              [ row("L1 aggregate";
                    (.l1.achievedRatePerSec | if . then (.*10|round/10) else null end);
                    .l1.accepted; .l1.persisted; null; .l1.passed),
                row("detection";
                    (.detection.achievedRatePerSec | if . then (.*10|round/10) else null end);
                    .detection.accepted; null; null; .detection.passed),
                row("command round-trip";
                    (.command.achievedRatePerSec | if . then (.*10|round/10) else null end);
                    .command.accepted; null; null; .command.passed),
                row("L3 floor1 gold";
                    null; .contentionFloor1.goldAccepted; .contentionFloor1.goldPersisted;
                    .contentionFloor1.goldShed; .contentionFloor1.passed),
                row("L3 floor1 best-effort";
                    null; .contentionFloor1.shedAccepted; .contentionFloor1.shedPersisted;
                    .contentionFloor1.shedShed; .contentionFloor1.passed)
              ] | .[]' "$baseline"
            echo ""
            if [ "$BUILD" = "true" ]; then
              echo "_image source: HEAD (\`--build\`)_"
            else
              echo "_image source: \`${VERSION}\` (pull)_"
            fi
            echo ""
            echo '<details><summary>baseline.json</summary>'
            printf '\n```json\n'; cat "$baseline"; printf '\n```\n'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload load-test baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-baseline
          path: ${{ runner.temp }}/loadtest-baseline.json
          if-no-files-found: warn
          overwrite: true

      # Diagnostics only when something went wrong -- keeps green runs quiet while
      # giving a red run enough to see the cause without a re-run.
      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== not-ready pods ==="
          kubectl get pods -A --no-headers 2>/dev/null \
            | awk '
                { status=$4; ready=$3 }
                status=="Completed" { next }
                status=="Running" { split(ready, rc, "/"); if (rc[1]==rc[2]) next }
                { print $1, $2 }' \
            | while read -r ns pod; do
                echo "--- describe $ns/$pod ---"
                kubectl describe pod -n "$ns" "$pod" 2>/dev/null | tail -40
                echo "--- logs $ns/$pod (previous, then current) ---"
                kubectl logs -n "$ns" "$pod" --previous --tail=60 2>/dev/null || true
                kubectl logs -n "$ns" "$pod" --tail=60 2>/dev/null || true
              done

          # A pod that crashed on cold start then RECOVERED is Running/ready now, so it
          # is absent above -- but its restart count tripped the gate. Surface those
          # separately and grep their pre-restart logs for the #381 string, so a red
          # run says whether the crash-then-recover was the "insufficient storage" class.
          echo "=== pods that restarted (non-kube-system) ==="
          kubectl get pods -A --no-headers 2>/dev/null \
            | awk '$1 != "kube-system" { split($5, a, " "); if (a[1]+0 > 0) print $1, $2 }' \
            | while read -r ns pod; do
                echo "--- $ns/$pod restarted; pre-restart log tail ---"
                prev="$(kubectl logs -n "$ns" "$pod" --previous --tail=80 2>/dev/null || true)"
                echo "$prev" | tail -40
                if echo "$prev" | grep -qi 'insufficient storage'; then
                  echo "::warning::$ns/$pod hit 'insufficient storage' before restarting -- the #381 cold-start reservation class recurred on compact."
                fi
              done

          echo "=== recent Warning events ==="
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp 2>/dev/null | tail -50 || true

          # The device-plane port-forwards are the load path; if one dropped, a red is a
          # tunnel artifact, not a platform fault. Their logs are the only place that shows.
          # (The shared forward carried the floor-0 probes; the second carried L3-positive;
          # the MQTT forward carried the command round-trip's paho cohort.)
          echo "=== device-plane port-forward log (shared, floor-0 probes) ==="
          cat "$RUNNER_TEMP/pf-eventsources.log" 2>/dev/null || echo "(no shared port-forward log)"
          echo "=== device-plane port-forward log (post-rollout, L3-positive) ==="
          cat "$RUNNER_TEMP/pf-eventsources-2.log" 2>/dev/null || echo "(no post-rollout port-forward log)"
          echo "=== MQTT gateway port-forward log (command round-trip) ==="
          cat "$RUNNER_TEMP/pf-mqtt.log" 2>/dev/null || echo "(no MQTT port-forward log)"
