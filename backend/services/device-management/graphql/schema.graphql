    publishEntityGroup(token: String!, label: String, description: String): EntityGroupVersion!
    # Re-point a dynamic group's active version at an existing version — a
    # non-destructive rollback; the draft is untouched. Returns the updated group.
    rollbackEntityGroup(token: String!, version: Int!): EntityGroup!
    # Declare (upsert) a facet key by its natural key (memberType, key) — ADR-061 G2.
    setFacetKey(request: FacetKeySetRequest): FacetKey!
    # Delete a facet key by its natural key. Returns whether a row was removed; a
