apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        # No `command:` override — the images are built with ko (ADR-031), which
        # sets the entrypoint to the manager binary under /ko-app (there is no
        # /manager as a Dockerfile build would produce). args are still appended.
      - args:
        - "--health-probe-bind-address=:8081"
        # Metrics disabled for now (the deprecated kube-rbac-proxy sidecar was
        # removed; re-enable via controller-runtime's built-in metrics authn/z).
        - "--metrics-bind-address=0"
        # NOTE: main.go does not yet wire leader election; add --leader-elect once
        # it does (needed before the operator runs with replicas > 1).
        # Placeholder image name `controller`; `make deploy IMG=…` (kustomize
        # edit set image controller=…) rewrites it to the real published tag.
        image: controller:latest
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
