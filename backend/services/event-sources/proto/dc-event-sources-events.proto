syntax="proto3";

option go_package = "/proto";

package io.devicechain.eventsources;

/**
 * Unresolved event that has been decoded by
 * an event source.
 */
message PUnresolvedEvent {
    string source_id = 1;
    optional string alt_id = 2;
    string device = 3;
    optional string relationship = 4;
    string occurred_time = 5;
    string processed_time = 6;
    int64 event_type = 7;
    bytes payload = 8;
    // Credential presented by the connecting device (ADR-014). Used to
    // authenticate the device at the ingest->resolve boundary; absent when the
    // transport is trusted or authentication is disabled.
    optional string credential_type = 9;
    optional string credential_id = 10;
    optional string credential_secret = 11;
    // Set by an internal ingest source that authenticated the device at the
    // TRANSPORT (LwM2M DTLS-PSK / Sparkplug broker) upstream, so the device
    // presents no per-event credential. The resolver trusts the self-asserted
    // device token on such an event under deviceAuthMode=required (ADR-025 confines
    // inbound-events publish to the service account, so this is not device-forgeable
    // — see resolveDevice). NEVER set from device-controlled input.
    bool authenticated_transport = 12;
}

/**
 * Payload for creating a new relationship. The target is a uniform (type, token)
 * reference (ADR-013).
 */
message PUnresolvedNewRelationshipPayload {
    string relationship_type = 1;
    string target_type = 2;
    string target = 3;
}

/**
 * Single location entry for a location payload.
 */
message PUnresolvedLocationEntry {
    optional string latitude = 1;
    optional string longitude = 2;
    optional string elevation = 3;
    optional string occurred_time = 4;
}

/**
 * Payload for a location event.
 */
message PUnresolvedLocationsPayload {
    repeated PUnresolvedLocationEntry entries = 1;
}

/**
 * Single measurement entry for a measurement payload.
 */
message PUnresolvedMeasurementsEntry {
    map<string, string> measurements = 1;
    optional string occurred_time = 2;
}

/**
 * Payload for a measurement event.
 */
message PUnresolvedMeasurementsPayload {
    repeated PUnresolvedMeasurementsEntry entries = 1;
}

/**
 * Single alert entry for an alerts payload.
 */
message PUnresolvedAlertEntry {
    string type = 1;
    uint32 level = 2;
    string message = 3;
    string source = 4;
    optional string occurred_time = 5;
}

/**
 * Payload for an alert event.
 */
message PUnresolvedAlertsPayload {
    repeated PUnresolvedAlertEntry entries = 1;
}

/**
 * Payload for a device presence state-change event (ADR-067). session_id is a
 * producer-supplied monotonic session id (a host-observed connect epoch) carried
 * as a string to survive a JSON decode without precision loss.
 */
message PUnresolvedStateChangePayload {
    string state = 1;
    string reason = 2;
    string session_id = 3;
    optional string occurred_time = 4;
}
