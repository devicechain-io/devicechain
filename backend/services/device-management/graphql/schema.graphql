#
# Device Management GraphQL Schema
#

# Base elements in gorm RDB model.
interface Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
}

# Entity referenced by unique token.
interface TokenReference {
    token: String!
}

# Entity that provides human-readable name-description.
interface NamedEntity {
    name: String
    description: String
}

# Entity that provides branding information.
interface BrandedEntity {
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
}

# Entity that provides metadata.
interface MetadataEntity {
    metadata: String
}

# Pagination info for search results.
type SearchResultsPagination {
	pageStart: Int
	pageEnd: Int
	totalRecords: Int
}

# Pagination arguments for a paginated field or query (the input analogue of the
# pageNumber/pageSize pair the search-criteria inputs carry inline). Resolution is
# always bounded by the platform page-size ceiling regardless of the requested size.
input PaginationInput {
    pageNumber: Int!
    pageSize: Int!
}

# Represents a type or class of devices
type DeviceType implements Model & TokenReference & NamedEntity & BrandedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    profile: DeviceProfile
    manufacturer: String
    model: String
    metadata: String
}

# A discovery facet (ADR-045 decision 8) whose in-use values suggest completions in
# the authoring UI. MANUFACTURER/MODEL live on the device type; CATEGORY on the
# profile.
enum DeviceFacet {
    MANUFACTURER
    MODEL
    CATEGORY
}

# Represents a device profile (ADR-045) — the reusable, tenant-scoped capability
# contract a device type adopts. Distinct from the type's taxonomy/appearance; many
# types may share one profile. It is the home for the metric/command/alarm
# definitions (ADR-045 slice b).
type DeviceProfile implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    category: String
    metadata: String
    # The published version a device currently resolves through this profile
    # (ADR-045 versioning); null until the profile is first published — an
    # unpublished profile's definitions are inert (a device resolves nothing).
    activeVersion: Int
    # How many device types currently adopt this profile. A profile is a shared
    # contract, so editing its definitions affects every adopting type; the
    # authoring UI surfaces this before a publish.
    deviceTypeCount: Int!
    # The profile's DRAFT capability definitions — the editable working copy. A
    # device resolves the active PUBLISHED version, not these; edits here take
    # effect only when published.
    metricDefinitions: [MetricDefinition!]!
    commandDefinitions: [CommandDefinition!]!
    detectionRules: [DetectionRule!]!
}

# An immutable published snapshot of a device profile's whole capability set
# (ADR-045 versioning): its metric, command, and detection-rule definitions
# frozen together.
# The snapshot blob is deliberately omitted here — the list stays light; a device
# resolves the active version server-side, and rollback re-points it by version.
type DeviceProfileVersion {
    # Monotonic per-profile version number.
    version: Int!
    # Optional user-supplied label (may embed a semver string; not parsed).
    label: String
    description: String
    # When the version was published (the row's creation time).
    publishedAt: String!
    # The identity that published it (username, falling back to email).
    publishedBy: String
}

# Represents a typed, unit-bearing metric declared on a device profile (ADR-016/ADR-045).
type MetricDefinition implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    deviceProfile: DeviceProfile!
    metricKey: String!
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Data required to create a metric definition.
input MetricDefinitionCreateRequest {
    token: String!
    deviceProfileToken: String!
    metricKey: String!
    name: String
    description: String
    dataType: String!
    unit: String
    minValue: Float
    maxValue: Float
    enum: String
    descriptor: String
    metadata: String
}

# Criteria used when searching for metric definitions.
input MetricDefinitionSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceProfile: String
    metricKey: String
}

# Search results returned from metric definition query.
type MetricDefinitionSearchResults {
    results: [MetricDefinition!]!
    pagination: SearchResultsPagination!
}

# The answer to "may this command be enqueued to this device?" — the ADR-043
# decision 3 enqueue gate, evaluated here because this service owns the command
# vocabulary. A rejection is a verdict, not a GraphQL error, so a caller can tell an
# invalid command (relayable to its client) from an unavailable check (fail closed).
type CommandEnqueueVerdict {
    # Whether the command may be enqueued.
    allowed: Boolean!
    # Why it was rejected, in client-safe terms; null when allowed.
    reason: String
}

# One command a device currently accepts, read from its profile's active PUBLISHED
# version (ADR-043 decision 3). This is a snapshot copy frozen at publish — deliberately
# NOT a CommandDefinition, because it has no id or token to address: the draft row it was
# captured from may since have been edited or deleted. Author against commandDefinitions;
# read this to know what a device will accept right now.
type PublishedCommand {
    commandKey: String!
    name: String
    description: String
    # The ordered []CommandParameter contract as a JSON string, which drives the console
    # command form. Null when the command takes no structured arguments.
    parameterSchema: String
}

# The commands a device currently accepts (ADR-043 decision 3).
type DeviceCommandVocabulary {
    # Whether the profile restricts which commands may be sent. When false the enqueue
    # gate accepts ANY command key (decision 4) and `commands` is empty — so an empty
    # list does NOT mean "nothing can be sent to this device", it means the vocabulary
    # is open. Read this field rather than inferring from the list length.
    constrained: Boolean!
    # The published vocabulary; empty when not constrained.
    commands: [PublishedCommand!]!
}

# Represents a typed command declared on a device profile (ADR-043/ADR-045). parameterSchema
# is the ordered []CommandParameter argument contract as a JSON string, which drives the
# console command form and constrains an issued command's payload at enqueue (the
# validateCommandEnqueue gate). Null when the command declares no structured arguments.
type CommandDefinition implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    deviceProfile: DeviceProfile!
    commandKey: String!
    parameterSchema: String
    metadata: String
}

# Data required to create a command definition. parameterSchema is a JSON array of
# CommandParameter descriptors; it is validated for well-formedness on create.
input CommandDefinitionCreateRequest {
    token: String!
    deviceProfileToken: String!
    commandKey: String!
    name: String
    description: String
    parameterSchema: String
    metadata: String
}

# Criteria used when searching for command definitions.
input CommandDefinitionSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceProfile: String
    commandKey: String
}

# Search results returned from command definition query.
type CommandDefinitionSearchResults {
    results: [CommandDefinition!]!
    pagination: SearchResultsPagination!
}

# A DETECT rule declared on a device profile (ADR-051 / ADR-053 §5 / ADR-045). The rule
# body — definition — is an opaque JSON document (the event-processing rules.Rule schema);
# device-management versions it with the profile but does not parse the detection taxonomy
# (that stays single-homed in event-processing, which compiles and cost-gates it at
# publish). DetectionRule is the one alarm-authoring path (ADR-057); its edge-triggered rules
# raise/resolve alarms through the contributor-set integrator, the sole alarm path since the 6d cutover.
type DetectionRule implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    deviceProfile: DeviceProfile!
    # The authored rule as a JSON document (the rules.Rule schema).
    definition: String!
    # The optional visual-canvas document (ADR-053 CanvasDefinition JSON) this rule was
    # authored with, so the console re-opens it on the canvas — null for a form-authored rule.
    # Opaque authoring metadata; not parsed here and not frozen into the publish snapshot.
    authoringGraph: String
    enabled: Boolean!
    metadata: String
    # The optional group scope (ADR-062 S4): the published dynamic entity-group version whose
    # members the rule fires for. Both null for an unscoped (profile-wide) rule; set together
    # for a scoped rule (the engine fires it only for events whose resolved entity is a member
    # of entityGroupToken@entityGroupVersion).
    entityGroupToken: String
    entityGroupVersion: Int
}

# Data required to create a detection rule. definition is the rules.Rule JSON document as a
# string; device-management checks it is well-formed JSON on write, and event-processing
# performs the authoritative type/cost validation when the profile is published.
input DetectionRuleCreateRequest {
    token: String!
    deviceProfileToken: String!
    name: String
    description: String
    definition: String!
    # The optional canvas CanvasDefinition JSON sidecar (ADR-053 slice 9b). Omit for a
    # form-authored rule; when present it must be a JSON object. Stored verbatim, not parsed.
    authoringGraph: String
    enabled: Boolean!
    metadata: String
    # The optional group scope (ADR-062 S4): the published dynamic entity-group version whose
    # members the rule fires for. Omit both for an unscoped rule; set both together for a scoped
    # rule. Validated at save (must be a published dynamic group@version).
    entityGroupToken: String
    entityGroupVersion: Int
}

# Criteria used when searching for detection rules.
input DetectionRuleSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceProfile: String
}

# Search results returned from detection rule query.
type DetectionRuleSearchResults {
    results: [DetectionRule!]!
    pagination: SearchResultsPagination!
}

# A raised alarm (ADR-041) — the operational alarm object. Raised when a DETECT rule's
# condition fires (ADR-057, via the contributor-set integrator), keyed by (originator,
# alarmKey): there is at most one live alarm per key, so re-crossings dedup into the
# same row and severity escalates in place. The four-state model is state (ACTIVE |
# CLEARED) crossed with acknowledged. The originator is addressed uniformly by
# (originatorType, originatorId) (ADR-013); today it is always a device.
type Alarm implements Model & TokenReference & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    originatorType: String!
    originatorId: ID!
    # The originator's token, resolved on demand (device originators only today);
    # null when the originator is not a device or no longer exists. Mirrors
    # AlarmEvent.originatorToken so a live list and its reconciling query address the
    # originator the same way.
    originatorToken: String
    alarmKey: String!
    metricKey: String!
    state: String!
    acknowledged: Boolean!
    severity: String!
    raisedTime: String
    clearedTime: String
    acknowledgedTime: String
    acknowledgedBy: String
    lastValue: Float
    message: String
    metadata: String
}

# Criteria used when searching for alarms. All facets are optional and AND together;
# originator restricts to a single entity by its (originatorType, originator token).
input AlarmSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    originatorType: String
    originator: String
    state: String
    severity: String
    acknowledged: Boolean
    alarmKey: String
}

# Search results returned from an alarm query.
type AlarmSearchResults {
    results: [Alarm!]!
    pagination: SearchResultsPagination!
}

# Represents a single current-state attribute for an entity (ADR-012).
type EntityAttribute implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    entityType: String!
    entity: Entity!
    scope: String!
    attrKey: String!
    valueType: String!
    value: String
    lastUpdated: String
}

# Data required to set (upsert) an entity attribute.
input EntityAttributeSetRequest {
    entityType: String!
    entity: String!
    scope: String!
    attrKey: String!
    valueType: String!
    value: String
}

# Criteria used when searching for entity attributes.
input EntityAttributeSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    entityType: String
    entity: String
    scope: String
    attrKeys: [String!]
}

# A row of the append-only audit journal (ADR-019). Captured by construction on
# every entity mutation in this service; the journal is never mutated via the
# API. Times are RFC3339 strings.
type AuditEvent {
    id: ID!
    # RFC3339 time the audited statement committed.
    occurredTime: String!
    # "mutation" (an entity create/update/delete) or "auth" (login/refresh).
    category: String!
    # JWT subject that performed it, "system" for a system-context operation, or
    # "" when neither is present.
    actor: String!
    # "create" | "update" | "delete" for a mutation.
    operation: String!
    # Schema-qualified mutated table (empty for an auth event).
    tableName: String
    # Primary key of the affected row when the statement targets a single row;
    # empty for a bulk/condition mutation (rowsAffected then conveys the scope).
    entityPk: String
    # Human-facing, non-sensitive label of the affected row (e.g. its token),
    # captured when the model provides one; null otherwise.
    entityLabel: String
    # Number of rows the audited statement affected.
    rowsAffected: Int!
}

# Criteria for an audit-journal query. All filters are optional except
# pagination; a bounded (startTime, endTime) range is recommended.
input AuditEventSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    startTime: String
    endTime: String
    category: String
    operation: String
    actor: String
    tableName: String
    entityPk: String
}

# A page of audit-journal rows, newest first.
type AuditEventSearchResults {
    results: [AuditEvent!]!
    pagination: SearchResultsPagination!
}

# Search results returned from entity attribute query.
type EntityAttributeSearchResults {
    results: [EntityAttribute!]!
    pagination: SearchResultsPagination!
}

# Data required to create a device type.
input DeviceTypeCreateRequest {
    token: String!
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    # References the DeviceProfile this type adopts (ADR-045). Optional; empty or
    # omitted leaves the type with no profile. An unknown token is rejected.
    profileToken: String
    manufacturer: String
    model: String
    metadata: String
}

# Criteria used when searching for device types.
input DeviceTypeSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
}

# Search results returned from device type query.
type DeviceTypeSearchResults {
    results: [DeviceType!]!
    pagination: SearchResultsPagination!
}

# Data required to create a device profile (ADR-045).
input DeviceProfileCreateRequest {
    token: String!
    name: String
    description: String
    category: String
    metadata: String
}

# Criteria used when searching for device profiles.
input DeviceProfileSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
}

# Search results returned from device profile query.
type DeviceProfileSearchResults {
    results: [DeviceProfile!]!
    pagination: SearchResultsPagination!
}

# Represents a device instance
type Device implements Model & TokenReference & NamedEntity & MetadataEntity & Entity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    # Optional customer-owned business id (ADR-049) — a VIN, serial, asset tag —
    # distinct from the token: opaque, not a credential, unique per tenant when set.
    externalId: String
    name: String
    description: String
    deviceType: DeviceType!
    metadata: String
}

# Data required to create a device.
input DeviceCreateRequest {
    token: String!
    externalId: String
    name: String
    description: String
    deviceTypeToken: String!
    metadata: String
}

# Templated bulk device creation. The server renders `count` devices (indices
# startIndex .. startIndex+count-1) from the templates and creates them in one
# transaction. Templates understand `{n}` / `{n:0Wd}` (the 1-based index,
# optionally zero-padded to width W) and, for externalIdTemplate, `{random}`
# (a fresh random token per device). tokenTemplate MUST contain an index
# placeholder so every device gets a distinct token.
input DeviceBulkCreateRequest {
    deviceTypeToken: String!
    count: Int!
    startIndex: Int
    tokenTemplate: String!
    nameTemplate: String
    externalIdTemplate: String
    metadata: String
}

# Criteria used when searching for devices.
input DeviceSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceType: String
}

# Search results returned from device query.
type DeviceSearchResults {
    results: [Device!]!
    pagination: SearchResultsPagination!
}

# Represents a group of related devices.
type EntityGroup implements Model & TokenReference & NamedEntity & BrandedEntity & MetadataEntity & Entity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    metadata: String
    # The entity family this group collects: device | asset | area | customer.
    memberType: String!
    # How members are determined: static (explicit "member" edges) or dynamic
    # (a CEL selector over member-entity facet attributes — ADR-061 G3).
    membershipMode: String!
    # The CEL membership predicate, present only for dynamic groups.
    selector: String
    # The resolved members of this group — a static group's "member" edges or a
    # dynamic group's eval-on-read selector matches, transparently (a consumer does
    # not branch on mode). Always bounded + paginated (ADR-061 G4).
    members(pagination: PaginationInput!): EntityGroupMemberSearchResults!
    # The published version whose frozen selector a rule-scoped resolve reads
    # (ADR-062 S1). Null until a dynamic group is first published; always null for a
    # static group (never versioned). The live `selector` above is the mutable draft.
    activeVersion: Int
    # The group's published versions, newest first (ADR-062 S1). Empty for a group
    # that has never been published (and always empty for a static group).
    versions: [EntityGroupVersion!]!
}

# An immutable published snapshot of a DYNAMIC entity group's membership selector
# (ADR-062 S1). A rule scopes to a specific {group}@{version}, so its target set
# cannot drift under a later selector edit. Mirrors DeviceProfileVersion.
type EntityGroupVersion {
    # Monotonic per-group version number.
    version: Int!
    # The frozen lowerable-CEL membership selector captured at publish.
    selector: String!
    # The entity family the group collects, frozen with the version.
    memberType: String!
    # Optional user-supplied label (may embed a semver string; not parsed).
    label: String
    description: String
    # When the version was published (the row's creation time).
    publishedAt: String!
    # The identity that published it (username, falling back to email).
    publishedBy: String
}

# A resolved member of an entity group — the lightweight identity (row id + token)
# of a family entity, enough for a consumer to hydrate the full record. The family
# is the group's memberType, so it is not repeated per member.
type EntityGroupMember {
    id: ID!
    token: String!
}

# A paginated page of an entity group's resolved members.
type EntityGroupMemberSearchResults {
    results: [EntityGroupMember!]!
    pagination: SearchResultsPagination!
}

# The result of evaluating a CANDIDATE dynamic-group selector without saving it
# (ADR-061 G4). A selector that fails the publish gate (non-lowerable, over-budget,
# a parse/type error) returns valid=false with the console-surfaceable error in
# `error` and a null `members`, so the authoring UI can show the problem inline as
# the user types rather than treating it as a hard failure. When valid, `members`
# carries the eval-on-read matches (the live "matches N" preview).
type SelectorPreview {
    valid: Boolean!
    error: String
    members: EntityGroupMemberSearchResults
}

# Data required to create or replace an entity group (ADR-061). membershipMode
# defaults to "static"; selector is only permitted (and required) for "dynamic".
input EntityGroupCreateRequest {
    token: String!
    memberType: String!
    membershipMode: String
    selector: String
    name: String
    description: String
    imageUrl: String
    icon: String
    backgroundColor: String
    foregroundColor: String
    borderColor: String
    metadata: String
}

# Criteria used when searching for entity groups. memberType and membershipMode
# are optional filters.
input EntityGroupSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    memberType: String
    membershipMode: String
}

# Search results returned from entity groups query.
type EntityGroupSearchResults {
    results: [EntityGroup!]!
    pagination: SearchResultsPagination!
}

# A per-tenant declaration that an EntityAttribute key, for a member family, is a
# classification facet (ADR-061 G2 / SD-5). It declares which keys are facets for
# the console browse/filter axes + typeahead; it does NOT store facet values (those
# stay as EntityAttribute rows on the member entities). Addressed by its natural
# key (memberType, key). Named FacetKey to avoid colliding with the ADR-045
# discovery-facet concept (DeviceFacet / facetValues).
type FacetKey implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    # The entity family this facet classifies: device | asset | area | customer.
    memberType: String!
    # The EntityAttribute key this facet declares (e.g. "climate", "country").
    key: String!
    # The value type the facet's attribute values carry: STRING | LONG | DOUBLE |
    # BOOLEAN | JSON.
    valueType: String!
    # Where the facet's values come from: "attribute" (v1) or "system" (a
    # predefined, non-deletable, modeled-column facet — declared seam, deferred).
    source: String!
    # An optional value vocabulary that powers the console typeahead; null when the
    # facet's values are free-form.
    values: [String!]
    # An optional human display label for the axis; null falls back to key.
    label: String
}

# Data required to declare (upsert) a facet key (ADR-061 G2). The natural key
# (memberType, key) selects the row; the remaining fields are (re)written. v1 only
# writes attribute-source facets, so there is no source field here.
input FacetKeySetRequest {
    memberType: String!
    key: String!
    valueType: String!
    values: [String!]
    label: String
}

# Criteria used when searching for facet keys. memberType is an optional filter
# (the console axis picker asks per family).
input FacetKeySearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    memberType: String
}

# Search results returned from the facet keys query.
type FacetKeySearchResults {
    results: [FacetKey!]!
    pagination: SearchResultsPagination!
}

# Represents rotatable authentication material for a device (ADR-014).
type DeviceCredential implements Model & TokenReference & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    device: Device!
    credentialType: String!
    credentialId: String!
    # Write-only: accepted on create/update but never returned on read (always
    # null), so a stored secret (e.g. an MQTT_BASIC password) cannot be read back
    # out through the API.
    credentialValue: String
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Data required to create a device credential.
input DeviceCredentialCreateRequest {
    token: String!
    deviceToken: String!
    credentialType: String!
    credentialId: String!
    credentialValue: String
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Criteria used when searching for device credentials.
input DeviceCredentialSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    device: String
    credentialType: String
    credentialId: String
    enabled: Boolean
}

# Search results returned from device credential query.
type DeviceCredentialSearchResults {
    results: [DeviceCredential!]!
    pagination: SearchResultsPagination!
}

# A device provisioning profile (ADR-012): the shared key+secret a fleet presents
# to self-register, the strategy governing whether unknown devices may be created,
# and the device type stamped onto auto-created devices. The provision secret is
# write-only and is never exposed on this type.
type ProvisioningProfile implements Model & TokenReference & NamedEntity & MetadataEntity {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    token: String!
    name: String
    description: String
    provisionKey: String!
    strategy: String!
    deviceType: DeviceType!
    credentialType: String!
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Data required to create or update a provisioning profile.
input ProvisioningProfileCreateRequest {
    token: String!
    name: String
    description: String
    provisionKey: String!
    provisionSecret: String!
    strategy: String!
    deviceTypeToken: String!
    credentialType: String
    enabled: Boolean!
    expiresAt: String
    metadata: String
}

# Criteria used when searching for provisioning profiles.
input ProvisioningProfileSearchCriteria {
    pageNumber: Int!
    pageSize: Int!
    deviceType: String
    strategy: String
    enabled: Boolean
}

# Search results returned from provisioning profile query.
type ProvisioningProfileSearchResults {
    results: [ProvisioningProfile!]!
    pagination: SearchResultsPagination!
}

# A device's possession claim (ADR-012): a one-time, optionally expiring secret an
# eventual owner presents to assign the device to a customer. The claim secret is
# write-only and is never exposed on this type.
type DeviceClaim implements Model {
    id: ID!
    createdAt: String
    updatedAt: String
    deletedAt: String
    device: Device!
    status: String!
    expiresAt: String
    claimedTime: String
    claimedByCustomer: Customer
}

# Data required to open (or reopen) a device claim.
input DeviceClaimInitiateRequest {
    deviceToken: String!
    claimSecret: String!
    expiresAt: String
}

# Data required to redeem a device claim: the device, the claim secret (proof of
# possession), the customer to assign the device to, and the relationship type for
# the resulting device→customer ownership edge.
input DeviceClaimRequest {
