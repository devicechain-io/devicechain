# Contains mutations executed against model.
type Mutation {
    # Create a new device type.
    createDeviceType(request: DeviceTypeCreateRequest): DeviceType!
    # Update an existing device type.
    updateDeviceType(token: String!, request: DeviceTypeCreateRequest): DeviceType!
    # Delete a device type. Refused while any device references it; its owned
    # metric definitions are cascade-removed. Returns whether a row was deleted.
    deleteDeviceType(token: String!): Boolean!
    # Create a new metric definition.
    createMetricDefinition(request: MetricDefinitionCreateRequest): MetricDefinition!
    # Update an existing metric definition.
    updateMetricDefinition(token: String!, request: MetricDefinitionCreateRequest): MetricDefinition!
    # Delete a single metric definition.
    deleteMetricDefinition(token: String!): Boolean!
    # Set (upsert) an entity attribute.
    setEntityAttribute(request: EntityAttributeSetRequest!): EntityAttribute!
    # Delete an entity attribute by its natural key.
    deleteEntityAttribute(entityType: String!, entity: String!, scope: String!, attrKey: String!): Boolean!
    # Create a new device.
    createDevice(request: DeviceCreateRequest): Device!
    # Update an existing device.
    updateDevice(token: String!, request: DeviceCreateRequest): Device!
    # Delete a device, cascade-removing its credentials and relationship edges.
    deleteDevice(token: String!): Boolean!
    # Create a new device group.
    createDeviceGroup(request: DeviceGroupCreateRequest): DeviceGroup!
    # Update an existing device group.
    updateDeviceGroup(token: String!, request: DeviceGroupCreateRequest): DeviceGroup!
    # Delete a device group and its relationship edges.
    deleteDeviceGroup(token: String!): Boolean!
    # Create a new device credential.
    createDeviceCredential(request: DeviceCredentialCreateRequest): DeviceCredential!
    # Update an existing device credential.
    updateDeviceCredential(token: String!, request: DeviceCredentialCreateRequest): DeviceCredential!
    # Delete a single device credential.
    deleteDeviceCredential(token: String!): Boolean!
    # Create a new provisioning profile.
    createProvisioningProfile(request: ProvisioningProfileCreateRequest): ProvisioningProfile!
    # Update an existing provisioning profile.
    updateProvisioningProfile(token: String!, request: ProvisioningProfileCreateRequest): ProvisioningProfile!
    # Delete a single provisioning profile.
    deleteProvisioningProfile(token: String!): Boolean!
    # Self-register a device against a provisioning profile. Unauthenticated: the
    # tenant is resolved from the provision key and the key+secret is the gate.
    # Returns the credential the device must authenticate with going forward.
    provisionDevice(request: ProvisionDeviceRequest!): ProvisionDeviceResult!
    # Open (or reopen) a possession claim on a device with a secret an eventual
    # owner will present.
    initiateDeviceClaim(request: DeviceClaimInitiateRequest!): DeviceClaim!
    # Redeem a device's claim by presenting its secret, assigning the device to a
    # customer via a relationship of the given type. Returns the created edge.
    claimDevice(request: DeviceClaimRequest!): EntityRelationship!
    # Cancel a device's open claim without assigning it. Returns whether an open
    # claim was closed.
    cancelDeviceClaim(deviceToken: String!): Boolean!

    # Create a new entity relationship type.
    createEntityRelationshipType(request: EntityRelationshipTypeCreateRequest!): EntityRelationshipType!
    # Update an existing entity relationship type.
    updateEntityRelationshipType(token: String!, request: EntityRelationshipTypeCreateRequest!): EntityRelationshipType!
    # Delete a relationship type. Refused while any edge still uses it.
    deleteEntityRelationshipType(token: String!): Boolean!
    # Create a new entity relationship.
    createEntityRelationship(request: EntityRelationshipCreateRequest!): EntityRelationship!
    # Remove a single relationship edge — the explicit "unassign" operation.
    removeEntityRelationship(token: String!): Boolean!
    # Create multiple entity relationships in one transaction (bulk "add members" /
    # "assign"). Auto-provisions the reserved "member" relationship type on first use.
    createEntityRelationships(requests: [EntityRelationshipCreateRequest!]!): [EntityRelationship!]!
    # Remove multiple relationship edges by token (bulk "remove members" / "unassign").
    removeEntityRelationships(tokens: [String!]!): Boolean!

    # Create a new asset type.
    createAssetType(request: AssetTypeCreateRequest): AssetType!
    # Update an existing asset type.
    updateAssetType(token: String!, request: AssetTypeCreateRequest): AssetType!
    # Delete an asset type. Refused while any asset references it.
