    # The distinct non-empty values a discovery facet currently holds across the
    # tenant's device types / profiles — the suggestions offered under the free-text
    # facet inputs (ADR-045 decision 8). Sorted; empty until values are in use.
    facetValues(facet: DeviceFacet!): [String!]!
