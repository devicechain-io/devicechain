#
# ADR-064 correctness-under-load release gate -- L5, iteration 2a.
#
# Iteration 1 (confirmed green, run 29856919636: 120s bring-up) proved the
# `--compact` stack cold-boots green on a hosted `ubuntu-latest` runner and
# measured the 2-core wall-clock. This iteration adds the actual point of the
# gate on top of that proven bring-up: it DRIVES LOAD and asserts a correctness
# oracle. Stage 2a wires L1 -- aggregate reconciliation: drive the seeded
# devicepulse scenario over the real device-plane HTTP ingress, then reconcile
# the PERSISTED base-event count against the driver's ACCEPTED ledger. The
# dc-loadtest binary exits non-zero on any failed invariant, so its exit code IS
# the gate. Later stages layer L2 (detection / command probes) and L3 (ADR-063
# tiered contention) into the same job. Baseline numbers -> step summary + artifact.
#
# Deliberately NOT wired to the release/tag path yet, and deliberately NOT per-PR
# (ADR-064 decision 1 is a pre-release-TAG gate; per-PR keeps only the pure
# oracle/harness unit tests already in `go test ./...`). A later stage adds the
# tag trigger with `needs: [images]` on release.yml's published images once the
# full L1-L3 drive is proven green on a real runner.
#
# Tools needed beyond the runner defaults (docker + kubectl are preinstalled):
# `kind` (dcctl creates the cluster from its embedded topology) and `tofu` (dcctl's
# infra step shells out to it), always; plus `ko` on the --build path (dcctl builds
# each service image into a local registry). helm + kubectl access are Go libraries
# inside dcctl. The default here is --build (skew-free HEAD test); flip the `build`
# input off for the pull path, which the eventual tag trigger uses.

name: loadtest-gate

on:
  # TEMPORARY (remove before the final iteration-2 PR): auto-run on push to the dev
  # branch so the experimental gate can be iterated without a merge-to-main per cycle.
  push:
    branches: [ci/loadtest-gate-dev]
  workflow_dispatch:
    inputs:
      build:
        description: 'Build HEAD images from source (--build) -- skew-free test of the checked-out code. Uncheck to PULL `version` instead (the tag-path mode, where checkout==images==tag).'
        type: boolean
        default: true
      version:
        description: 'Published image tag to bootstrap when build is OFF (must exist in ghcr.io/devicechain-io AND its admin schema must match the checked-out dcctl)'
        required: true
        default: 'v0.8.5'
      skip_preflight:
        description: 'Skip dcctl preflight doctor checks (runner limits differ from a dev box)'
        type: boolean
        default: true
      devices:
        description: 'L1 load: device count (throughput = devices / emit_interval)'
        default: '80'
      emit_interval:
        description: 'L1 load: per-device emit interval (sub-second keeps exercising the #471 fix)'
        default: '500ms'
      hold:
        description: 'L1 load: how long to hold at load before reconciling'
        default: '20s'

# Read-only: the gate bootstraps a throwaway kind cluster on the runner and either
# builds HEAD images locally or pulls PUBLIC ghcr images -- it never pushes an image
# or writes to the repo.
permissions:
  contents: read

concurrency:
  group: loadtest-gate-${{ github.ref }}
  # This is a MEASUREMENT run, not PR CI: a second dispatch should queue behind the
  # first, not cancel a mid-flight ~15 min bring-up and throw its numbers away.
  cancel-in-progress: false

jobs:
  bringup:
    runs-on: ubuntu-latest
    # Pull path is ~4 min end to end (iter 1 measured 120s bring-up). The --build
    # path additionally ko-builds ~14 service images + the frontend on 2 cores, so
    # allow more headroom; a genuine hang still trips the timeout well before the cap.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Build dcctl (and later the driver) from the checked-out ref. With the default
      # --build image source, the server images are ALSO built from this same ref, so
      # dcctl, server, and driver are one consistent commit -- no admin-schema skew
      # (a HEAD dcctl sending shedPriority to a pre-#480 published server is the skew
      # this avoids). On the pull path, consistency instead comes from checkout==tag.
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: "**/go.sum"

      # kind: install ONLY the binary, pinned. dcctl runs `kind create cluster`
      # itself from its embedded topology (ingress-ready node + host ports 80/443/
      # 1883), so this job must never `kind create` -- that would fight dcctl for
      # the cluster name. Bump deliberately; a newer kind means a newer default
      # node image (k8s version), which the chart must still deploy on.
      - name: Install kind
        run: |
          curl -fsSL -o kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          sudo install -m 0755 kind /usr/local/bin/kind
          rm -f kind
          kind version

      # OpenTofu: dcctl's "Apply infrastructure" step shells out to `tofu`
      # (preferred over terraform) for the postgres/timescale modules. tofu_wrapper
      # off so `exec.LookPath("tofu")` finds the real binary, not the action's shim.
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.1
          tofu_wrapper: false

      # ko: only the --build path needs it (dcctl shells out to ko to build each
      # service image into the local registry). Pinned to match release.yml so a
      # HEAD build here uses the same builder a real release would. Skipped on the
      # pull path. On the pull path the images are prebuilt (ghcr / the release
      # `images` job) so no builder is needed.
      - name: Install ko (build path only)
        # Install ko UNLESS build was explicitly turned off on a dispatch. On a push
        # event there are no inputs, so the build path (the default) applies and ko is
        # needed. (`inputs.build` is empty on push -> a bare `if: inputs.build` would
        # wrongly skip it; hence the explicit event-name form.)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build }}
        uses: ko-build/setup-ko@v0.10
        with:
          version: v0.19.1

      - name: Build dcctl
        working-directory: backend/cli
        run: go build -o "$RUNNER_TEMP/dcctl" .

      # The one number the spike could not measure: cold `--compact` bring-up
      # wall-clock on a real 2-core hosted runner. dcctl's pipeline ends in a
      # "Wait for readiness" step, so a zero exit here already means green; the
      # independent oracle below re-checks that from kubectl rather than trusting it.
      - name: Bootstrap --compact (timed)
        id: bootstrap
        env:
          # Raw inputs (empty on a push event); shell-defaulted below so the same file
          # works for both push (dev-branch auto-run) and workflow_dispatch.
          BUILD_IN: ${{ inputs.build }}
          VERSION_IN: ${{ inputs.version }}
          SKIP_PREFLIGHT_IN: ${{ inputs.skip_preflight }}
        run: |
          set -o pipefail
          BUILD="${BUILD_IN:-true}"
          VERSION="${VERSION_IN:-v0.8.5}"
          SKIP_PREFLIGHT="${SKIP_PREFLIGHT_IN:-true}"
          preflight=""
          if [ "$SKIP_PREFLIGHT" = "true" ]; then preflight="--skip-preflight"; fi

          # Image source: --build (HEAD images from source, so dcctl + server + driver
          # are all the checked-out commit -- no admin-schema skew) vs --version (pull a
          # published tag; only skew-free when the checked-out dcctl's schema matches that
          # release, i.e. the tag-triggered path). A HEAD dcctl sending shedPriority to a
          # pre-#480 v0.8.5 server is exactly the skew --build avoids.
          if [ "$BUILD" = "true" ]; then
            imgargs="--build"
            echo "image source: --build (HEAD from source)"
          else
            imgargs="--version $VERSION"
            echo "image source: --version $VERSION (pull)"
          fi

          # The default step shell runs with `-e`, so capture dcctl's exit via `|| rc=$?`
          # rather than a bare `rc=$?` -- otherwise a failed bring-up aborts the script
          # before `end`/`elapsed_s` are recorded, and the summary loses the very number
          # this job exists to measure (how long it ran before dying = timeout vs crash).
          start=$(date +%s)
          rc=0
          # shellcheck disable=SC2086
          "$RUNNER_TEMP/dcctl" bootstrap local devicechain \
            --compact --host localhost -y $preflight $imgargs || rc=$?
          end=$(date +%s)

          elapsed=$((end - start))
          echo "elapsed_s=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Cold --compact bring-up wall-clock: ${elapsed}s (rc=$rc) on a 2-core ubuntu-latest runner."
          exit $rc

      # Independent oracle: re-derive green-ness straight from the cluster rather
      # than trusting the bootstrap's own readiness wait. Also captures the #381
      # cold-start signal (NATS "insufficient storage" reservation crash) that a
      # warm cluster masks. Runs on failure too, so a red bring-up still reports
      # WHY. This is the seed of the L1-L3 oracle a later iteration grows here.
      - name: Verify green (independent oracle)
        if: always()
        env:
          ELAPSED: ${{ steps.bootstrap.outputs.elapsed_s }}
          # Via env, never interpolated straight into the script -- a dispatch input
          # is attacker-shaped text even when only a maintainer can set it.
          VERSION_IN: ${{ inputs.version }}
          BUILD_IN: ${{ inputs.build }}
        run: |
          BUILD="${BUILD_IN:-true}"
          VERSION="${VERSION_IN:-v0.8.5}"
          kubectl get pods -A -o wide || true

          total=$(kubectl get pods -A --no-headers 2>/dev/null | wc -l)

          # A pod is healthy iff Completed, OR Running with READY n/m where n==m.
          # STATUS alone (the first draft) passed a Running-but-0/1 pod whose
          # readiness probe is failing -- so this reads READY too, making the oracle
          # genuinely independent of dcctl's own "Available" wait rather than a
          # weaker restatement of it. Completed Jobs read 0/1 READY by design and
          # are exempted first.
          not_ready=$(kubectl get pods -A --no-headers 2>/dev/null | awk '
            {
              status=$4; ready=$3
              if (status=="Completed") next
              if (status=="Running") {
                split(ready, rc, "/")
                if (rc[1]==rc[2]) next
              }
              c++
            }
            END { print c+0 }')

          # Restart gate = the REAL #381 detector. The cold-start "insufficient
          # storage" crash surfaces only in service/NATS LOGS, never as a k8s Event
          # (there is no EventRecorder in backend/k8s), so grepping events for it is a
          # check that cannot fail. But any crash-then-recover -- #381 or otherwise --
          # leaves RESTARTS > 0 even after the pod goes green, so gating restarts
          # catches the whole class without needing to know the error string. Scoped
          # to non-kube-system: the instance + infra pods (where #381 lives) must cold-
          # boot with zero restarts, matching the spike's "0 restarts" ground truth,
          # while a control-plane liveness hiccup under 2-core pressure can't flake the
          # gate. RESTARTS renders as "2 (5m ago)"; the leading token is the count.
          restarts=$(kubectl get pods -A --no-headers 2>/dev/null \
            | awk '$1 != "kube-system" { split($5, a, " "); s += a[1] } END { print s+0 }')
          restarts_all=$(kubectl get pods -A --no-headers 2>/dev/null \
            | awk '{ split($5, a, " "); s += a[1] } END { print s+0 }')

          {
            echo "## ADR-064 L5 iteration 2a -- cold --compact bring-up on ubuntu-latest"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            if [ "$BUILD" = "true" ]; then
              echo "| image source | HEAD (\`--build\`) |"
            else
              echo "| image source | \`${VERSION}\` (pull) |"
            fi
            echo "| wall-clock to green | ${ELAPSED:-unknown}s |"
            echo "| pods total (-A) | ${total} |"
            echo "| pods not ready | ${not_ready} |"
            echo "| restarts (non-kube-system) | ${restarts} |"
            echo "| restarts (all namespaces) | ${restarts_all} |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          # Anti-vacuous-pass floor (NOT a health threshold): if kubectl is absent
          # or aimed at an empty/wrong context, every count below reads 0 and the
          # gate would go green having verified NOTHING. A healthy `-A` compact
          # cluster is ~25 pods (kube-system ~10 + the instance); 15 sits safely
          # above a kube-system-only read and below the real stack, so "0 or only
          # kube-system" trips here instead of passing silently. If a legitimate
          # compact stack ever drops below this, that is itself worth a look --
          # raise the floor deliberately, don't lower it to paper over a drop.
          if [ "${total:-0}" -lt 15 ]; then
            echo "::error::Only ${total} pods visible cluster-wide -- a green compact stack is ~25. kubectl is missing, or aimed at an empty/wrong context, or the instance never installed. Refusing to report green off an empty read."
            fail=1
          fi
          if [ "${not_ready:-1}" -ne 0 ]; then
            echo "::error::${not_ready} pod(s) not ready (not Completed, and not Running with all containers ready) after bring-up."
            fail=1
          fi
          if [ "${restarts:-1}" -ne 0 ]; then
            echo "::error::${restarts} restart(s) among non-kube-system pods -- a clean cold --compact boot has zero (spike ground truth). A crash-then-recover (e.g. the #381 'insufficient storage' class) leaves restarts even after the pod goes green; see the diagnostics step for which pod and why."
            fail=1
          fi
          exit $fail

      # =====================================================================
      # ADR-064 L1 -- aggregate reconciliation under load (iteration 2a).
      # The bring-up above proved the stack comes up green; these steps prove it
      # is CORRECT UNDER LOAD, which is the actual point of the gate.
      # =====================================================================

      - name: Build load-test drivers
        working-directory: backend/sims/dc-simulator
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          go build -o "$RUNNER_TEMP/bin/dc-loadtest" ./cmd/loadtest
          go build -o "$RUNNER_TEMP/bin/dc-loadtest-detection" ./cmd/loadtest-detection

      # One shared port-forward for the device-plane ingest, used by every probe
      # (L1, detection, ... later command/contention). Opened once here, closed at
      # the end. Device-plane HTTP ingest (:8081) is NOT a kind host-port map (only
      # 80/443/1883 are), so it needs a forward -- the coordinate dc-loadtest*
      # resolve from the handshake by default (http://localhost:8081). The tenant
      # GraphQL / durable-oracle read-backs are on the ingress (:80), no forward.
      - name: Open device-plane ingress (shared port-forward)
        id: ingress
        run: |
          kubectl port-forward -n devicechain svc/event-sources 8081:8081 \
            >"$RUNNER_TEMP/pf-eventsources.log" 2>&1 &
          pf_pid=$!
          echo "pf_pid=$pf_pid" >> "$GITHUB_OUTPUT"

          # Don't proceed until the forward accepts a connection. A 404 from `/` is
          # success -- curl exits 0 only on a real HTTP response, which kubectl
          # port-forward returns only after the pod-side stream is established end to
          # end, so it proves a full round trip, not just an open socket.
          connected=0
          for _ in $(seq 1 30); do
            if curl -sS -o /dev/null --max-time 2 http://localhost:8081/ 2>/dev/null; then
              connected=1
              echo "device-plane ingress reachable at http://localhost:8081"
              break
            fi
            if ! kill -0 "$pf_pid" 2>/dev/null; then
              echo "::error::event-sources port-forward exited before the ingress became reachable"
              cat "$RUNNER_TEMP/pf-eventsources.log" || true
              exit 1
            fi
            sleep 2
          done
          if [ "$connected" -ne 1 ]; then
            echo "::error::device-plane port-forward never became reachable after 30 attempts (~60s); the tunnel, not the platform, is the cause."
            cat "$RUNNER_TEMP/pf-eventsources.log" || true
            exit 1
          fi

      # ---------------------------------------------------------------------
      # L1 -- aggregate reconciliation.
      # ---------------------------------------------------------------------
      - name: L1 -- create tenant, drive load + reconcile (the gate)
        env:
          DEVICES_IN: ${{ inputs.devices }}
          EMIT_INTERVAL_IN: ${{ inputs.emit_interval }}
          HOLD_IN: ${{ inputs.hold }}
        run: |
          # dcctl mints a scoped tenant identity as the seeded superuser (compact seeds
          # superuser@devicechain.local / devicechain -- the `dcctl sim` defaults) and
          # writes ~/.devicechain/sims/l1probe.json (the handshake dc-loadtest reads).
          "$RUNNER_TEMP/dcctl" sim create l1probe -s localhost
          # dc-loadtest drives the seeded scenario over the ingress, then reconciles
          # persisted==accepted (plus clean-drive and load-floor); non-zero exit on any
          # failed invariant IS the gate. Inputs are empty on a push event -> defaulted.
          "$RUNNER_TEMP/bin/dc-loadtest" \
            --handshake "$HOME/.devicechain/sims/l1probe.json" \
            --devices "${DEVICES_IN:-80}" \
            --emit-interval "${EMIT_INTERVAL_IN:-500ms}" \
            --hold "${HOLD_IN:-20s}" \
            --report "$RUNNER_TEMP/l1-report.json"

      - name: L1 report -> summary
        if: always()
        env:
          DEVICES_IN: ${{ inputs.devices }}
          EMIT_INTERVAL_IN: ${{ inputs.emit_interval }}
          HOLD_IN: ${{ inputs.hold }}
        run: |
          report="$RUNNER_TEMP/l1-report.json"
          printf '\n### ADR-064 L1 -- aggregate reconciliation (%s devices @ %s, hold %s)\n' \
            "${DEVICES_IN:-80}" "${EMIT_INTERVAL_IN:-500ms}" "${HOLD_IN:-20s}" >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$report" ]; then
            printf '_report written but empty -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload L1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l1-report
          path: ${{ runner.temp }}/l1-report.json
          if-no-files-found: warn

      # ---------------------------------------------------------------------
      # L2d-1 -- detection edges -> durable alarm state.
      # ---------------------------------------------------------------------
      - name: L2 detection -- create tenant, drive, reconcile durable alarms (the gate)
        run: |
          # Fresh tenant: the detection harness AUTHORS a threshold+raiseAlarm rule on a
          # dedicated profile, and the authoring guard REFUSES if the rule pre-exists, so
          # every run needs a fresh sim. Three populations through ONE rule: safety
          # (emit below -> must NEVER raise), edge (cross up/down K cycles -> alarm must
          # go ACTIVE then settle CLEARED), background (saturate). The gate reconciles the
          # DURABLE alarm row (CLEARED + MAJOR tier -- not the vacuous raisedTime) over
          # DeviceMgmtGraphQL (:80); detectionStream is non-gating live evidence. Non-zero
          # exit on any failed invariant IS the gate.
          "$RUNNER_TEMP/dcctl" sim create detprobe -s localhost
          "$RUNNER_TEMP/bin/dc-loadtest-detection" \
            --handshake "$HOME/.devicechain/sims/detprobe.json" \
            --bg-devices 40 --bg-interval 500ms \
            --safety-probes 6 --edge-probes 6 --cycles 3 --probe-interval 2s \
            --min-accepted 300 \
            --report "$RUNNER_TEMP/detection-report.json"

      - name: Detection report -> summary
        if: always()
        run: |
          report="$RUNNER_TEMP/detection-report.json"
          printf '\n### ADR-064 L2d-1 -- detection -> durable alarm\n' >> "$GITHUB_STEP_SUMMARY"
          if [ -s "$report" ]; then
            { printf '\n```json\n'; jq . "$report" 2>/dev/null || cat "$report"; printf '\n```\n'; } >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$report" ]; then
            printf '_report written but empty -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '_no report produced -- see the drive step log_\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload detection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detection-report
          path: ${{ runner.temp }}/detection-report.json
          if-no-files-found: warn

      - name: Stop device-plane port-forward (+ attribute a drop)
        if: always()
        env:
          PF_PID: ${{ steps.ingress.outputs.pf_pid }}
        run: |
          # kubectl port-forward is the load path here (device-plane :8081 is not a
          # kind host port). It can drop under sustained req/s -- which surfaces SAFELY
          # as a red (failed emits → clean-drive, or accepted skew → reconcile), never a
          # false green. But a red must be ATTRIBUTED: if the forward did not survive the
          # drive, the fault is the tunnel, not the platform. Report that before killing.
          if [ -n "$PF_PID" ] && kill -0 "$PF_PID" 2>/dev/null; then
            echo "device-plane port-forward survived the drive (pid $PF_PID)."
          else
            echo "::warning::device-plane port-forward did NOT survive the drive -- an L1 red is likely a kubectl port-forward drop, not a platform correctness failure. Log tail:"
            tail -30 "$RUNNER_TEMP/pf-eventsources.log" 2>/dev/null || true
          fi
          kill "$PF_PID" 2>/dev/null || true

      # Diagnostics only when something went wrong -- keeps green runs quiet while
      # giving a red run enough to see the cause without a re-run.
      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== not-ready pods ==="
          kubectl get pods -A --no-headers 2>/dev/null \
            | awk '
                { status=$4; ready=$3 }
                status=="Completed" { next }
                status=="Running" { split(ready, rc, "/"); if (rc[1]==rc[2]) next }
                { print $1, $2 }' \
            | while read -r ns pod; do
                echo "--- describe $ns/$pod ---"
                kubectl describe pod -n "$ns" "$pod" 2>/dev/null | tail -40
                echo "--- logs $ns/$pod (previous, then current) ---"
                kubectl logs -n "$ns" "$pod" --previous --tail=60 2>/dev/null || true
                kubectl logs -n "$ns" "$pod" --tail=60 2>/dev/null || true
              done

          # A pod that crashed on cold start then RECOVERED is Running/ready now, so it
          # is absent above -- but its restart count tripped the gate. Surface those
          # separately and grep their pre-restart logs for the #381 string, so a red
          # run says whether the crash-then-recover was the "insufficient storage" class.
          echo "=== pods that restarted (non-kube-system) ==="
          kubectl get pods -A --no-headers 2>/dev/null \
            | awk '$1 != "kube-system" { split($5, a, " "); if (a[1]+0 > 0) print $1, $2 }' \
            | while read -r ns pod; do
                echo "--- $ns/$pod restarted; pre-restart log tail ---"
                prev="$(kubectl logs -n "$ns" "$pod" --previous --tail=80 2>/dev/null || true)"
                echo "$prev" | tail -40
                if echo "$prev" | grep -qi 'insufficient storage'; then
                  echo "::warning::$ns/$pod hit 'insufficient storage' before restarting -- the #381 cold-start reservation class recurred on compact."
                fi
              done

          echo "=== recent Warning events ==="
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp 2>/dev/null | tail -50 || true

          # The device-plane port-forward is the L1 load path; if it dropped, a red is a
          # tunnel artifact, not a platform fault. Its log is the only place that shows.
          echo "=== device-plane port-forward log ==="
          cat "$RUNNER_TEMP/pf-eventsources.log" 2>/dev/null || echo "(no port-forward log)"
