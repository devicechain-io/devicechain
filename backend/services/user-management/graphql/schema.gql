# Tenant-scoped pair of JWTs returned by selectTenant or token refresh.
type AuthToken {
    accessToken: String!
    refreshToken: String!
    expiresAt: String!
}

# Result of an email/password login (ADR-033): an instance-scoped identity token
# plus the tenants the identity may act in. The caller picks one via selectTenant.
type IdentityAuth {
    identityToken: String!
    expiresAt: String!
    # Whether this identity holds the superuser system role (may enter any tenant).
    superuser: Boolean!
    memberships: [Membership!]!
}

# A tenant the authenticated identity belongs to, with the role tokens it holds.
type Membership {
    tenant: String!
    roles: [String!]!
}

# The tenant the authenticated caller is acting within (control plane). Drives
# the console's tenant header, and carries the resolved white-labeling branding
# (ADR-038) the console applies to the shell.
type Tenant {
    token: String!
    name: String
    description: String
    # The resolved white-labeling for this tenant: the tenant's override folded
    # over the operator/code default (most-specific-non-null wins). Always present;
    # an individual field is null when nothing overrides it, and the console then
    # keeps its built-in look for that field. Never carried in the JWT (ADR-038 §1).
    branding: TenantBranding!
    # The tenant's RAW branding override — the stored columns with no cascade, so a
    # null field means "this tenant inherits" (vs `branding`, which fills it from
    # the default). The editor reads this to show set-vs-inherited per field; it is
    # NOT for applying to the shell. Self-scoped, like `branding`.
    brandingOverride: TenantBranding!
}

# The resolved white-labeling applied to the console shell (ADR-038). A null field
# means "inherit the built-in look" for that aspect. Colors are hex #rrggbb;
# logoMaxHeight caps the render in px; updatedAt versions the value so a client can
# key its cache. logo is either a directly-usable value (an https URL or a bounded
# raster data: URI, Tier-0) or, for an object-store-backed (Tier-1) logo, a proxy
# path the client fetches with its token — the raw storage reference is never
# exposed. Logo lifecycle is managed OUT of the full-replace input below, via
# setTenantLogo (url/clear) and the POST /branding/logo upload (ADR-058).
type TenantBranding {
    title: String
    logo: String
    logoMaxHeight: Int
    primary: String
    background: String
    foreground: String
    accent: String
    updatedAt: String
}

# A white-labeling override for setTenantBranding — the theme fields only. Every
# field is optional: a null field CLEARS that override, re-inheriting the operator/
# code default. Validated server-side (fail-closed): hex colors, a bounded title and
# logo height. The logo is deliberately NOT here: a client cannot round-trip an
# object-store logo reference through a full replace, so setting colors/title would
# otherwise wipe an uploaded logo — logo is managed separately (setTenantLogo +
# the upload endpoint, ADR-058).
input TenantBrandingInput {
    title: String
    logoMaxHeight: Int
    primary: String
    background: String
    foreground: String
    accent: String
}

# The EFFECTIVE governance ceilings for the tenant the caller is acting within,
# already folded over the tenant's tier (ADR-065): each field is the tenant's own
# override if it has one, else its tier's setting. A null field means neither
# declares one, so the enforcing service applies the platform default — null is
# "inherit", never "unlimited". Read by the enforcing services over a service token:
# event-sources (ingest*) and outbound-connectors (outbound*, ADR-060).
#
# The tier's VALUES are deliberately not on the wire: a service enforcing a ceiling
# has no business knowing why the number is what it is. That provenance belongs to the
# admin plane, which exposes the tier and the tenant's override separately. The tier's
# IDENTITY is exposed (tierToken) for the one consumer that must resolve a SET this
# service cannot fold for it — see the field. Field selection keeps the rest honest:
# a service that does not ask does not learn.
type TenantGovernance {
    ingestMessagesPerSecond: Float
    ingestBurst: Int
    outboundMessagesPerSecond: Float
    outboundBurst: Int
    # Whether this tenant has opted in to routing its data to an EXTERNAL frontier
    # model (ADR-056 §6). Non-null and fail-closed: false unless explicitly opted
    # in. Read by the ai-inference service over a service token.
    aiExternalEnabled: Boolean!
    # How fast this tenant may spend AI inference budget (ADR-056 §6 / ADR-023),
    # enforced by the ai-inference service. Declared per MINUTE — drafting is a
    # human-paced authoring action, so the legible ceiling is "30 a minute", not
    # "0.5 a second". Null inherits the platform default, never unlimited.
    aiInferenceRequestsPerMinute: Float
    aiInferenceBurst: Int
    # This tenant's ADR-063 shed priority (1–100), resolved down the cascade (override,
    # else tier, else null). Read by event-sources over a service token: it bands the
    # value (80–100 gold · 50–79 silver · 20–49 bronze · 1–19 best-effort) and, under a
    # contention floor, lowers the affected classes' effective ingest ceiling. Null ⇒
    # the reader substitutes the platform fail-safe (a bronze-band value), never gold.
    shedPriority: Int
    # This tenant's ADR-065 packaging tier — its identity, not a value derived from it.
    # Read by ai-inference, which joins its own tier↔provider grants against it to
    # resolve which AI models the tenant may use (decision 10). It is here rather than
    # folded away like a ceiling because this service cannot resolve that set: it
    # cannot see providers at all (ai-inference is opt-in; user-management ships
    # everywhere and may never reference it).
    tierToken: String!
}

# The identity the caller is signed in as (control plane), for display in the
# console — its name, falling back to email.
type CurrentIdentity {
    email: String!
    firstName: String
    lastName: String
}

# The tenant-scoped user-management API is the authentication surface only
# (ADR-033). Identities, memberships, the role catalog, and tenants are
# administered through the instance-scoped admin API (admin_schema.gql) — the one
# exception is `tenant`, which lets a caller read their own tenant for display.
type Query {
    # Liveness placeholder.
    ping: String!
    # The tenant the caller is currently acting within (self-scoped).
    tenant: Tenant!
    # The ingest governance overrides for the caller's tenant (requires
    # tenant:read); read by the enforcing service over a service token.
    tenantGovernance: TenantGovernance!
    # The identity the caller is signed in as (self-scoped).
    me: CurrentIdentity!
    # Re-read the caller's live memberships from a valid identity token, so the
    # console can refresh its tenant picker after a membership change without a
    # re-login. The token is validated internally (like selectTenant), so this
    # runs before a tenant is selected.
    identityMemberships(identityToken: String!): [Membership!]!
}

type Mutation {
    # Authenticate with an email and password, returning an identity token + the
    # tenants the identity may select (ADR-033). No tenant is chosen yet.
    login(email: String!, password: String!): IdentityAuth!
    # Exchange an identity token for a tenant-scoped access/refresh pair.
    selectTenant(identityToken: String!, tenant: String!): AuthToken!
    # Exchange a valid refresh token for a new pair (rotates the refresh token).
    refresh(refreshToken: String!): AuthToken!
    # Update the signed-in user's own display name (first/last). Email is fixed;
    # self-scoped to the caller's identity.
    updateProfile(firstName: String, lastName: String): CurrentIdentity!
    # Set the caller's OWN tenant white-labeling theme (ADR-038): title, colors,
    # logo height. Self-scoped to the tenant in the access token; requires
    # branding:write. A null field clears that override. Does NOT manage the logo
    # (see setTenantLogo). Returns the tenant with its freshly-resolved branding so
    # the editing client can write it straight into cache.
    setTenantBranding(input: TenantBrandingInput!): Tenant!
    # Set the caller's OWN tenant logo to an https URL (or a bounded raster data:
    # URI), or clear it with null — self-scoped, requires branding:write (ADR-038).
    # An uploaded (binary) logo instead goes to the object store via POST
    # /branding/logo (ADR-058); both paths garbage-collect a replaced object-store
    # logo. A blob storage reference is never accepted here (clients never hold one).
    setTenantLogo(logo: String): Tenant!
}

schema {
    query: Query
    mutation: Mutation
}
