apiVersion: core.devicechain.io/v1beta1
kind: InstanceConfiguration
metadata:
  creationTimestamp: null
  name: dcic-default
spec:
  configuration:
    Infrastructure:
      Nats:
        Hostname: dc-nats.dc-system
        Port: 4222
        StreamReplicas: 1
      UserManagement:
        Hostname: dc-user-management.dc-system
        Port: 8080
      Metrics:
        Enabled: true
        HttpPort: 9090
      Redis:
        Hostname: dc-redis-master.dc-system
        Port: 6379
    Persistence:
      Rdb:
        Configuration:
          hostname: dc-postgresql.dc-system
          maxConnections: 5
          password: devicechain
          port: 5432
          username: devicechain
        Type: postgres95
      Tsdb:
        Configuration:
          hostname: dc-timescaledb-single.dc-system
          maxConnections: 5
          password: devicechain
          port: 5432
          username: postgres
        Type: timescaledb
status: {}
