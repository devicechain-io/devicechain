{{/* One Service per enabled functional area, fronting its GraphQL/HTTP port plus
any area-specific extra ports (e.g. event-sources' HTTP device-ingest 8081). */}}
{{- $root := . -}}
{{- range $area := splitList "," (include "devicechain.enabledAreas" .) }}
{{- $areaCfg := get ($root.Values.functionalAreas | default dict) $area | default dict }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $area }}
  namespace: {{ $root.Values.instance.id }}
  labels:
    {{- include "devicechain.areaLabels" (dict "root" $root "area" $area) | nindent 4 }}
spec:
  selector:
    {{- include "devicechain.areaLabels" (dict "root" $root "area" $area) | nindent 4 }}
  ports:
    - name: graphql
      protocol: TCP
      port: {{ $root.Values.service.port }}
      targetPort: graphql
    {{- range $port := get $areaCfg "extraPorts" | default list }}
    - name: {{ $port.name }}
      protocol: {{ $port.protocol | default "TCP" }}
      port: {{ $port.port }}
      targetPort: {{ $port.name }}
    {{- end }}
{{- end }}
