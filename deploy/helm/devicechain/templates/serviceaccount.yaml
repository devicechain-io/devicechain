{{/*
E7 (ADR-022 review): a dedicated ServiceAccount per release, referenced by every
area's Deployment, replaces the namespace `default` ServiceAccount. The data-plane
services never call the Kubernetes API, so the API token is not mounted
(serviceAccount.automountToken: false), shrinking the blast radius of a pod
compromise.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devicechain.serviceAccountName" . }}
  namespace: {{ .Values.instance.id }}
  labels:
    {{- include "devicechain.instanceLabels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}
